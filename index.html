// ===請求書ページ===
function _invAmt(j){return (typeof jobTotalIn==='function'?jobTotalIn(j):0)||j.unitPrice||j.profit||0;}
function _jobInvDate(j){
  if(j.invoiceDate)return j.invoiceDate;
  if(j.deliveryDate)return j.deliveryDate;
  const sd=(j.subtasks||[]).map(s=>s.deliveryDate).filter(Boolean).sort();
  return sd.length?sd[sd.length-1]:'';
}
function _invMonthMatch(j,m){if(!m)return true;const d=_jobInvDate(j);return !!d&&d.startsWith(m);}
function _invFmt(n){return '¥'+Math.round(n||0).toLocaleString();}
function _calcWithholding(base){base=Math.round(base||0);if(base<=1000000)return Math.floor(base*0.1021);return Math.floor((base-1000000)*0.2042)+102100;}
function _issuer(){
  const d=(S.settings&&S.settings.issuer)||{};
  return Object.assign({name:'',person:'',zip:'',address:'',tel:'',email:'',regNo:'',bankName:'',branchName:'',accountType:'普通',accountNo:'',accountHolder:'',paymentTerms:'発行日の翌月末',defaultTax:true,defaultWithholding:false,notesDefault:'お振込手数料は御社にてご負担いただけますようお願い申し上げます。'},d);
}
function _endNextMonth(iso){const d=iso?new Date(iso):new Date();const last=new Date(d.getFullYear(),d.getMonth()+2,0);return `${last.getFullYear()}-${String(last.getMonth()+1).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;}
function _invoiceJobs(cid,m){
  return S.jobs.filter(j=>!j.deleted&&j.status!=='キャンセル'&&_invAmt(j)>0&&_invMonthMatch(j,m)&&((j.clientId||'')===(cid||'')));
}

  return`${secTitle('🧾 請求書')}
<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">

${!iss.name?`<div class="card" style="background:#3a2a00;border:1px solid var(--amber);margin-bottom:10px;font-size:12px">⚠️ まず「✏️ 請求元情報」に屋号・振込先などを設定してください（請求書に自動で差し込まれます）。</div>`:''}

function openInvoiceEditor(cid,m,ids){
  let js=_invoiceJobs(cid,m);
  if(ids&&ids.length)js=js.filter(j=>ids.includes(j.id));
  if(!js.length){toast('対象の案件がありません','warn');return;}
  const i=_issuer();
  const cname=cid?(S.clients.find(c=>c.id===cid)?.name||'クライアント'):'クライアント';
  const issue=today();
  const due=js.map(j=>j.dueDate).filter(Boolean).sort().reverse()[0]||_endNextMonth(issue);
  const items=[];
  js.forEach(j=>{
    const subs=(j.subtasks||[]).filter(s=>s.unitPrice>0);
    if(subs.length){subs.forEach(s=>items.push({name:j.title+'（'+(s.title||'サブタスク')+'）',qty:1,unit:s.unitPrice,amount:s.unitPrice}));}
    else{items.push({name:j.title,qty:1,unit:_invAmt(j),amount:_invAmt(j)});}
  });
  window._invDraft={cid,m,jobIds:js.map(j=>j.id),recipient:cname,issue,no:'INV-'+issue.replace(/-/g,''),due,subject:js.length===1?js[0].title:'動画制作費 ほか',items,taxMode:i.defaultTax?'ex':'none',whOn:i.defaultWithholding,notes:i.notesDefault};
  _renderInvoiceEditor();
}
function openInvoiceEditorFromSelection(cid,m){
  const ids=[...document.querySelectorAll('.inv-sel[data-cid="'+cid+'"]:checked')].map(cb=>cb.dataset.jid);
  if(!ids.length){toast('請求する案件を1件以上選んでください','warn');return;}
  openInvoiceEditor(cid,m,ids);
}
function markDraftInvoiced(){
  const d=window._invDraft;if(!d)return;
  (d.jobIds||[]).forEach(id=>{const j=S.jobs.find(x=>x.id===id);if(j){j.invoicedAt=today();j.updatedAt=Date.now();}});
  save();closeInvoiceEditor();render();toast('🧾 請求済みにしました');
}

function _invRecalc(){
  const d=window._invDraft;if(!d)return;
  let sub=0;const items=[];
  document.querySelectorAll('#inv-items tr[data-item]').forEach(tr=>{
    const name=tr.querySelector('.ii-name').value;
    const qty=parseFloat(tr.querySelector('.ii-qty').value)||0;
    const unit=parseFloat(tr.querySelector('.ii-unit').value)||0;
    const amt=Math.round(qty*unit);
    tr.querySelector('.ii-amt').textContent=_invFmt(amt);
    sub+=amt;items.push({name,qty,unit,amount:amt});
  });
  d.items=items;
  const modeEl=document.getElementById('inv-taxmode'),whEl=document.getElementById('inv-wh-on');
  d.taxMode=modeEl?modeEl.value:(d.taxMode||'ex');d.whOn=whEl?whEl.checked:d.whOn;
  let tax=0,preTax=sub,goodsTotal=sub;
  if(d.taxMode==='ex'){tax=Math.floor(sub*0.1);preTax=sub;goodsTotal=sub+tax;}
  else if(d.taxMode==='in'){preTax=Math.round(sub/1.1);tax=sub-preTax;goodsTotal=sub;}
  else{tax=0;preTax=sub;goodsTotal=sub;}
  const wh=d.whOn?_calcWithholding(preTax):0;
  const total=goodsTotal-wh;
  d.subtotal=sub;d.tax=tax;d.preTax=preTax;d.withholding=wh;d.total=total;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('inv-subtotal',_invFmt(sub));set('inv-tax',_invFmt(tax));set('inv-wh','-'+_invFmt(wh));
  set('inv-total',_invFmt(total));set('inv-bigamt',_invFmt(total));
  const subLbl=document.getElementById('inv-subtotal-lbl');if(subLbl)subLbl.textContent=d.taxMode==='in'?'小計（税込）':(d.taxMode==='ex'?'小計（税抜）':'小計');
  const taxLbl=document.getElementById('inv-tax-lbl');if(taxLbl)taxLbl.textContent=d.taxMode==='in'?'うち消費税（10%）':'消費税（10%）';
  const tr1=document.getElementById('inv-tax-row');if(tr1)tr1.style.display=d.taxMode==='none'?'none':'';
  const tr2=document.getElementById('inv-wh-row');if(tr2)tr2.style.display=d.whOn?'':'none';
}

function genInvoiceText(cid,m){
  const js=_invoiceJobs(cid,m);
  const name=cid?(S.clients.find(c=>c.id===cid)?.name||'クライアント'):'クライアント';
  const i=_issuer();
  const sub=js.reduce((s,j)=>s+_invAmt(j),0);
  const tax=i.defaultTax?Math.floor(sub*0.1):0;
  const wh=i.defaultWithholding?_calcWithholding(sub):0;
  const total=sub+tax-wh;
  let t=`請求書\n\n${name} 御中\n\nご請求日：${today()}\n下記の通りご請求申し上げます。\n\n────────────────\n`;
  js.forEach(j=>{t+=`${j.title}　¥${_invAmt(j).toLocaleString()}\n`;});
  t+=`────────────────\n小計　¥${sub.toLocaleString()}\n`;
  if(tax)t+=`消費税(10%)　¥${tax.toLocaleString()}\n`;
  if(wh)t+=`源泉徴収税　-¥${wh.toLocaleString()}\n`;
  t+=`合計　¥${total.toLocaleString()}\n\n`;
  if(i.name)t+=`${i.name}${i.person?'（'+i.person+'）':''}\n`;
  if(i.regNo)t+=`登録番号：${i.regNo}\n`;
  if(i.bankName)t+=`お振込先：${i.bankName} ${i.branchName} ${i.accountType}${i.accountNo} ${i.accountHolder}\n`;
  t+=`お支払期限：${i.paymentTerms||'発行日の翌月末'}\n`;
  return t;
}
function copyInvoiceText(cid,m){
  const t=genInvoiceText(cid,m);
  const ok=()=>toast('📋 請求書テキストをコピーしました');
  const fb=()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');ok();}catch(e){toast('コピーに失敗しました','warn');}ta.remove();};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(ok).catch(fb);}else{fb();}
}

function getPayEntries(month){
  const entries=[];
  S.jobs.filter(j=>!j.deleted).forEach(j=>{
    const subs=j.subtasks||[];
    const hasPricedSubs=subs.some(s=>s.unitPrice>0||s.workerPay>0);
    if(hasPricedSubs){
      subs.forEach(s=>{
        if(!s.workerPay||s.workerId===SELF_WID)return;
        const pd=s.payoutDate||j.payoutDate;
        if(!pd?.startsWith(month))return;
        entries.push({jobId:j.id,jobTitle:j.title,label:esc(s.title),workerId:s.workerId||'__none',workerPay:s.workerPay,payoutDate:pd});
      });
    }else{
      const wids=getJobWorkerIds(j);if(!j.workerPay||(!wids.length||wids.every(id=>id===SELF_WID)))return;
      if(!j.payoutDate?.startsWith(month))return;
      entries.push({jobId:j.id,jobTitle:j.title,label:esc(j.title),workerId:j.workerId||'__none',workerPay:j.workerPay,payoutDate:j.payoutDate});
    }
  });
  return entries;
}

  if(!payee||!amount){toast('支払先と金額を入力してください','warn');return;}
  const type=document.getElementById('rw-type').value;
  const date=document.getElementById('rw-date').value||today();

  if(!S.rewards)S.rewards=[];

  save();closeModal();render();toast('報酬を追加しました');
}

          ${sub.deliveryDate?`<span>📅 納品: <span class="${uc}">${sub.deliveryDate}</span></span>`:''}
          ${sub.unitPrice?`<span style="color:var(--blue)">¥${sub.unitPrice.toLocaleString()}</span>`:''}
        </div>
      </div>
    </div>`;
  }

  const groups=[];
  workers.forEach(w=>{
    const jobs=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).includes(w.id)));

    groups.push({label:w.name,id:w.id,jobs,subs});
  });
  const selfJobs=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).includes(SELF_WID)));

  if(selfJobs.length||selfSubs.length)groups.unshift({label:'自分',id:SELF_WID,jobs:selfJobs,subs:selfSubs});
  const noWorker=sortJobs(allJobs.filter(j=>getJobWorkerIds(j).length===0));
  const noWorkerSubs=subsForWorker(null);
  groups.push({label:'担当なし',id:null,jobs:noWorker,subs:[]});
  if(!allJobs.length)return`<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">進行中の案件なし</div></div>`;

    ${g.jobs.length?`<div style="font-size:11px;color:var(--t3);font-weight:700;margin:6px 0 4px;padding-top:6px;border-top:1px solid var(--border)">📋 サブタスク</div>`:''}
    ${g.subs.map(s=>rSubItem(s)).join('')}
  </div>`:''}
  ${!g.jobs.length&&!g.subs.length?`<div style="font-size:12px;color:var(--t3);padding:6px 0">担当案件なし</div>`:''}
</div>`).join('');
}

  const td=today();
  const mk=n=>{const d=new Date();d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
  const tmr=mk(1),dat=mk(2);
  // 完了・キャンセルは除外。案件＋未完了サブタスクを行に。
  const activeJobs=S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル');

function rGoalTree(){
  const all=S.goals.filter(g=>!g.deleted);
  if(!all.length)return`<div class="empty"><div class="empty-icon">🌳</div><div class="empty-title">目標がありません</div><div style="color:var(--t2)">各タブから目標を追加し、上位目標を設定すると連動します</div></div>`;
  const HZ_COLOR={'year10':'#7c3aed','year5':'#3b82f6','year1':'#10b981','monthly':'#f59e0b','next_month':'#f59e0b','this_month':'#ef4444'};
  function getChildren(pid){return all.filter(g=>g.parentGoalId===pid);}
  function goalPct(g){const ms=g.milestones||[];const d=ms.filter(m=>m.done).length;return ms.length?Math.round(d/ms.length*100):(g.progress||0);}
  function renderNode(g,depth){
    const children=getChildren(g.id);
    const hz=GOAL_HORIZONS.find(h=>h.v===g.horizon)||{icon:'🎯',l:g.horizon||''};
    const pct=goalPct(g);
    const col=HZ_COLOR[g.horizon]||'var(--purple)';
    return`<div style="margin-left:${depth*20}px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-left:3px solid ${col};border-radius:8px">
        <span style="font-size:16px;flex-shrink:0">${hz.icon}</span>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="GV='${g.horizon}';render()">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.title)}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:1px">${hz.l} · 🏬${esc((S.divisions||[]).find(d=>d.id===g.divisionId&&!d.deleted)?.name||'全社')}${g.deadline?` · 期限:${g.deadline}`:''}</div>
        </div>
        <div style="flex-shrink:0;text-align:right;display:flex;align-items:center;gap:8px">
          <div>
            <div style="font-size:12px;font-weight:700;color:${col}">${pct}%</div>
            ${children.length?`<div style="font-size:10px;color:var(--t2)">${children.length}件連動</div>`:''}
          </div>
          <button class="tact del" onclick="delGoal('${g.id}')" title="削除">🗑</button>
        </div>
      </div>
      ${depth<5?children.map(c=>renderNode(c,depth+1)).join(''):''}
    </div>`;
  }
  // ルート目標（親なし）を長い時間軸から順に並べる
  const roots=all.filter(g=>!g.parentGoalId).sort((a,b)=>{
    const ai=HORIZON_ORDER.indexOf(a.horizon||'this_month');
    const bi=HORIZON_ORDER.indexOf(b.horizon||'this_month');
    return bi-ai; // 長い順（year10→this_month）
  });
  const linkedIds=new Set(all.filter(g=>g.parentGoalId).map(g=>g.id));
  const unlinkedCount=all.filter(g=>!g.parentGoalId&&HORIZON_ORDER.indexOf(g.horizon||'this_month')<HORIZON_ORDER.length-1).length;
  return`<div style="font-size:12px;color:var(--t2);margin-bottom:14px;padding:8px 12px;background:var(--card2);border-radius:8px;line-height:1.6">
  🌳 目標のつながりをツリー形式で確認できます。各目標編集画面で「上位目標」を設定すると連動します。<br>
  <span style="color:var(--purple)">▸ ルート目標 ${roots.length}件</span> ${unlinkedCount?`<span style="color:var(--amber)">・未連動 ${unlinkedCount}件あり</span>`:'<span style="color:var(--green)">・すべて連動済み ✓</span>'}
</div>
${roots.map(g=>renderNode(g,0)).join('')}`;
}
// ===投稿管理（チーム共有）===
const POST_PLATFORMS=['X','Threads','Instagram','YouTube','TikTok','その他'];
const POST_STATUS=['下書き','予約済','投稿済'];
const POST_BG={'下書き':'bk','予約済':'bb','投稿済':'bg'};
const POST_ICON={'X':'𝕏','Threads':'@','Instagram':'📷','YouTube':'▶️','TikTok':'🎵','その他':'📱'};
function _teamPosts(){return (S.teamPosts||[]).filter(p=>!p.deleted);}
// アカウント別フィルタ(例: mono.create_X / ぽいっとHP_IG)。account未設定の既存投稿は「すべて」タブでのみ表示。
let POSTS_ACC='すべて';
// 表示切替(既定=月カレンダー)。データ構造は変更せず表示層のみ。
let _postsView='month';   // 'month' | 'week' | 'list'
let _postsAnchor=(new Date()).toISOString().slice(0,10);  // 月・週の基準日
const POST_CHIP_BG={'下書き':'var(--card2)','予約済':'var(--bdim)','投稿済':'var(--gdim)'};
const POST_CHIP_BD={'下書き':'var(--border)','予約済':'rgba(29,78,216,.35)','投稿済':'rgba(5,150,105,.35)'};
const POST_CHIP_FG={'下書き':'var(--t2)','予約済':'var(--blue)','投稿済':'var(--green)'};
const POST_INITIAL={'X':'X','Threads':'@','Instagram':'IG','YouTube':'YT','TikTok':'TT','その他':'･'};
function _postsFiltered(){return _teamPosts().filter(p=>POSTS_ACC==='すべて'||p.account===POSTS_ACC);}
function _pd(iso){const d=new Date(iso+'T00:00:00');return isNaN(d)?new Date():d;}
function _isoOf(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function _addDays(iso,n){const d=_pd(iso);d.setDate(d.getDate()+n);return _isoOf(d);}
function _addMonths(iso,n){const d=_pd(iso);d.setDate(1);d.setMonth(d.getMonth()+n);return _isoOf(d);}
function _weekStart(iso){const d=_pd(iso);d.setDate(d.getDate()-d.getDay());return _isoOf(d);}  // 日曜始まり
function pSetView(v){_postsView=v;render();}
function pShift(dir){
  if(_postsView==='month')_postsAnchor=_addMonths(_postsAnchor,dir);
  else if(_postsView==='week')_postsAnchor=_addDays(_postsAnchor,dir*7);
  render();
}
function pToday(){_postsAnchor=(new Date()).toISOString().slice(0,10);render();}
// 投稿チップ(月カレンダー用): 時刻＋プラットフォーム頭文字＋内容冒頭
function _postChip(p,compact){
  const st=p.status||'下書き';
  const t=(p.scheduledTime||'').slice(0,5);
  const ini=POST_INITIAL[p.platform]||'･';
  const head=esc((p.content||'').replace(/\n/g,' ').slice(0,compact?6:14));
  return `<div onclick="event.stopPropagation();tpOpenPost('${p.id}')" title="${esc((p.content||'').slice(0,60))}"
    style="cursor:pointer;font-size:10px;line-height:1.35;padding:2px 5px;margin-bottom:3px;border-radius:5px;
    background:${POST_CHIP_BG[st]};border:1px solid ${POST_CHIP_BD[st]};color:${POST_CHIP_FG[st]};
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${t?t+' ':''}<b>${ini}</b> ${head}</div>`;
}
function _postsAccList(){return['すべて',...[...new Set(_teamPosts().map(p=>p.account).filter(Boolean))].sort()];}
function tpSetAcc(i){const l=_postsAccList();POSTS_ACC=l[i]||'すべて';render();}

// ─── 月カレンダー(既定) ───
function rPostsMonth(){
  const anchor=_pd(_postsAnchor);
  const y=anchor.getFullYear(),m=anchor.getMonth();
  const first=new Date(y,m,1);
  const gridStart=new Date(y,m,1-first.getDay());  // 日曜始まり
  const todayIso=(new Date()).toISOString().slice(0,10);
  // 日付→投稿[]
  const byDate={};
  _postsFiltered().forEach(p=>{const d=p.scheduledDate||'';if(!d)return;(byDate[d]=byDate[d]||[]).push(p);});
  Object.values(byDate).forEach(a=>a.sort((x,y)=>((x.scheduledTime||'')>(y.scheduledTime||'')?1:-1)));
  const wd=['日','月','火','水','木','金','土'];
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);
    const iso=_isoOf(d);
    const inMonth=d.getMonth()===m;
    const isToday=iso===todayIso;
    const dow=d.getDay();
    const posts=byDate[iso]||[];
    const chips=posts.slice(0,3).map(p=>_postChip(p,false)).join('');
    const more=posts.length>3?`<div style="font-size:10px;color:var(--t3)">＋${posts.length-3}件</div>`:'';
    // モバイル縮退: 件数ドット(CSSで <=430px の時だけ表示)
    const dot=posts.length?`<span class="pcal-dot">${posts.length}</span>`:'';
    cells+=`<div class="pcal-cell${inMonth?'':' pcal-out'}${isToday?' pcal-today':''}" onclick="tpOpenPost()" title="この日に投稿を追加">
      <div class="pcal-daynum" style="color:${dow===0?'var(--red)':dow===6?'var(--blue)':'inherit'}">${d.getDate()}${dot}</div>
      <div class="pcal-chips">${chips}${more}</div>
    </div>`;
  }
  return`<div class="pcal-head">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-g btn-xs" onclick="pShift(-1)">←</button>
        <div style="font-weight:800;font-size:16px;min-width:120px;text-align:center">${y}年${m+1}月</div>
        <button class="btn btn-g btn-xs" onclick="pShift(1)">→</button>
        <button class="btn btn-g btn-xs" onclick="pToday()">今日</button>
      </div>
    </div>
    <div class="pcal-grid pcal-wdrow">${wd.map((w,i)=>`<div class="pcal-wd" style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--t2)'}">${w}</div>`).join('')}</div>
    <div class="pcal-grid">${cells}</div>`;
}

// ─── 週タイムライン(縦=時間 6:00〜24:00 / 横=7日) ───
function rPostsWeek(){
  const ws=_weekStart(_postsAnchor);
  const todayIso=(new Date()).toISOString().slice(0,10);
  const wd=['日','月','火','水','木','金','土'];
  const days=[];for(let i=0;i<7;i++)days.push(_addDays(ws,i));
  const H0=6,H1=24,ROWH=38;                 // 6:00〜24:00
  const byDate={};
  _postsFiltered().forEach(p=>{const d=p.scheduledDate||'';if(!d)return;(byDate[d]=byDate[d]||[]).push(p);});
  // 時間軸ラベル
  let hourLabels='';
  for(let h=H0;h<=H1;h++)hourLabels+=`<div class="ptl-hour" style="height:${ROWH}px">${String(h).padStart(2,'0')}:00</div>`;
  // 各日カラム
  const dayCols=days.map((iso,di)=>{
    const posts=(byDate[iso]||[]).slice();
    const cards=posts.map(p=>{
      const t=(p.scheduledTime||'');
      let top;
      if(t){const[hh,mm]=t.split(':').map(Number);top=((hh+ (mm||0)/60)-H0)*ROWH;}
      else top=-1;  // 時刻なしは上部にまとめる
      const st=p.status||'下書き';
      const pos = top>=0 ? `position:absolute;top:${Math.max(0,top)}px;left:2px;right:2px;` : 'position:relative;margin:2px;';
      return `<div onclick="event.stopPropagation();tpOpenPost('${p.id}')" title="${esc((p.content||'').slice(0,60))}"
        style="${pos}cursor:pointer;font-size:10px;line-height:1.3;padding:3px 5px;border-radius:6px;
        background:${POST_CHIP_BG[st]};border:1px solid ${POST_CHIP_BD[st]};color:${POST_CHIP_FG[st]};
        overflow:hidden;z-index:2">${t?`<b>${t.slice(0,5)}</b> `:''}${POST_INITIAL[p.platform]||'･'} ${esc((p.content||'').replace(/\n/g,' ').slice(0,10))}</div>`;
    }).join('');
    const isToday=iso===todayIso;
    const dnum=_pd(iso).getDate();
    return `<div class="ptl-col">
      <div class="ptl-colhead${isToday?' ptl-today':''}" style="color:${di===0?'var(--red)':di===6?'var(--blue)':'inherit'}">${wd[di]} ${dnum}</div>
      <div class="ptl-daybody" style="height:${(H1-H0)*ROWH}px">${cards||''}</div>
    </div>`;
  }).join('');
  return`<div class="pcal-head">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-g btn-xs" onclick="pShift(-1)">←</button>
        <div style="font-weight:800;font-size:15px;min-width:150px;text-align:center">${ws} 〜 ${_addDays(ws,6)}</div>
        <button class="btn btn-g btn-xs" onclick="pShift(1)">→</button>
        <button class="btn btn-g btn-xs" onclick="pToday()">今日</button>
      </div>
    </div>
    <div class="ptl-wrap">
      <div class="ptl-timecol"><div class="ptl-hour" style="height:24px"></div>${hourLabels}</div>
      <div class="ptl-cols">${dayCols}</div>
    </div>`;
}

  const posts=_teamPosts().filter(p=>POSTS_ACC==='すべて'||p.account===POSTS_ACC)

  const body = _postsView==='month' ? rPostsMonth()

${upcoming.length?`<div style="font-weight:800;font-size:14px;color:var(--purple);margin-bottom:6px">🗓 予定・下書き</div>${upcoming.map(card).join('')}`:''}
${done.length?`<div style="font-weight:800;font-size:14px;color:var(--t2);margin:14px 0 6px">✅ 投稿済み</div>${done.map(card).join('')}`:''}`);
  return`${secTitle('📅 投稿管理')}
<div class="sub-tabs" id="posts-acc-tabs">${accs.map((a,i)=>`<div class="stab${POSTS_ACC===a?' act':''}" onclick="tpSetAcc(${i})">${esc(a)}</div>`).join('')}</div>
${viewTabs}
<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
  <button class="btn btn-p btn-sm" onclick="tpOpenPost()">＋ 投稿を追加</button>

}

// ver:2 = 2026-07-10 md改訂反映(受注エリア全国化・出張撮影は旭川のみ・切り返し追加)。seedVerで一度きり上書き。
const DOC_SEEDS=[{"id": "gdocseed_teleapo", "title": "テレアポマニュアル（ぽいっとHP）", "html": "<h1>ぽいっとHP テレアポマニュアル（完成版・2026-07-10）</h1><p>対象：佐々木さん、および今後入る新メンバー。旭川のお店に電話する担当者は本書だけ読めば動ける状態にする。</p><p>単一ソース：<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">営業/ぽいっとHP/営業マニュアル.md</span>。本書はそのテレアポ部分を実行レベルまで具体化したもの。矛盾があれば営業マニュアル.mdが優先。</p><hr><h2>1. 目的とKGI</h2><p>このテレアポの目的は契約を取ることではない。<b>「作ったHPのサンプルを30秒見てもらう約束」を取ること</b>。見てもらえれば成約率は跳ね上がる。売り込みではなく、もう出来上がっている現物を見せに行く電話だと思って架電する。</p><ul><li>受注対応エリアは<b>全国OK（オンライン完結）</b>。出張撮影のみ旭川近郊限定。ただし架電の主戦場は当面<b>旭川の店舗のみ</b>（旭川以外の店には電話しない）。</li><li>1日200接触（DM＋メール営業合算）は<b>新規のみでカウント</b>。3日後フォロー再送はカウントに含めない。</li><li>今月KGI：<b>成約10件</b>（旭川の店舗のみでの実績）</li><li>週次目安：コール130件／返信・アポ計10件／商談5件／成約2〜3件</li><li>日次目安：平日10件、日曜100件</li></ul><hr><h2>2. 1日の流れ</h2><h3>平日（18:00〜20:00・1日10件）</h3><p>非飲食（美容・整体・小売・教室）を優先する。飲食は仕込み帯や落ち着いた店のみ。この時間外の架電は禁止。</p><table><tr><th>時間</th><th>やること</th></tr><tr><td>18:00〜19:30</td><td>架電。美容・整体・小売中心に10件</td></tr><tr><td>19:30〜19:45</td><td>結果を社内アプリに記録（後回し禁止）</td></tr><tr><td>19:45〜20:00</td><td>翌日の架電先を確認し、社内アプリでその店を「架電予定」ステータスに変更</td></tr></table><h3>日曜（13:00〜18:00・1日100件）</h3><p>飲食が本命。14〜17時のアイドルタイム（ランチ後・ディナー前）を狙う。</p><table><tr><th>時間</th><th>やること</th></tr><tr><td>13:00〜14:00</td><td>非飲食を先に架電</td></tr><tr><td>14:00〜17:00</td><td>飲食店の本命枠。アイドルタイムに集中架電</td></tr><tr><td>17:00〜18:00</td><td>残り件数の消化＋記録</td></tr></table><p>1コール2分以内。断られたら粘らない。次の電話に進む。</p><hr><h2>3. トークスクリプト全文</h2><h3>3-1. 挨拶（開口15秒）</h3><pre>お忙しいところすみません、旭川でお店のホームページを作っている\nmono.createの佐々木です。\n実は◯◯さんのホームページのたたき台を、もう作ってしまっていて。</pre><p>用件を最初の15秒で言い切る。「実は〜」で引っ張らない。</p><h3>3-2. 観察（相手の店を見ていることを一言で示す）</h3><p>業種別の観察例（DM版と共通の型。電話でも同じ観察を1文入れる）：</p><ul><li>美容室：「Instagramのスタイル写真、すごく良かったです。ただ検索したらホットペッパーしか出てこなくて」</li><li>整体：「Googleの口コミで星4.8でしたよね。これだけ信頼されているのにホームページが出てこないのが意外で」</li><li>飲食：「看板メニューの写真を見て伺いたくなりました。営業時間を調べたら食べログの古い情報しか出てこなくて」</li></ul><h3>3-3. 提案（現物を見せる）</h3><pre>LINEかショートメールで、30秒で見られるURLを送るだけなので、\n見るだけ見てもらえませんか？\n気に入らなければ0円です。そのまま消してもらって大丈夫です。\n気に入った場合だけ、お支払いいただく形にしています。</pre><p>「気に入らなければ0円」の伝え方はここが定型。<b>必ずこの順番</b>（先に0円の安心、後から支払い条件）で言う。逆の順番（先に価格）にすると警戒される。</p><h3>3-4. 切り返し（よくある3つ）</h3><table><tr><th>相手の反応</th><th>返し</th></tr><tr><td>「高いんでしょ」</td><td>「制作4万9800円と年間1万円だけです。月額はありません。見るだけならタダです」</td></tr><tr><td>「今ので間に合ってる」</td><td>「ですよね。実は今のページを見た上で、もっと集客できる形で作ってみたんです。比べるだけでも面白いと思います」</td></tr><tr><td>「忙しい」</td><td>「30秒で見られるURLだけ送ります。お邪魔しました」</td></tr><tr><td>「対応エリアは？」</td><td>「対応は全国OKです。お店の写真撮影に伺えるのは旭川だけですが、お手持ちのスマホ写真で十分作れます」</td></tr></table><p>粘らない。3つとも「引く」設計になっている。旭川は狭い。悪評が最大の損失になる。</p><h3>3-5. クロージング</h3><p>商談日程を取るパターンと、資料案内で終えるパターンの2つを使い分ける。</p><p><b>A. 見る意思がある場合 → 商談日程</b></p><pre>ありがとうございます。\n明日か明後日、お店の空いている時間に10分だけお電話でご説明させてください。\n◯日と◯日でしたら、どちらがよろしいですか？</pre><p>候補日は必ず2択。「いつでも」は決まらない。取れたら社内アプリで「アポ」に更新。</p><p><b>B. その場で決めきれない・資料が欲しいと言われた場合 → 資料案内</b></p><pre>でしたら、お手元でゆっくりご覧いただける資料もご用意しています。\nこのページの「資料がほしい」を選んでいただくと、資料がメールに自動で届きます。\nhttps://mono-create-group.github.io/lp/sample-hp/showcase/contact.html</pre><p>このページで「資料がほしい」を選ぶと資料PDFが自動でメール添付されて届く。電話口で資料を求められたら<b>必ずこのURLを案内する</b>。LINEには誘導しない（公式LINEは休眠中）。</p><hr><h2>4. NG集</h2><ul><li><b>値引き交渉に応じない</b>。「4万9800円と年間1万円、これしかありません」と言い切る。価格が一律であることが信頼の根拠。特別条件をその場で確約しない。</li><li><b>LINEに誘導しない</b>。公式LINEは休眠中。案内する導線はフォーム（上記URL）・メール・電話のみ。</li><li><b>長話をしない</b>。1コール2分以内。用件（HPを見てもらう約束）が取れたら、それ以上話を広げずに切る。</li><li>20時以降の新規架電はしない（既存アポの折り返しは可）。</li><li>誇大表現（「絶対に売上が上がります」等）は言わない。</li><li>「電話しないで」と言われたら、社内アプリで「失注／連絡不可」にして二度と架電しない。</li><li>現物HPは当該店舗の公開素材のみ使用し、成約しなければ削除する前提で扱う。</li></ul><hr><h2>5. シフトさんヒアリングの1問（全接点で必ず1回聞く）</h2><p>HPの話が一段落した後、または断られた直後の「ついでの一言」で聞く。売り込みが終わった空気のほうが本音が出る。</p><pre>あ、あと1つだけ。スタッフさんのシフト表って、毎月どなたが作ってます？\n……ですよね、あれ地味に何時間も取られますよね。\nいま、LINEで希望を集めるだけでシフト表が自動でできる仕組みを\n旭川のお店向けに準備していて、無料モニターを数店だけ探してるんです。\n完成したら一番安い条件で使えるので、枠だけ押さえておきましょうか？</pre><p>シフト管理ツールは開発中のため<b>この電話で受注はしない</b>。モニター登録の意思があれば社内アプリのメモに「シフト希望」と記録するだけでよい。</p><hr><h2>6. 記録手順（社内アプリ）</h2><p>架電したら<b>その場で</b>記録する。記憶で営業しない。</p><ol start=\"1\"><li>mono.create 社内連絡アプリの「営業リスト」タブを開く</li><li>該当店舗のステータスを更新：<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">未接触 → 架電予定 → 電話済 → アポ → 商談 → 成約</span>（断られたら<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">失注</span>＋理由をメモ）。「架電予定」は前日の19:45〜20:00に翌日分へ付けておく（翌日はこのステータスで絞り込んで上から架電するだけ）</li><li>メモ欄に一言残す（例：「不在／19時再架電」「資料URL案内済」「シフト希望」）</li><li>次アクション日を入れる（空欄にしない。追客が漏れる原因になる）</li><li><b>成約したら「クライアント化」ボタンを押してクライアント管理へ移す</b></li></ol><p>その日の架電が終わったら、記録が全件埋まっているか自分で確認してから終了する。</p><hr><h2>7. セルフチェック（架電前に1回確認）</h2><ul><li>対応エリアを聞かれたら「受注は全国OK・出張撮影のみ旭川」と正しく答えているか（受注そのものを旭川限定と言わない）</li><li>価格は「制作4万9800円＋年間1万円のみ」で言い切っているか（値引きを匂わせていないか）</li><li>「気に入らなければ0円／気に入った場合のみお支払い」の順番で話しているか</li><li>LINEへ誘導していないか（フォーム・メール・電話のみ）</li><li>資料を求められたら上記contact.htmlのURLを案内しているか</li><li>記録を後回しにせず、その場で社内アプリに入れているか</li></ul>", "ver": 3}, {"id": "gdocseed_dm", "title": "DM営業マニュアル（ぽいっとHP）", "html": "<h1>ぽいっとHP DM営業マニュアル（完成版・2026-07-10）</h1><p>対象：会長、および今後入る新メンバー。IG DM・メールで営業する担当者は本書だけ読めば動ける状態にする。</p><p>単一ソース：<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">営業/ぽいっとHP/営業マニュアル.md</span>。本書はそのDM/メール部分を実行レベルまで具体化したもの。矛盾があれば営業マニュアル.mdが優先。</p><hr><h2>1. 運用ルール</h2><ul><li>受注対応エリアは<b>全国OK（オンライン完結）</b>。出張撮影のみ旭川近郊限定。ただしDM送信先は当面<b>旭川の店舗のみ</b>（全国の店舗には送らない）。</li><li>対象リストは<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">営業/ぽいっとHP/ターゲット60_旭川.csv</span>（口コミ数×評価で採点済みの上位60店）。</li><li><b>1日20通まで</b>（IG DM）。これはInstagramの凍結回避の安全上限。これ以上は増やさない。</li><li>メールアドレスが収集できている先には、DMとは別枠で営業メールを送ってよい（収集数に応じて拡大）。<b>在庫消化順序は旭川→送り尽くしたら札幌→全道→全国</b>（営業の主戦場・訪問・撮影は旭川のまま）。</li><li><b>1日200接触（DM＋メール営業合算）は新規のみでカウント</b>。3日後フォロー再送はカウントに含めない（フォローは別枠で実施）。</li><li><b>追撃（フォロー）は1回だけ</b>。3日後に1通送って、それでも返信がなければ次の店に進む。しつこく送らない。</li><li><b>5分調べて1分で書く</b>。相手のInstagramを5分見て観察1文を作り、DM本文自体は定型（後述A〜D）に観察1文と店名・URLを差し込むだけで1分以内に仕上げる。ゼロから書き直さない。</li></ul><hr><h2>2. 送信フロー（テキストで表現）</h2><pre>リストから店舗を1件選ぶ\n        │\n        ▼\n現物HP（たたき台）が既にあるか？\n   ├─ ある  → 【A. IG DM 現物あり型】 or 【C. メール 現物あり型】\n   └─ ない  → 【B. IG DM 現物なし型】\n        │\n        ▼\n送信後、社内アプリに「送信日」を記録\n        │\n        ▼\n3日たっても返信なし → 【D. フォロー】を1回だけ送信\n        │\n        ▼\n返信が来た\n   ├─ 温度が高い（見た/興味ある） → 深掘り1つ質問 → 商談化（§4）\n   └─ 温度が低い（今はいい等）    → 無理に押さない。関係だけ残して終了\n        │\n        ▼\nそれでも反応なし → その店は今月は追わない（次の候補へ）</pre><p>使い分けの判断基準は「現物HPを既に作ってあるかどうか」の1点だけ。現物があるなら必ずA/Cを優先する（返信率が現物なし型より高い）。</p><hr><h2>3. 営業文（この最終版を一字一句そのまま使う）</h2><p>本文中の<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">{店固有の観察1文}</span>と<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">{店名}</span>・<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">{URL}</span>だけを個社ごとに差し替える。文面自体は変えない。</p><h3>【A. IG DM 現物あり型】</h3><pre>はじめまして。旭川でお店のホームページを作っている中村と申します。\n{店固有の観察1文}\n勝手ながら、{店名}さんのホームページのサンプルを1枚作ってしまいました。\nスマホで30秒あれば見られます。\n{URL}\n気に入らなければ0円。そのまま削除します。\n気に入った場合のみお支払い（4万9800円）で、写真や文章を本物に差し替えて公開まで仕上げます。\n不要でしたら、その一言だけもらえたら助かります。</pre><h3>【B. IG DM 現物なし型】</h3><pre>はじめまして。旭川で地元のお店のホームページだけを作っている中村と申します。\n{店固有の観察1文}\n1つだけ伺いたいのですが、いま新しいお客さんは、Instagramと口コミ以外だと何経由が多いですか？\n実は旭川で30店舗以上と話して、ホームページを後回しにしている理由はほぼ同じでした。「めんどくさそう」です。\nうちは文章も写真も更新も全部こちらでやって、お店側は完成品を見るだけ。4万9800円の一律です。\nよければ、実際に動くサンプル集だけ置いておきます。\n{実績URL}</pre><h3>【C. メール 現物あり型】</h3><pre>件名: {店名}様のホームページを試しに作りました（旭川・中村）\n\n{店名} ご担当者様\n\nはじめまして。旭川でお店のホームページを作っている中村と申します。\n{店固有の観察1文}\n\n勝手ながら、{店名}様のホームページのサンプルを1枚作ってしまいました。\nスマホで30秒あれば見られます。\n{URL}\n\n気に入らなければ0円で、このまま削除します。\n気に入った場合のみお支払いいただく形です。制作4万9800円と年間維持1万円、これ以外の請求はありません。\n\n不要でしたら、その一言だけご返信いただければ助かります。\n\nmono.create（モノクリエイト）\n中村</pre><h3>【D. フォロー】</h3><p>3日後未返信（1回だけ）：</p><pre>先日サンプルをお送りした中村です。お忙しい時期でしたらすみません。\nサンプルは今月末まで残しておきます。それ以降は削除しますので、見るだけでも間に合えば幸いです。</pre><p>返信 an>（反応なしは<span style=\"background:#f1f3f4;border-radius:3px;padding:0 4px;font-family:Menlo,Consolas,monospace;font-size:10pt\">追わない</span>に変更し、次候補へ）</li><li>温度が低い返信だった場合は次アクション日を14日後に設定してメモに残す（2周目リストとして再利用）</li><li><b>成約したら「クライアント化」ボタンを押してクライアント管理へ移す</b></li></ol><hr><h2>7. セルフチェック（送信前に1回確認）</h2><ul><li>送信先は旭川の店舗のみになっているか（全国の店舗へは送っていないか）。対応エリアを聞かれた際は「受注は全国OK・出張撮影のみ旭川」と正しく答える準備ができているか</li><li>観察1文は具体的か（抽象的な褒め言葉だけになっていないか）</li><li>「気に入らなければ0円／気に入った場合のみお支払い」の表現で統一されているか</li><li>LINEへ誘導していないか（フォーム・メール・電話のみ）</li><li>1日20通の上限を超えていないか</li><li>追撃は1回だけに留めているか</li><li>送信後、社内アプリに記録したか</li></ul>", "ver": 2}];

    if(b.type==='toggle')return`<h4>${esc(b.title||'')}</h4>${_gdMlToP(b.content)}`;

    if(b.type==='counter')return`<p>${esc(b.label||'カウンター')}: ${+b.value||0}</p>`;

function _gdocColl(src){

function _gdocPrefix(src){return src==='bi'?'bidoc_':'doc_';}
function _gdocBackView(src){return src==='bi'?'bizinfo':'docs';}

function gdocNew(src,bu){

function gdocBack(id){
  clearTimeout(_gdocTimer);
  if(window._gdocDirty)gdocPersist(id); // 未編集ならDOMを書き戻さない(リモート更新を巻き戻さないため)
  V=_gdocBackView(window._gdocCurSrc||'tp');render();
}
function gdocInput(id){
  window._gdocDirty=true;
  const st=document.getElementById('gdoc-savestat');if(st)st.textContent='保存中…';
  clearTimeout(_gdocTimer);

function gdocPersist(id){
  const p=_gdocColl(window._gdocCurSrc||'tp').find(x=>x.id===id);if(!p)return;
  const ed=document.getElementById('gdoc-editor');if(!ed)return;
  const ti=document.getElementById('gdoc-title');
  p.html=ed.innerHTML;
  p.title=(ti?ti.value:p.title||'').trim();
  p.updatedAt=Date.now();
  p.updatedBy=_gdWho();
  window._gdocDirty=false;
  window._gdocRenderPending=false; // 編集セッション中はローカル優先(last-writer-wins)
  save();

// 編集中(フォーカス中 or 未保存の変更あり)かどうか。同期によるDOM再描画の保留判定に使う。
function _gdocEditingActive(){
  if(typeof V!=='string'||!(V.startsWith('doc_')||V.startsWith('bidoc_')))return false;
  const ed=document.getElementById('gdoc-editor');
  if(!ed)return false;
  if(window._gdocDirty)return true;
  const ae=document.activeElement;
  return !!(ae&&(ae===ed||ed.contains(ae)||ae.id==='gdoc-title'));
}
// リモート同期用のrender。ドキュメント編集中はフォーカス中のcontenteditableを黙って置き換えない。
// (データのマージ自体は先に済んでいる。次の保存でローカルが優先=last-writer-wins。他タブは次の描画で反映)
function renderSyncSafe(){
  if(_gdocEditingActive()){window._gdocRenderPending=true;return;}
  render();
}
function gdocCmd(cmd,val){
  const ed=document.getElementById('gdoc-editor');if(!ed)return;
  ed.focus();
  try{document.execCommand('styleWithCSS',false,cmd==='foreColor'||cmd==='hiliteColor'||cmd==='backColor');}catch(_){}
  let ok=false;
  try{ok=document.execCommand(cmd,false,val===undefined?null:val);}catch(_){}
  if(!ok&&cmd==='hiliteColor'){try{document.execCommand('backColor',false,val);}catch(_){}}
  if(window._gdocCurId)gdocInput(window._gdocCurId);
}

// チェックリスト: 選択行をチェックボックス付きリストに(再押下で解除)。状態はhtmlに保存され永続化
function gdocChecklist(){
  const ed=document.getElementById('gdoc-editor');if(!ed)return;
  ed.focus();
  const findUl=()=>{const n=window.getSelection().anchorNode;const e=n&&(n.nodeType===1?n:n.parentElement);return e&&e.closest?e.closest('ul'):null;};
  let ul=findUl();
  if(!ul){document.execCommand('insertUnorderedList');ul=findUl();}
  if(ul){
    if(ul.classList.contains('gdoc-check')){ul.classList.remove('gdoc-check');ul.querySelectorAll('li.done').forEach(li=>li.classList.remove('done'));}
    else ul.classList.add('gdoc-check');
  }
  if(window._gdocCurId)gdocInput(window._gdocCurId);
}
// チェックボックス欄クリックで完了トグル(キャレット移動を防ぐためmousedownで処理)
function gdocEditorMouseDown(e){
  const t=e.target;if(!t||!t.closest)return;
  const li=t.closest('li');if(!li)return;
  const ul=li.parentElement;if(!ul||!ul.classList||!ul.classList.contains('gdoc-check'))return;
  const rect=li.getBoundingClientRect();
  if(e.clientX-rect.left>28||e.clientY-rect.top>26)return; // 左上のチェックボックス欄のみ反応
  e.preventDefault();
  li.classList.toggle('done');
  if(window._gdocCurId)gdocInput(window._gdocCurId);
}
function gdocPop(which){

  el.style.display=show?'flex':'none';

function crmSaveCard(){

  const id=document.getElementById('crm-id').value;

    email:g('crm-email'),instagram:g('crm-instagram'),amount:g('crm-amount'),

}
function crmDelCard(id){

// ===お問い合わせ(ぽいっとHPのお問い合わせをGAS経由で一覧・対応状況管理)===
// GAS側が唯一の真実。Firestoreには何も保存しない(TEAM_KEYS非追加)。ADMIN_KEYはコードに書かない。
// 鍵の取得優先順位: ①localStorage('poitto_admin_key') ②shared/configのpoittoKey(残置互換) ③無ければタブ内の入力フォームで保存
const POITTO_EXEC='https://script.google.com/macros/s/AKfycbzftG_O0GsR_8_TYwUwSGfSFPMCjXscWfw0jmTIB54H8NrH0SnjgH445IDDOKoHnNt8XA/exec';
const INQ_STATUSES=['未対応','連絡済み','商談中','成約','見送り'];
let INQ_STATE='idle'; // idle | loading | ready | error | noconfig
let INQ_ERR='';
async function _poittoKey(){
  const ls=(localStorage.getItem('poitto_admin_key')||'').trim();
  if(ls)return ls;
  try{const doc=await fbDb.collection('shared').doc('config').get();const k=doc.exists?(doc.data()||{}).poittoKey:'';return (k||'').trim();}catch(e){return '';}
}
function inqSaveKey(){
  const el=document.getElementById('inq-key');
  const v=(el?el.value:'').trim();
  if(!v){toast('管理キーを入力してください','warn');return;}
  localStorage.setItem('poitto_admin_key',v);
  toast('管理キーを保存しました 📮');
  inqReload();
}
async function inqLoad(force){
  if(INQ_STATE==='loading')return;
  if(!force&&Array.isArray(window.__poittoRows)){INQ_STATE='ready';return;}
  INQ_STATE='loading';INQ_ERR='';render();
  const key=await _poittoKey();
  if(!key){INQ_STATE='noconfig';render();return;}
  try{
    const res=await fetch(`${POITTO_EXEC}?key=${encodeURIComponent(key)}`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data||!Array.isArray(data.rows))throw new Error('rowsが取得できませんでした');
    window.__poittoRows=data.rows;
    INQ_STATE='ready';render();
  }catch(e){INQ_ERR=String(e&&e.message||e);INQ_STATE='error';render();}
}
function inqReload(){window.__poittoRows=null;inqLoad(true);}
function rInquiries(){
  if(INQ_STATE==='idle'){setTimeout(()=>inqLoad(false),0);}
  const head=`${secTitle('📮 お問い合わせ')}
<div style="font-size:11px;color:var(--t3);margin-bottom:12px">ぽいっとHP(HP制作事業)のお問い合わせ一覧。データはGAS(スプレッドシート)が正で、この画面から対応状況を更新できます。</div>`;
  if(INQ_STATE==='noconfig'){
    return`${head}<div class="card" style="border-left:3px solid var(--amber)">
  <div style="font-weight:800;margin-bottom:6px">管理キーを入力</div>
  <div style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:10px">お問い合わせ一覧の取得には管理キーが必要です。キーはこの端末(localStorage)にのみ保存されます。</div>
  <div class="fg"><div class="fl">管理キー *</div><input type="password" id="inq-key" placeholder="管理キーを入力" autocomplete="off"></div>

</div>`;
  }
  if(INQ_STATE==='loading'||INQ_STATE==='idle'){
    return`${head}<div class="card"><div style="color:var(--t2);font-size:13px">読み込み中…</div></div>`;
  }
  if(INQ_STATE==='error'){
    return`${head}<div class="card" style="border-left:3px solid var(--red)"><div style="font-weight:800;margin-bottom:6px">読み込みに失敗しました</div><div style="font-size:12px;color:var(--t2);white-space:pre-wrap;line-height:1.7">${esc(INQ_ERR)}</div><div style="margin-top:10px"><button class="btn btn-p btn-sm" onclick="inqReload()">🔄 再読み込み</button></div></div>`;
  }
  const rows=Array.isArray(window.__poittoRows)?window.__poittoRows:[];
  // rows[0]=ヘッダー行(シート1行目)。データはrows[1..]。rows[i]のシート行番号=i+1。
  const items=[];
  for(let i=1;i<rows.length;i++){items.push({r:rows[i]||[],sheetRow:i+1});}
  items.reverse(); // 新しい順
  const total=items.length;
  const untouched=items.filter(x=>((x.r[8]||'').trim()==='未対応'||!(x.r[8]||'').trim())).length;
  const F=(r,i)=>esc((r[i]!=null?String(r[i]):'').trim());
  const body=!total?`<div class="empty"><div class="empty-icon">📮</div><div class="empty-title">お問い合わせはまだありません</div></div>`:items.map(x=>{
    const r=x.r;const cur=(r[8]||'').trim()||'未対応';
    return`<div class="card" style="margin-bottom:10px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
    <div style="min-width:0">
      <div style="font-weight:800;font-size:15px">${F(r,1)||'(お名前なし)'}<span style="font-size:12px;font-weight:600;color:var(--t2)"> / ${F(r,2)||'店名なし'}</span></div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">受信 ${F(r,0)||'-'}</div>
    </div>
    <select class="inq-sel" style="flex-shrink:0" onchange="inqSetStatus(${x.sheetRow},this.value,this)">${INQ_STATUSES.map(s=>`<option${s===cur?' selected':''}>${esc(s)}</option>`).join('')}</select>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--t2);margin-top:8px">
    <span>✉️ ${F(r,3)||'-'}</span><span>📞 ${F(r,4)||'-'}</span><span>🏷 ${F(r,5)||'-'}</span><span>種別 ${F(r,6)||'-'}</span>
  </div>
  <div style="font-size:13px;color:var(--t2);margin-top:8px;white-space:pre-wrap;line-height:1.75">${F(r,7)||'(相談内容なし)'}</div>
  ${cur==='成約'?`<div style="margin-top:8px"><button class="btn btn-g btn-xs" onclick="crmFromInquiry(${JSON.stringify(String(r[1]||'')).replace(/"/g,'&quot;')},${JSON.stringify(String(r[2]||'')).replace(/"/g,'&quot;')},${JSON.stringify(String(r[3]||'')).replace(/"/g,'&quot;')},${JSON.stringify(String(r[4]||'')).replace(/"/g,'&quot;')})" title="このお問い合わせをクライアント台帳に登録">🤝 クライアント登録</button></div>`:''}
</div>`;
  }).join('');
  return`${head}
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
  <span style="font-size:13px;font-weight:800;background:var(--card2);padding:4px 10px;border-radius:8px">総件数 ${total}</span>
  <span style="font-size:13px;font-weight:800;color:var(--amber);background:var(--card2);padding:4px 10px;border-radius:8px">未対応 ${untouched}</span>
  <button class="btn btn-g btn-sm" onclick="inqReload()">🔄 再読み込み</button>
</div>
${body}`;
}
async function inqSetStatus(sheetRow,status,el){
  if(el)el.disabled=true;
  const key=await _poittoKey();
  if(!key){if(el)el.disabled=false;toast('設定未完了: poittoKeyがありません','warn');return;}
  try{
    const res=await fetch(`${POITTO_EXEC}?key=${encodeURIComponent(key)}&action=status&row=${encodeURIComponent(sheetRow)}&status=${encodeURIComponent(status)}`);
    const data=await res.json().catch(()=>({}));
    if(!res.ok||!data.success)throw new Error('更新に失敗しました');
    // メモリキャッシュも更新(rows配列のインデックス=sheetRow-1)
    if(Array.isArray(window.__poittoRows)&&window.__poittoRows[sheetRow-1]){window.__poittoRows[sheetRow-1][8]=status;}
    toast('対応状況を更新しました 📮');
  }catch(e){toast('更新に失敗しました','err');}
  if(el)el.disabled=false;
}

function rUnifiedHorizonTab(div,tabDef){
  const td=today();
  const label=tabDef.icon+' '+tabDef.l;

  // ===今週専用コンテキスト===
  let weeklyCtx='';
  if(tabDef.v==='1w'){
    const thisMonthGoals=(S.goals||[]).filter(g=>!g.deleted&&g.horizon==='this_month'&&(div?.id?g.divisionId===div.id:!g.divisionId));
    const now=new Date(td);
    const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0);
    const daysLeft=Math.max(1,Math.ceil((endOfMonth-now)/(1000*60*60*24))+1);
    const weeksLeft=Math.max(1,Math.ceil(daysLeft/7));
    const thisM=td.slice(0,7);
    // 目標ごとに今週必要数値を算出
    const weeklyRows=thisMonthGoals.map(g=>{
      const icon=GOAL_CATS.find(c=>c.v===g.category)?.l.split(' ')[0]||'🎯';
      const isRev=(g.category==='revenue'||g.targetAmount>0)&&g.targetAmount>0;
      const isSales=g.category==='sales'&&g.targetSalesCount>0;
      const isHire=g.category==='hire'&&g.targetHireCount>0;
      let target,current,unit,weeklyNeed,pct;
      if(isRev){
        const rs=revGoalStats(g);
        target=g.targetAmount;current=rs.earned;unit='円';
        pct=rs.pct;weeklyNeed=Math.ceil(rs.remaining/weeksLeft);
      }else if(isSales){
        const won=S.logs.filter(l=>!l.deleted&&l.type==='sales'&&l.date?.startsWith(thisM)&&l.result==='成約').length;
        target=g.targetSalesCount;current=won;unit='件';
        pct=Math.min(100,Math.round(won/target*100));
        weeklyNeed=Math.ceil(Math.max(0,target-won)/weeksLeft);
      }else if(isHire){
        const hired=S.logs.filter(l=>!l.deleted&&l.type==='hire'&&l.date?.startsWith(thisM)&&l.result==='内定').length;
        target=g.targetHireCount;current=hired;unit='人';
        pct=Math.min(100,Math.round(hired/target*100));
        weeklyNeed=Math.ceil(Math.max(0,target-hired)/weeksLeft);
      }else{
        // 進捗%ベース
        target=100;current=g.progress||0;unit='%';
        pct=g.progress||0;
        weeklyNeed=Math.ceil(Math.max(0,100-pct)/weeksLeft);
      }
      const col=pct>=100?'green':pct>=60?'blue':pct>=30?'amber':'red';
      const bc=col==='green'?'bg':col==='blue'?'bb':col==='amber'?'ba':'br';
      const fmtVal=v=>isRev?`¥${v.toLocaleString()}`:v.toLocaleString()+unit;
      return`<div class="card card-sm" style="margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span style="font-size:18px">${icon}</span>
    <div style="flex:1;min-width:0;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.title)}</div>
    <span class="badge ${bc}" style="flex-shrink:0">${pct}%</span>
  </div>
  <div style="height:5px;background:var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden">
    <div style="height:100%;background:var(--${col});width:${pct}%;border-radius:3px;transition:width .4s"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;text-align:center">
    <div style="background:var(--card2);padding:7px 4px;border-radius:6px">
      <div style="color:var(--t2);margin-bottom:2px;font-size:11px">月間目標</div>
      <div style="font-weight:700;font-size:13px">${fmtVal(target)}</div>
    </div>
    <div style="background:var(--card2);padding:7px 4px;border-radius:6px">
      <div style="color:var(--t2);margin-bottom:2px;font-size:11px">現状</div>
      <div style="font-weight:700;font-size:13px;color:var(--${col})">${fmtVal(current)}</div>
    </div>
    <div style="background:${weeklyNeed>0?'linear-gradient(135deg,#f59e0b18,#ef444412)':'var(--gdim)'};padding:7px 4px;border-radius:6px;border:1px solid ${weeklyNeed>0?'var(--amber)':'var(--green)'}">
      <div style="color:var(--t2);margin-bottom:2px;font-size:11px">今週必要</div>
      <div style="font-weight:800;font-size:13px;color:${weeklyNeed>0?'var(--amber)':'var(--green)'}">${weeklyNeed>0?fmtVal(weeklyNeed):'達成済✓'}</div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--t3);margin-top:6px;text-align:right">月末まで${daysLeft}日 / 残り約${weeksLeft}週</div>
</div>`;
    });
    weeklyCtx=`<div style="margin-bottom:14px">
  <div style="font-size:14px;font-weight:800;color:var(--amber);margin-bottom:10px">⚡ 今週必要な目標数値</div>
  ${weeklyRows.length
    ?weeklyRows.join('')
    :`<div style="text-align:center;padding:20px;background:var(--card2);border-radius:12px;color:var(--t2);font-size:13px">

  <button class="btn btn-g btn-xs" style="margin-top:10px" onclick="GV='this_month';render()">今月の目標を管理 →</button>
</div>`;
  }

  // ===今月専用: 3ヶ月後のKPIから今月必要数値を算出===
  let monthlyCtx='';
  if(tabDef.v==='this_month'){
    const kpi3m=div?(div.horizons?.['3m']?.kpis||[]):[];

// ===達成実績ヘルパー===
function getWeekRange(){
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{from:mon.toLocalYmd(),to:sun.toLocalYmd()};
}
function getAchievements(from,to){
  const inRange=d=>d&&(!from||d>=from)&&(!to||d<=to);
  // 営業獲得: logsの成約 + 案件管理のsharedDate（ログがない場合のフォールバック）
  const salesLog=(S.logs||[]).filter(l=>!l.deleted&&l.type==='sales'&&l.result==='成約'&&inRange(l.date)).length;
  const salesJob=(S.jobs||[]).filter(j=>!j.deleted&&inRange(j.sharedDate)).length;
  const sales=salesLog||salesJob;
  // 採用: logsの内定 + ワーカー管理の本採用（createdAtで判定）
  const hiresLog=(S.logs||[]).filter(l=>!l.deleted&&l.type==='hire'&&l.result==='内定'&&inRange(l.date)).length;
  const hiresWorker=(S.workers||[]).filter(w=>!w.deleted&&w.status==='本採用'&&inRange((w.hiredAt||w.createdAt||'').slice(0,10))).length;
  const hires=hiresLog||hiresWorker;
  // 利益: paymentDateベース（案件管理の月別利益と同じ基準）
  const profit=(S.jobs||[]).filter(j=>!j.deleted&&inRange(j.paymentDate)).reduce((s,j)=>s+jobMainProfit(j),0);
  return{sales,hires,profit};
}

const HORIZON_LABELS={'5y':'5年後','1y':'1年後','6m':'半年後','3m':'3ヶ月後','1m':'今月','1w':'今週'};
const HORIZON_DESC={'5y':'5年後のビジョン・長期目標','1y':'1年後の目標・年間KPI','6m':'半年後の目標・中期KPI','3m':'3ヶ月後の目標・四半期KPI','1m':'今月の目標・月次KPI','1w':'今週の目標・振り返り'};

function rHorizonTab(div,period){
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[],updatedAt:null};
  const h=div.horizons[period];
  const label=HORIZON_LABELS[period]||period;
  const desc=HORIZON_DESC[period]||'';
  const kpis=h.kpis||[];

  // ===今週タブ専用: 今月の目標＋週次目標数値===
  let weeklyContextSection='';
  if(period==='1w'){
    // 今月の目標（S.goals から）
    const thisMonthGoals=(S.goals||[]).filter(g=>!g.deleted&&g.horizon==='this_month'&&g.divisionId===div.id);
    // 今月のKPI（1mホライズン）から今週必要な数値を計算
    const monthKpis=(div.horizons?.['1m']?.kpis||[]);
    // 残り日数・週数を計算
    const td=today();
    const now=new Date(td);
    const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0);
    const daysLeft=Math.max(1,Math.ceil((endOfMonth-now)/(1000*60*60*24))+1);
    const weeksLeft=Math.max(1,Math.ceil(daysLeft/7));
    const daysInMonth=endOfMonth.getDate();
    const daysPassed=now.getDate()-1;
    const progressRatio=daysPassed/daysInMonth;

    const monthGoalsHtml=thisMonthGoals.length
      ?thisMonthGoals.map(g=>{
          const pct=g.progress||0;
          const col=pct>=100?'green':pct>=60?'blue':pct>=30?'amber':'red';
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
  <span style="font-size:16px">${GOAL_CATS.find(c=>c.v===g.category)?.l.split(' ')[0]||'🎯'}</span>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</div>
    <div style="height:5px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden"><div style="height:100%;background:var(--${col});width:${pct}%;border-radius:3px"></div></div>
  </div>
  <span style="font-size:12px;font-weight:700;color:var(--${col});flex-shrink:0">${pct}%</span>
</div>`;
        }).join('')
      :`<div style="font-size:13px;color:var(--t2);padding:8px 0">今月の目標がまだ登録されていません</div>`;

    const weeklyKpiRows=monthKpis.length
      ?monthKpis.map(k=>{
          const remaining=Math.max(0,(k.target||0)-(k.current||0));
          const weeklyNeed=Math.ceil(remaining/weeksLeft);
          const pct=k.target>0?Math.min(100,Math.round((k.current||0)/k.target*100)):0;
          const col=pct>=100?'green':pct>=60?'blue':pct>=30?'amber':'red';
          return`<div class="card card-sm" style="margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="flex:1;font-weight:600;font-size:13px">${esc(k.title)}</div>
    <span class="badge b${col==='green'?'g':col==='blue'?'b':col==='amber'?'a':'r'}" style="font-size:11px">${pct}%</span>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;text-align:center">
    <div style="background:var(--card2);padding:6px;border-radius:6px"><div style="color:var(--t2);margin-bottom:2px">月間目標</div><div style="font-weight:700">${(k.target||0).toLocaleString()}${esc(k.unit||'')}</div></div>
    <div style="background:var(--card2);padding:6px;border-radius:6px"><div style="color:var(--t2);margin-bottom:2px">現状</div><div style="font-weight:700;color:var(--${col})">${(k.current||0).toLocaleString()}${esc(k.unit||'')}</div></div>
    <div style="background:${weeklyNeed>0?'linear-gradient(135deg,#f59e0b18,#ef444412)':'var(--card2)'};padding:6px;border-radius:6px;border:${weeklyNeed>0?'1px solid var(--amber)':'none'}"><div style="color:var(--t2);margin-bottom:2px">今週必要</div><div style="font-weight:800;color:${weeklyNeed>0?'var(--amber)':'var(--t3)'}">${weeklyNeed.toLocaleString()}${esc(k.unit||'')}</div></div>
  </div>
  <div style="font-size:11px;color:var(--t3);margin-top:4px">残り約${weeksLeft}週 / 月末まで${daysLeft}日</div>
</div>`;
        }).join('')
      :`<div style="font-size:13px;color:var(--t2);padding:8px 0">今月タブにKPIを設定すると今週必要な数値を自動計算します</div>`;

    weeklyContextSection=`
<div class="card" style="margin-bottom:14px;padding:14px 18px">
  <div style="font-size:13px;font-weight:800;color:var(--blue);margin-bottom:10px">📅 今月の目標（目標管理より）</div>
  ${monthGoalsHtml}
  <button class="btn btn-g btn-xs" style="margin-top:8px" onclick="V='goals';GV='this_month';render()">今月の目標を管理 →</button>
</div>
<div style="margin-bottom:14px">
  <div style="font-size:13px;font-weight:800;color:var(--amber);margin-bottom:8px">⚡ 今週必要な目標数値（今月KPIより自動計算）</div>
  ${weeklyKpiRows}
</div>`;
  }
  const kpiRows=kpis.length===0
    ?`<div style="text-align:center;padding:16px;color:var(--t2);font-size:13px">KPIがまだありません</div>`
    :kpis.map(k=>{
      const pct=k.target>0?Math.min(100,Math.round((k.current||0)/k.target*100)):0;
      const col=pct>=100?'green':pct>=60?'blue':pct>=30?'amber':'red';
      const colClass=pct>=100?'bg':pct>=60?'bb':pct>=30?'ba':'br';
      return `<div class="card card-sm" style="margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="flex:1;font-weight:600;font-size:14px">${esc(k.title)}</div>
    <button class="btn btn-g btn-xs btn-red" onclick="delHorizonKpi('${div.id}','${period}','${k.id}')">🗑</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden">
      <div style="height:100%;background:var(--${col});width:${pct}%;border-radius:4px;transition:width .4s"></div>
    </div>
    <span class="badge ${colClass}" style="flex-shrink:0">${pct}%</span>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--t2);align-items:center">
    <span>現状: <input id="hz-kpi-cur-${k.id}" type="number" value="${k.current||0}" style="width:70px;padding:2px 6px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text);font-size:12px"></span>
    <span>目標: <b style="color:var(--text)">${k.target||0}${esc(k.unit||'')}</b></span>
    ${k.unit?`<span>単位: <b style="color:var(--text)">${esc(k.unit)}</b></span>`:''}
  </div>
</div>`;
    }).join('');

  return`<div style="margin-bottom:12px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div style="font-size:18px;font-weight:700;color:var(--pl)">${label}</div>
    <div style="font-size:12px;color:var(--t2)">${desc}</div>
    ${h.updatedAt?`<span class="badge bk" style="font-size:11px">最終更新: ${h.updatedAt}</span>`:''}
  </div>
</div>
${weeklyContextSection}
<div class="card" style="margin-bottom:12px">
  <div style="font-size:13px;font-weight:700;color:var(--pl);margin-bottom:8px">🎯 ${label}の大きな目標・ビジョン</div>
  <textarea id="hz-goal-${div.id}-${period}" rows="4" placeholder="例：〇〇を実現し、月収〇〇万円を達成する" style="width:100%;box-sizing:border-box;margin-bottom:10px">${esc(h.goal||'')}</textarea>
  <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px">
    <span id="hz-goal-saved-${div.id}-${period}" style="font-size:12px;color:var(--green);opacity:0;transition:opacity .4s">✅ 保存しました</span>
    <button class="btn btn-p btn-sm" onclick="saveHorizonGoal('${div.id}','${period}')">💾 保存</button>
  </div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

function autoSaveHorizonGoal(divId,period){
  // 即時保存（debounce廃止）— renderを呼ばないためテキストが消えない
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[]};
  const goalEl=document.getElementById('hz-goal-'+divId+'-'+period);
  if(!goalEl)return;
  div.horizons[period].goal=goalEl.value;
  save();
}
function saveHorizonGoal(divId,period){
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[]};
  const goalEl=document.getElementById('hz-goal-'+divId+'-'+period);
  if(!goalEl){toast('入力欄が見つかりません','err');return;}
  div.horizons[period].goal=goalEl.value;
  div.horizons[period].updatedAt=today();
  save();
  toast('💾 ビジョンを保存しました');
  const indicator=document.getElementById('hz-goal-saved-'+divId+'-'+period);
  if(indicator){indicator.style.opacity='1';setTimeout(()=>indicator.style.opacity='0',2000);}
}
function saveHorizon(divId,period){
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  if(!div.horizons)div.horizons={};
  if(!div.horizons[period])div.horizons[period]={goal:'',kpis:[]};
  const goalEl=document.getElementById('hz-goal-'+divId+'-'+period);
  if(goalEl)div.horizons[period].goal=goalEl.value;

    if(i){i.title=title;i.priority=document.getElementById('iss-priority')?.value||'medium';i.status=document.getElementById('iss-status')?.value||'open';i.kpiId=kpiId||null;}
  } else {
    div.issues.push({id:uid(),title,priority:document.getElementById('iss-priority')?.value||'medium',status:'open',kpiId:kpiId||null,createdAt:new Date().toISOString()});
  }
  save();closeModal();render();toast('イシューを保存しました');
}
function delIssue(divId,id){
  if(!confirm('このイシューを削除しますか？'))return;
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  const i=div.issues?.find(i=>i.id===id);
  if(i)i.deleted=true;
  save();render();toast('イシューを削除しました');
}
function changeIssueStatus(divId,id,newStatus){
  const div=S.divisions.find(d=>d.id===divId);
  if(!div)return;
  const i=div.issues?.find(i=>i.id===id);
  if(i){i.status=newStatus;save();render();}
}

function saveWorkerModal(id){
  const name=document.getElementById('wm-name')?.value.trim();
  if(!name){toast('名前を入力してください','err');return;}
  const skills=document.getElementById('wm-skills')?.value.trim();
  const contact=document.getElementById('wm-contact')?.value.trim();
  const affiliation=document.getElementById('wm-affiliation')?.value.trim();
  const minFee=parseInt(document.getElementById('wm-minfee')?.value)||0;
  const workConditions=document.getElementById('wm-workcond')?.value.trim();
  const employStatus=document.getElementById('wm-status')?.value||'trial';
  if(!S.logs)S.logs=[];
  if(id){
    const w=S.workers.find(w=>w.id===id);
    const prevStatus=w?.employStatus||'trial';
    if(w)Object.assign(w,{name,skills,contact,affiliation,minFee,workConditions,employStatus});
    // 採用予定→トライアル昇格トースト
    if(prevStatus==='prospect'&&employStatus==='trial'){toast(`🎬 ${name} のトライアルを開始しました`);}
    // トライアル→本採用に変わった瞬間に採用自動記帳（result:'内定' で目標達成確認にカウント）
    if(prevStatus!=='hired'&&employStatus==='hired'){
      S.logs.push({id:uid(),type:'hire',date:today(),title:name,result:'内定',note:'本採用に変更時に自動記帳',createdAt:new Date().toISOString()});
      toast(`👤 ${name} の本採用を目標達成確認に記帳しました`);
    }
  }else{
    if(!S.workers)S.workers=[];
    const wid2=uid();
    S.workers.push({id:wid2,name,skills,contact,affiliation,minFee,workConditions,employStatus,createdAt:new Date().toISOString()});
    // 本採用で追加した場合のみ採用目標に記帳（トライアルは記帳しない）
    if(employStatus==='hired'){
      S.logs.push({id:uid(),type:'hire',date:today(),title:name,result:'内定',note:'本採用で追加時に自動記帳',sourceWorkerId:wid2,createdAt:new Date().toISOString()});
      toast(`👤 ${name} の本採用を目標に記帳しました`);
    }
  }
  save();closeModal();render();toast('ワーカー情報を保存しました');
}

function backfillGoalsData(){
  if(!confirm('既存のワーカー・クライアント・完了案件のデータを目標達成記録に一括登録します。重複は自動スキップされます。よろしいですか？'))return;
  if(!S.logs)S.logs=[];
  let hireN=0,salesN=0,revN=0;

  // 1. 既存ワーカー → 採用ログ（本採用のみ。トライアルは除外）
  (S.workers||[]).filter(w=>w.employStatus==='hired').forEach(w=>{
    const already=S.logs.find(l=>!l.deleted&&l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||(l.title===w.name)));
    if(!already){
      const dt=(w.createdAt||new Date().toISOString()).slice(0,10);
      S.logs.push({id:uid(),type:'hire',date:dt,title:w.name,result:'内定',note:'過去データ一括登録',sourceWorkerId:w.id,createdAt:new Date().toISOString()});
      hireN++;
    }
  });
  // トライアルワーカーの誤った採用ログを削除
  (S.workers||[]).filter(w=>w.employStatus!=='hired').forEach(w=>{
    S.logs.filter(l=>!l.deleted&&l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||l.title===w.name)).forEach(l=>{l.deleted=true;cleanN++;});
  });

  // 2. 既存クライアント → 営業（成約）ログ（トライアルは除外）
  (S.clients||[]).filter(c=>!c.deleted&&!c.isTrial).forEach(c=>{
    const already=S.logs.find(l=>!l.deleted&&l.type==='sales'&&l.result==='成約'&&(l.sourceClientId===c.id||(l.title===c.name)));
    if(!already){
      const dt=(c.createdAt||new Date().toISOString()).slice(0,10);
      S.logs.push({id:uid(),type:'sales',date:dt,title:c.name,result:'成約',note:'過去データ一括登録',sourceClientId:c.id,createdAt:new Date().toISOString()});
      salesN++;
    }
  });
  // トライアルクライアントの誤った成約ログを削除
  let cleanN=0;
  (S.clients||[]).filter(c=>c.isTrial).forEach(c=>{
    S.logs.filter(l=>!l.deleted&&l.type==='sales'&&l.result==='成約'&&(l.sourceClientId===c.id||l.title===c.name)).forEach(l=>{l.deleted=true;cleanN++;});
  });

  // 3. 完了案件 → 収益ログ
  (S.jobs||[]).filter(j=>!j.deleted&&j.status==='完了').forEach(j=>{
    const already=S.logs.find(l=>!l.deleted&&l.sourceJobId===j.id&&l.type==='revenue');
    if(!already){
      const amount=(j.unitPrice||0)-(j.workerPay||0);
      if(amount<=0)return;
      const dt=j.paymentDate||j.deliveryDate||(j.createdAt||new Date().toISOString()).slice(0,10);
      const client=S.clients?.find(c=>c.id===j.clientId);
      S.logs.push({id:uid(),type:'revenue',date:dt,title:j.title,clientId:j.clientId||null,amount,sourceJobId:j.id,note:'過去データ一括登録',createdAt:new Date().toISOString()});
      revN++;
    }
  });

  save();render();
  toast(`✅ 採用 ${hireN}件・営業 ${salesN}件・収益 ${revN}件 を登録${cleanN?`・${cleanN}件の誤ログを削除`:''}しました`);
}

function mdToHtml(text){
  const blocks=[];
  text=text.replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    blocks.push({lang,code});return`\x00BLK${blocks.length-1}\x00`;
  });
  text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text=text.replace(/\x00BLK(\d+)\x00/g,(_,i)=>{
    const b=blocks[i];const ec=b.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return`<pre><code${b.lang?` class="lang-${b.lang}"`:''} style="display:block">${ec}</code></pre>`;
  });
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text=text.replace(/^### (.+)$/gm,'<h4 style="margin:8px 0 3px;font-size:13px">$1</h4>');
  text=text.replace(/^## (.+)$/gm,'<h3 style="margin:10px 0 4px;font-size:14px">$1</h3>');
  text=text.replace(/^# (.+)$/gm,'<h2 style="margin:12px 0 4px;font-size:15px;font-weight:700">$1</h2>');
  text=text.replace(/^[-*•] (.+)$/gm,'<li>$1</li>');
  text=text.replace(/(<li>[\s\S]+?<\/li>)/g,'<ul style="margin:6px 0;padding-left:18px">$1</ul>');
  text=text.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  text=text.replace(/\n\n/g,'<br><br>');
  text=text.replace(/\n/g,'<br>');
  return text;
}

async function sendAIMessage(){
  if(_chatLoading)return;
  const el=document.getElementById('ai-input');if(!el)return;
  const text=el.value.trim();if(!text)return;
  const key=getAIKey(_chatModel);
  if(!key){
    if(_chatModel==='gemini'){toast('GoogleログインまたはAPIキーの登録が必要です','warn');}
    else{toast('APIキーが設定されていません。設定画面で登録してください','warn');V='settings';render();}
    return;
  }
  el.value='';el.style.height='auto';
  _chatHistory.push({role:'user',content:text});
  _chatLoading=true;
  renderAIChatOnly();
  try{
    let reply='';
    if(_chatModel==='gemini'){
      reply=await callGemini(_chatHistory,key,_chatCtx?getAppContext():null);
    }else{
      const sys=_chatModel==='claude-code'
        ?'あなたはエキスパートプログラマーです。コーディング・デバッグ・技術的な質問に特化して、正確で実用的な回答を日本語でしてください。コードは必ずコードブロックで記述してください。'
        :'あなたは優秀なビジネスアシスタントです。ユーザーはYouTubeクリエイターで、動画制作・案件管理・目標達成をサポートするアプリを使っています。簡潔で実用的なアドバイスを日本語でしてください。';
      reply=await callClaude(_chatHistory,key,sys,_chatCtx?getAppContext():null);
    }
    _chatHistory.push({role:'assistant',content:reply,model:_chatModel});
  }catch(e){
    _chatHistory.push({role:'assistant',content:`❌ エラーが発生しました: ${e.message}`,model:_chatModel});
    console.error('AI error:',e);
  }
  _chatLoading=false;
  renderAIChatOnly();
}
async function callGemini(history,apiKey,ctx){
  const contents=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
  if(ctx&&contents.length===1){contents[0].parts[0].text=`【アプリ状況】\n${ctx}\n\n${contents[0].parts[0].text}`;}
  const useOAuth=apiKey==='__oauth__';
  const url=useOAuth
    ?'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent'
    :`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  const headers={'Content-Type':'application/json'};
  if(useOAuth)headers['Authorization']=`Bearer ${_gcalToken}`;
  const res=await fetch(url,{method:'POST',headers,body:JSON.stringify({contents,generationConfig:{maxOutputTokens:2048}})});
  const d=await res.json();
  if(!res.ok){
    if(useOAuth&&res.status===403){
      throw new Error('Google API の権限が不足しています。Google Cloud プロジェクトで「Generative Language API」を有効にするか、設定画面でAPIキーを登録してください。');
    }
    throw new Error(d.error?.message||`Gemini API error (${res.status})`);
  }
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'(応答なし)';
}
async function callClaude(history,apiKey,system,ctx){
  const messages=history.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}));
  if(ctx&&messages.length===1){messages[0].content=`【アプリ状況】\n${ctx}\n\n${messages[0].content}`;}
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2048,system,messages})
  });
  const d=await res.json();
  if(!res.ok)throw new Error(d.error?.message||`Claude API error (${res.status})`);
  return d.content?.[0]?.text||'(応答なし)';
}

function moveSub(btn,dir){
  const row=btn.parentElement;
  const cont=row.parentElement;
  const rows=[...cont.children];
  const i=rows.indexOf(row);
  const ni=i+dir;
  if(ni<0||ni>=rows.length)return;
  if(dir===-1)cont.insertBefore(row,rows[ni]);
  else cont.insertBefore(rows[ni],row);
}
function saveTask(){
  const title=document.getElementById('t-ttl')?.value.trim();
  if(!title){toast('タスク名を入力してください','err');return;}
  const mins=parseInt(document.getElementById('t-mins')?.value)||null;
  const subs=[...document.querySelectorAll('.sub-inp')].map(i=>i.value.trim()).filter(Boolean).map(title=>({title,done:false}));
  // 複数時間帯: 1行目=primary, 2行目以降=timeSlots
  const tsRows=[...document.querySelectorAll('#timeslot-cont .ts-row')];
  const timeSlots=tsRows.slice(1).map(r=>({
    s:r.querySelector('.ts-start')?.value||'',
    e:r.querySelector('.ts-end')?.value||''
  })).filter(sl=>sl.s||sl.e);
  const dueDate=document.getElementById('t-due').value||null;
  const dueTime=dueDate?(document.getElementById('t-due-time')?.value||null):null;
  if(EID){
    const t=S.tasks.find(t=>t.id===EID);
    if(t){Object.assign(t,{title,description:document.getElementById('t-desc').value.trim(),dueDate,dueTime,priority:document.getElementById('t-pri').value||null,startTime:document.getElementById('t-start').value||null,endTime:document.getElementById('t-end').value||null,timeSlots,estimatedMinutes:mins,subtasks:subs.map((s,i)=>({...s,done:t.subtasks?.[i]?.done||false}))});}
    toast('タスクを更新しました');
  }else{
    const t={id:uid(),title,description:document.getElementById('t-desc').value.trim(),dueDate,dueTime,priority:document.getElementById('t-pri').value||null,startTime:document.getElementById('t-start').value||null,endTime:document.getElementById('t-end').value||null,timeSlots,estimatedMinutes:mins,subtasks:subs,done:false,procCount:0,createdAt:new Date().toISOString()};

    if(window._fsPendingBlockId!==undefined){
      t.fsBlockId=window._fsPendingBlockId;
      t.fsSlot=window._fsPendingSlot??9999;
      window._fsPendingBlockId=undefined;window._fsPendingSlot=undefined;
    }
    S.tasks.unshift(t);
    if(mins&&mins<=2)toast('⚡ 2分以内！今すぐやりましょう！','warn');
    else toast('タスクを追加しました');
  }
  save();closeModal();render();
}
// 固定スケジュール内の特定スロット位置にタスク追加
function openFsTaskModal(blockId,slot,startTime,date){
  window._fsPendingBlockId=blockId;
  window._fsPendingSlot=slot;
  openTaskModal(null,date,startTime);
}
// 固定スケジュール内のドラッグドロップ（スロット移動・並び替え・ブロック間移動）
function fsInternalDrop(e,blockId,slot,date,startTime){
  e.preventDefault();e.stopPropagation();
  e.currentTarget?.classList.remove('fs-dz-over');
  const id=_taskDragId;
  if(!id)return;
  const t=S.tasks.find(t=>t.id===id);
  if(!t){_taskDragId=null;return;}
  const wasUnassigned=!t.fsBlockId;
  const isSameBlock=t.fsBlockId===blockId;
  t.fsBlockId=blockId;
  t.fsSlot=slot;
  if(wasUnassigned){
    // パネルからの新規割り当て: 日付とstartTimeを設定
    if(date)t.dueDate=date;
    if(startTime&&startTime!=='-1')t.startTime=startTime;
    toast(`📌 ${esc(t.title)} をスケジュールに割り当てました`);
  } else if(isSameBlock){
    // 同ブロック内並び替え: S.tasks内の順序も更新
    const from=S.tasks.findIndex(t2=>t2.id===id);
    if(from>=0){
      const [item]=S.tasks.splice(from,1);
      const blockTasks=S.tasks.filter(t2=>!t2.deleted&&t2.fsBlockId===blockId);
      if(slot===-1){
        // 先頭に移動: ブロック内最初のタスクの前に挿入
        const firstIdx=S.tasks.findIndex(t2=>!t2.deleted&&t2.fsBlockId===blockId);
        if(firstIdx>=0)S.tasks.splice(firstIdx,0,item);
        else S.tasks.push(item);
      } else {
        // slot番目のタスクの後に挿入
        const refTask=blockTasks[slot];
        if(refTask){
          const refIdx=S.tasks.findIndex(t2=>t2.id===refTask.id);
          S.tasks.splice(refIdx+1,0,item);
        } else S.tasks.push(item);
      }
    }
  } else {
    // 別ブロックへの移動: 時間帯も移動先ブロックに合わせる（dueDateは保持）
    if(startTime&&startTime!=='-1'&&startTime!=='')t.startTime=startTime;
    toast(`🔀 ${esc(t.title)} を移動しました`);
  }
  save();render();
  _taskDragId=null;
}
function fsInternalDragOver(e){e.preventDefault();e.currentTarget?.classList.add('fs-dz-over');}
function fsInternalDragLeave(e){e.currentTarget?.classList.remove('fs-dz-over');}

function saveJob(){
  const title=document.getElementById('j-ttl')?.value.trim();
  if(!title){toast('タイトルを入力してください','err');return;}
  if(!document.getElementById('j-invoice')?.value){toast('請求書提出日を入力してください（請求書ページで使います）','warn');return;}
  const oldSubs=EID?S.jobs.find(j=>j.id===EID)?.subtasks||[]:[];
  const subEls=[...document.querySelectorAll('#j-sub-cont .j-sub-row')];
  const subtasks=subEls.map((el,i)=>{
    const inp=el.querySelector('.j-sub-inp');const chk=el.querySelector('.chk');
    const price=parseInt(el.querySelector('.j-sub-price')?.value)||0;
    const pay=parseInt(el.querySelector('.j-sub-pay')?.value)||0;
    return{
      title:inp?.value.trim()||'',done:chk?.classList.contains('done')||false,
      unitPrice:price,workerPay:pay,
      status:el.querySelector('.j-sub-status')?.value||'未着手',
      workerId:el.querySelector('.j-sub-worker')?.value||null,
      sharedDate:el.querySelector('.j-sub-shared')?.value||null,
      editorDraftDate:el.querySelector('.j-sub-editor')?.value||null,
      clientDraftDate:el.querySelector('.j-sub-client')?.value||null,
      deliveryDate:el.querySelector('.j-sub-deliver')?.value||null,
      payoutDate:el.querySelector('.j-sub-payout')?.value||null,
    };
  }).filter(s=>s.title);
  const hasPricedSubs=subtasks.some(s=>s.unitPrice>0||s.workerPay>0);
  const unitPrice=hasPricedSubs?subtasks.reduce((s,sub)=>s+(sub.unitPrice||0),0):(parseInt(document.getElementById('j-unit')?.value)||0);
  const selWorkerIds=[...document.querySelectorAll('.j-worker-cb:checked')].map(cb=>cb.value);
  const onlySelf=selWorkerIds.length===0||selWorkerIds.every(id=>id===SELF_WID);
  const workerPay=hasPricedSubs?subtasks.filter(s=>s.workerId!==SELF_WID).reduce((s,sub)=>s+(sub.workerPay||0),0):(onlySelf?0:parseInt(document.getElementById('j-wpay')?.value)||0);
  const isTrial=document.getElementById('j-trial-val')?.value==='1';
  const data={title,jobType:document.getElementById('j-type')?.value||'edit',clientId:document.getElementById('j-cl').value||null,workerIds:selWorkerIds,workerId:selWorkerIds[0]||null,scope:document.getElementById('j-scope').value||null,status:document.getElementById('j-stat').value,isTrial,unitPrice,profit:unitPrice,workerPay,sharedDate:document.getElementById('j-shared').value||null,editorDraftDate:document.getElementById('j-editor-draft').value||null,clientDraftDate:document.getElementById('j-client-draft').value||null,thumbnailDate:document.getElementById('j-thumbnail')?.value||null,deliveryDate:document.getElementById('j-deliver').value||null,invoiceDate:document.getElementById('j-invoice').value||null,dueDate:document.getElementById('j-due')?.value||null,paymentDate:document.getElementById('j-payin').value||null,payoutDate:document.getElementById('j-payout').value||null,notes:document.getElementById('j-notes').value.trim(),subtasks};
  if(EID){
    const j=S.jobs.find(j=>j.id===EID);
    const prevStatus=j?.status;
    if(j)Object.assign(j,data);
    // 完了に変更された瞬間に収益自動記帳
    if(prevStatus!=='完了'&&data.status==='完了'&&data.unitPrice>0){
      const profit=data.unitPrice-(data.workerPay||0);
      if(!S.logs)S.logs=[];
      const already=S.logs.find(l=>!l.deleted&&l.sourceJobId===EID&&l.type==='revenue');
      if(!already){
        S.logs.push({id:uid(),type:'revenue',date:today(),title:data.title,clientId:data.clientId||null,amount:profit,sourceJobId:EID,createdAt:new Date().toISOString()});
        toast(`💰 収益 ¥${profit.toLocaleString()} を目標達成確認に自動記帳しました`);
      }
    }
  }
  else S.jobs.unshift({id:uid(),...data,createdAt:new Date().toISOString()});
  save();closeModal();render();toast('案件を保存しました');
  if(_gcalToken&&S.settings?.sheetsId){const _sj=EID?S.jobs.find(j=>j.id===EID):S.jobs[0];if(_sj)sheetsWriteJob(_sj).then(()=>toast('📊 スプレッドシートを更新しました'));}
  // ※ GcalへのアプリデータWriteは行わない（読み戻し重複防止）
}

function toggleHabit(id,date){

  const done=h.completedDates.includes(date);
  const fail=h.failedDates.includes(date);
  if(!done&&!fail){
    // なし→✓
    h.completedDates.push(date);
    const s=calcStreak(h.completedDates);
    if(s%7===0&&s>0)toast(`🔥 ${s}日連続達成！素晴らしい！`);else toast('✅ 習慣を記録しました！');
  }else if(done){
    // ✓→✗
    h.completedDates=h.completedDates.filter(d=>d!==date);
    h.failedDates.push(date);
    toast('✕ できなかった日として記録しました');
  }else{
    // ✗→なし
    h.failedDates=h.failedDates.filter(d=>d!==date);
  }
  save();render();
}

let _pomoInterval=null,_pomoSec=0,_pomoRunning=false,_pomoMode='work',_pomoTaskId=null;
function initPomo(){_pomoSec=(S.settings.workMin||25)*60;updPomoDisp();}
function updPomoDisp(){
  const m=Math.floor(_pomoSec/60).toString().padStart(2,'0'),s=(_pomoSec%60).toString().padStart(2,'0');
  const el=document.getElementById('pomo-display');
  if(el){el.textContent=`${m}:${s}`;el.style.color=_pomoMode==='break'?'var(--green)':'var(--text)';}
  const btn=document.getElementById('pomo-go');
  if(btn)btn.textContent=_pomoRunning?'⏸ 停止':'▶ '+(_pomoSec<(_pomoMode==='work'?(S.settings.workMin||25):( S.settings.breakMin||5))*60?'再開':'開始');
}
function togglePomo(){
  if(_pomoRunning){clearInterval(_pomoInterval);_pomoRunning=false;updPomoDisp();return;}
  _pomoRunning=true;
  _pomoInterval=setInterval(()=>{
    _pomoSec--;updPomoDisp();
    if(_pomoSec<=0){
      clearInterval(_pomoInterval);_pomoRunning=false;
      if(_pomoMode==='work'){
        if(!S._pomoToday)S._pomoToday=0;S._pomoToday++;save();
        const cnt=S.pomodoroSessions?S.pomodoroSessions.length:0;
        if(!S.pomodoroSessions)S.pomodoroSessions=[];
        S.pomodoroSessions.push({date:today(),taskId:_pomoTaskId,dur:S.settings.workMin||25});
        save();updSessionCount();
        _pomoMode='break';_pomoSec=(S.settings.breakMin||5)*60;
        toast('🍅 ポモドーロ完了！休憩しましょう');
        if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('mono.create 社内連絡',{body:'🍅 集中セッション完了！休憩してください'});
      }else{
        _pomoMode='work';_pomoSec=(S.settings.workMin||25)*60;
        const tn=document.getElementById('pomo-task-name');if(tn){tn.style.display='none';tn.textContent='';}
        _pomoTaskId=null;toast('☕ 休憩終了！次のセッションを始めましょう');
      }
      updPomoDisp();
    }
  },1000);
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
}
function resetPomo(){
  clearInterval(_pomoInterval);_pomoRunning=false;_pomoMode='work';_pomoTaskId=null;
  _pomoSec=(S.settings.workMin||25)*60;
  const tn=document.getElementById('pomo-task-name');if(tn){tn.style.display='none';tn.textContent='';}
  updPomoDisp();
}
function startPomoFor(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  _pomoTaskId=id;_pomoMode='work';_pomoSec=(S.settings.workMin||25)*60;
  const tn=document.getElementById('pomo-task-name');if(tn){tn.textContent=t.title;tn.style.display='block';}
  if(!_pomoRunning)togglePomo();

// navConfig(表示/非表示・並び順)は社内アプリ専用の localStorage 'mc_navconfig' に分離(2026-07-10 恒久修正)。
// EditFlowと共有する個人doc(S.navConfig)から独立させ、aa05f91の「常時全表示」応急処置を撤去。
// 端末ごとの個人設定(会長と佐々木で別々の表示にできる)。初期値は全表示。旧S.navConfigのhidden値は移行時に無視。
const NAVCFG_LS='mc_navconfig';
function getNavCfg(){
  let cfg=null;
  try{cfg=JSON.parse(localStorage.getItem(NAVCFG_LS)||'null');}catch(_){cfg=null;}
  if(!Array.isArray(cfg)){
    // 初回移行: 並び順のみ旧S.navConfigから引き継ぎ、hiddenは全て解除(EditFlow由来の壊れた値を無視)
    cfg=[];
    (Array.isArray(S.navConfig)?S.navConfig:[]).forEach(c=>{
      if(c&&c.id&&BUILTIN_VIEWS.some(v=>v.id===c.id)&&!cfg.some(x=>x.id===c.id))cfg.push({id:c.id,hidden:false});
    });
  }
  cfg=cfg.filter(c=>c&&BUILTIN_VIEWS.some(v=>v.id===c.id));
  BUILTIN_VIEWS.forEach(v=>{if(!cfg.some(c=>c.id===v.id))cfg.push({id:v.id,hidden:false});});
  cfg.forEach(c=>{c.hidden=!!c.hidden;});
  // 社内アプリでは個人カスタムページ(cp_)をサイドバーに注入しない（情報漏洩防止）
  return cfg;
}
function setNavCfg(cfg){try{localStorage.setItem(NAVCFG_LS,JSON.stringify(cfg));}catch(_){}}
function navResetAll(){
  const cfg=getNavCfg();cfg.forEach(c=>{c.hidden=false;});
  setNavCfg(cfg);render();toast('すべてのタブを表示に戻しました');
}
function navMeta(id){
  const bv=BUILTIN_VIEWS.find(v=>v.id===id);if(bv)return{label:bv.label,icon:bv.icon};
  if(id.startsWith('cp_')){const p=(S.customPages||[]).find(p=>`cp_${p.id}`===id);if(p)return{label:p.title,icon:p.icon||'📄'};}
  return{label:id,icon:'📄'};
}

const NAV_CATS=[
  {id:'sales',label:'営業',views:['salesleads','pipeline','inquiries','crm','salessites']},

function _navCatOf(id){return NAV_CATS.find(cat=>cat.views.includes(id))||null;}
function renderNav(){
  const cfg=getNavCfg();
  const el=document.getElementById('nav-items');if(!el)return;
  const visible=cfg.filter(c=>!c.hidden);
  const catState=getNavCatState();
  const navItemHTML=(c,draggable=false)=>{
    const{label,icon}=navMeta(c.id);
    const idx=cfg.indexOf(c);
    if(draggable){
      return`<div class="nav-item${V===c.id?' active':''}" data-view="${c.id}"
        draggable="true"
        ondragstart="sideNavDragStart(event,${idx})"
        ondragend="sideNavDragEnd(event)"
        ondragover="sideNavDragOver(event)"
        ondragleave="sideNavDragLeave(event)"
        ondrop="sideNavDrop(event,${idx})">
        <span class="nav-drag-handle" title="ドラッグで並び替え">⠿</span><span class="nav-icon">${icon}</span>${label}</div>`;
    }
    return`<div class="nav-item${V===c.id?' active':''}" data-view="${c.id}"><span class="nav-icon">${icon}</span>${label}</div>`;
  };
  const grouped=(draggable)=>{
    let html='';
    const used=new Set();
    const cats=[...NAV_CATS,{id:'other',label:'その他',views:null}];
    cats.forEach(cat=>{
      const items=cat.views?visible.filter(c=>cat.views.includes(c.id)):visible.filter(c=>!used.has(c.id)&&!_navCatOf(c.id));
      items.forEach(c=>used.add(c.id));
      if(!items.length)return;
      const open=catState[cat.id]!==false;
      html+=`<div class="nav-cat">
  <div class="nav-cat-hd" onclick="toggleNavCat('${cat.id}')"><span class="nav-cat-arrow">${open?'▾':'▸'}</span>${cat.label}<span style="flex:1"></span><span style="font-size:9px;opacity:.6">${items.length}</span></div>
  ${open?items.map(c=>navItemHTML(c,draggable)).join(''):''}
</div>`;
    });
    return html;
  };
  el.innerHTML=grouped(true);
  // モバイルドロワー
  const dr=document.getElementById('mob-drawer-nav');if(!dr)return;
  dr.innerHTML=grouped(false)+`<div class="nav-sep"></div>
  <div class="nav-item${V==='customize'?' active':''}" data-view="customize"><span class="nav-icon">🛠</span>カスタマイズ</div>
  <div class="nav-item${V==='settings'?' active':''}" data-view="settings"><span class="nav-icon">⚙️</span>設定</div>`;
  // 下タブバー同期
  document.querySelectorAll('.mnav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===V);
  });
}

  <button class="btn btn-p" onclick="openNewPageModal()">＋ 新しいページ</button>
</div>
${secTitle('📋 ナビゲーション管理')}
<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
  <div style="font-size:12px;color:var(--t2)">⠿ でドラッグして順番変更 ／ スイッチで表示・非表示（この端末だけの設定）</div>
  <button class="btn btn-g btn-xs" onclick="navResetAll()">すべて表示に戻す</button>

    const i=cfg.indexOf(c);
    const{label,icon}=navMeta(c.id);const isCP=c.id.startsWith('cp_');
    return`<div class="cust-nav-row${c.hidden?' hidden-row':''}" draggable="true"
    ondragstart="navDragStart(event,${i})" ondragend="navDragEnd(event)"
    ondragover="navDragOver(event)" ondragleave="navDragLeave(event)" ondrop="navDrop(event,${i})">
    <span class="drag-handle">⠿</span>
    <span style="font-size:18px;width:24px;text-align:center;flex-shrink:0">${icon}</span>
    <span style="flex:1;font-size:13px;font-weight:600">${label}</span>
    ${isCP?`<button class="btn btn-g btn-xs" onclick="editCustomPage('${c.id.slice(3)}');event.stopPropagation()">✏️ 編集</button>
    <button class="btn btn-red btn-xs" onclick="delCustomPage('${c.id.slice(3)}');event.stopPropagation()">削除</button>`:''}

  </div>`;
  }).join('');
}).join('')}
</div>
${secTitle('📄 カスタムページ')}
${cps.length?cps.map(p=>`<div class="cp-card" onclick="V='cp_${p.id}';render()">
  <span style="font-size:26px">${p.icon||'📄'}</span>
  <div style="flex:1">
    <div style="font-size:14px;font-weight:600">${esc(p.title)}</div>
    <div style="font-size:11px;color:var(--t3)">${(p.blocks||[]).length}ブロック</div>
  </div>
  <button class="btn btn-p btn-sm" onclick="editCustomPage('${p.id}');event.stopPropagation()">✏️ 編集</button>
  <button class="btn btn-red btn-xs" onclick="delCustomPage('${p.id}');event.stopPropagation()">削除</button>
</div>`).join('')
:`<div class="card card-sm" style="color:var(--t2);text-align:center;padding:24px">
  自由にページを作れます。テキスト・チェックリスト・カウンターなどのブロックを並べましょう。
