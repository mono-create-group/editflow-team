<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="社内連絡">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="apple-touch-icon.png"><link rel="icon" type="image/png" href="icon-192.png">
<title>mono.create 社内連絡アプリ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f2f8;
  --surface:#ffffff;
  --card:#ffffff;
  --card2:#f4f5fb;
  --border:#e3e5f0;
  --purple:#6d28d9;
  --pl:#7c3aed;
  --pdim:rgba(109,40,217,0.07);
  --green:#059669;
  --gdim:rgba(5,150,105,0.08);
  --amber:#b45309;
  --adim:rgba(180,83,9,0.08);
  --red:#dc2626;
  --rdim:rgba(220,38,38,0.08);
  --blue:#1d4ed8;
  --bdim:rgba(29,78,216,0.08);
  --pink:#be185d;
  --pkdim:rgba(190,24,93,0.08);
  --cyan:#0e7490;
  --cdim:rgba(14,116,144,0.08);
  --text:#0f172a;
  --t2:#64748b;
  --t3:#94a3b8;
  --r:14px;
  --rs:9px;
  --shadow:0 1px 3px rgba(15,23,42,.05),0 4px 20px rgba(15,23,42,.08);
  --shadow-sm:0 1px 3px rgba(15,23,42,.06);
  --shadow-lg:0 8px 32px rgba(15,23,42,.14),0 2px 6px rgba(15,23,42,.06);
  --fs-tl-ppm:1.2px; /* 固定タイムスケジュール: 1分あたりのpx（JS側 TL_PPM と一致させる） */
  --fs-tl-axis-w:52px; /* 時間軸の幅 */
}
@media(max-width:700px){:root{--fs-tl-axis-w:40px}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Yu Gothic',BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6;height:100vh;overflow:hidden;display:flex;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font:inherit;padding:8px 12px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow-sm)}
input:focus,textarea:focus,select:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.1)}
textarea{resize:vertical;min-height:72px}
select option{background:var(--card)}
a{color:inherit;text-decoration:none}

/* ─── LAYOUT ─── */
#sidebar{width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);box-shadow:2px 0 12px rgba(15,23,42,.04);display:flex;flex-direction:column;padding:22px 0;position:sticky;top:0;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
#main{flex:1;overflow-y:auto;min-height:0;padding:32px 36px;max-width:960px}
.logo{padding:0 18px 22px;font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--purple),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.3px}
.logo small{display:block;font-size:11px;color:var(--t3);font-weight:500;margin-top:2px;-webkit-text-fill-color:var(--t3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;margin:1px 10px;border-radius:10px;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--card2)}
.nav-item.active{color:var(--purple);background:var(--pdim);font-weight:700}
.nav-drag-handle{font-size:14px;color:var(--t3);opacity:0;cursor:grab;flex-shrink:0;line-height:1;margin-right:-4px;transition:opacity .15s}
.nav-item:hover .nav-drag-handle{opacity:1}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-sep{height:1px;background:var(--border);margin:8px 14px}

/* ─── POMODORO MINI ─── */
#pomo-mini{margin:auto 12px 0;background:linear-gradient(135deg,var(--pdim),rgba(29,78,216,0.06));border:1.5px solid rgba(109,40,217,0.15);border-radius:var(--r);padding:14px;text-align:center}
#pomo-display{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:3px;color:var(--purple)}
.pomo-lbl{font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pomo-task-name{font-size:11px;color:var(--pl);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-btns{display:flex;gap:6px;justify-content:center;margin-top:8px}
.pbtn{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;transition:all .15s}
.pbtn.go{background:linear-gradient(135deg,var(--purple),#4f46e5);color:#fff;box-shadow:0 2px 8px rgba(109,40,217,0.3)}.pbtn.go:hover{box-shadow:0 4px 12px rgba(109,40,217,0.4);transform:translateY(-1px)}
.pbtn.st{border:1.5px solid var(--border);color:var(--t2);background:var(--card)}.pbtn.st:hover{color:var(--red);border-color:var(--red)}
.pomo-sessions{font-size:11px;color:var(--t3);margin-top:4px}

/* ─── PAGE HEADER ─── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ph-title small{font-size:13px;color:var(--t2);font-weight:400;margin-left:8px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:none}
.btn-p{background:linear-gradient(135deg,var(--purple),#4f46e5);color:#fff;box-shadow:0 2px 8px rgba(109,40,217,0.25)}.btn-p:hover{box-shadow:0 4px 14px rgba(109,40,217,0.35);transform:translateY(-1px)}
.btn-g{color:var(--t2);border:1.5px solid var(--border);background:var(--card);box-shadow:var(--shadow-sm)}.btn-g:hover{color:var(--text);border-color:var(--t3)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-red{color:var(--red)}.btn-red:hover{background:var(--rdim)}

/* ─── CARDS ─── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card-sm{padding:12px 14px}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.1px}
.bp{background:var(--pdim);color:var(--purple)}
.br{background:var(--rdim);color:var(--red)}
.ba{background:var(--adim);color:var(--amber)}
.bg{background:var(--gdim);color:var(--green)}
.bb{background:var(--bdim);color:var(--blue)}
.bc{background:var(--cdim);color:var(--cyan)}
.bk{background:var(--card2);color:var(--t2)}
.bpk{background:var(--pkdim);color:var(--pink)}

/* ─── STATS GRID ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.stat-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500}
.stat-card.cp{border-color:rgba(109,40,217,0.2);background:var(--pdim)}
.stat-card.cg{border-color:rgba(5,150,105,0.2);background:var(--gdim)}
.stat-card.ca{border-color:rgba(180,83,9,0.2);background:var(--adim)}
.stat-card.cr{border-color:rgba(220,38,38,0.2);background:var(--rdim)}

/* ─── FROG BANNER ─── */
#frog-banner{background:linear-gradient(135deg,rgba(109,40,217,0.08),rgba(79,70,229,0.06));border:1.5px solid rgba(109,40,217,0.18);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(109,40,217,0.08)}
.frog-ico{font-size:30px;flex-shrink:0}
.frog-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--purple);font-weight:700}
.frog-name{font-size:15px;font-weight:700;margin-top:2px;color:var(--text)}
.frog-name.empty{color:var(--t2);font-weight:400;font-size:13px}

/* ─── IDENTITY CARD ─── */
.identity-card{background:linear-gradient(135deg,rgba(109,40,217,0.06),rgba(29,78,216,0.05));border:1.5px solid rgba(109,40,217,0.14);border-radius:var(--r);padding:15px 18px;margin-bottom:18px;cursor:pointer;transition:all .15s}
.identity-card:hover{border-color:rgba(109,40,217,0.3);box-shadow:0 4px 16px rgba(109,40,217,0.1)}
.identity-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.identity-text{font-size:15px;font-weight:700;color:var(--purple);margin-top:3px}
.identity-text.empty{color:var(--t3);font-weight:400;font-size:13px}

/* ─── PROCRASTINATION PANEL ─── */
.procra-panel{background:var(--adim);border:1.5px solid rgba(180,83,9,0.2);border-radius:var(--r);padding:14px 16px;margin-bottom:18px}
.procra-title{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:6px}
.procra-tip{font-size:12px;color:var(--t2);margin-top:6px;padding-top:6px;border-top:1px solid rgba(180,83,9,0.12)}

/* ─── REVENUE BAR ─── */
.rev-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.rev-amount{font-size:32px;font-weight:800;color:var(--green);letter-spacing:-.5px}
.rev-target{font-size:12px;color:var(--t2);margin-top:2px}
.rev-remaining{font-size:13px;font-weight:600;color:var(--amber);margin-top:6px}
.prog-wrap{background:var(--card2);border-radius:100px;height:7px;margin:8px 0;overflow:hidden}
.prog-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--purple),#4f46e5);transition:width .5s ease}
.prog-bar.done{background:linear-gradient(90deg,var(--green),#10b981)}

/* ─── TASK ITEMS ─── */
.task-item{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px;transition:all .2s;position:relative;box-shadow:var(--shadow-sm)}
.task-item:hover{border-color:var(--t3);box-shadow:var(--shadow);transform:translateY(-1px)}
.task-item.frog{border-left:3px solid var(--purple);background:linear-gradient(to right,rgba(109,40,217,0.03),var(--card))}
.task-item.overdue{border-left:3px solid var(--red);background:linear-gradient(to right,rgba(220,38,38,0.03),var(--card))}
.task-item.done-item{opacity:.5}
.task-item.high-proc{border-left:3px solid var(--amber);background:linear-gradient(to right,rgba(180,83,9,0.03),var(--card))}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.1)}
.chk.done{background:linear-gradient(135deg,var(--green),#34d399);border-color:var(--green)}
.chk.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.chk.fail{background:var(--red);border-color:var(--red)}
.chk.fail::after{content:'✕';color:#fff;font-size:11px;font-weight:700}
.task-body{flex:1;min-width:0}
.task-ttl{font-weight:500;word-break:break-word}
.task-ttl.done{text-decoration:line-through;color:var(--t3)}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.task-acts{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-item:hover .task-acts{opacity:1}
.tact{padding:4px 7px;border-radius:6px;font-size:12px;color:var(--t2);transition:all .15s}
.tact:hover{color:var(--text);background:var(--card2)}
.tact.del:hover{color:var(--red);background:var(--rdim)}
.proc-count{font-size:11px;color:var(--amber);background:var(--adim);padding:1px 6px;border-radius:100px;font-weight:700}
.subtask-list{margin-top:8px;display:flex;flex-direction:column;gap:4px;padding-left:2px}
.sub-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2)}
.sub-chk{width:15px;height:15px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sub-chk:hover{border-color:var(--purple)}
.sub-chk.done{background:var(--green);border-color:var(--green)}
.sub-chk.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}

/* ─── WEEK CALENDAR ─── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.week-nav span{font-size:14px;font-weight:700;flex:1;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wday-col{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 8px;min-height:120px;box-shadow:var(--shadow-sm)}
.wday-col.today-col{border-color:rgba(109,40,217,0.3);background:linear-gradient(135deg,rgba(109,40,217,0.06),rgba(79,70,229,0.04));box-shadow:0 2px 12px rgba(109,40,217,0.1)}
.wday-hdr{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3);text-align:center;letter-spacing:.5px}
.wday-date{font-size:20px;font-weight:800;text-align:center;margin:2px 0 8px;line-height:1}
.wday-col.today-col .wday-date{color:var(--purple)}
.wtask{font-size:11px;padding:3px 6px;background:var(--pdim);color:var(--purple);border-radius:5px;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.wtask.done{opacity:.45;text-decoration:line-through}
.wtask.red{background:var(--rdim);color:var(--red)}
.wtask .del-btn{opacity:0;transition:opacity .15s}
.wtask:hover .del-btn{opacity:1}
.add-day-btn{font-size:11px;color:var(--t3);padding:2px 4px;margin-top:4px;border-radius:4px;width:100%;text-align:center}
.add-day-btn:hover{color:var(--purple);background:var(--pdim)}

/* ─── MONTH CALENDAR ─── */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.month-nav span{font-size:15px;font-weight:800;flex:1;text-align:center;letter-spacing:-.2px}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-dow{font-size:10px;font-weight:700;color:var(--t3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.4px}
.mday{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:6px;min-height:80px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.mday:hover{border-color:var(--t3);box-shadow:var(--shadow)}
.mday.today-day{border-color:rgba(109,40,217,0.3);background:linear-gradient(135deg,rgba(109,40,217,0.06),rgba(79,70,229,0.04))}
.mday.empty{background:transparent;border-color:transparent;cursor:default;box-shadow:none}
.mday-num{font-size:12px;font-weight:700;line-height:1}
.mday.today-day .mday-num{color:var(--purple)}
.mday-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.mdot{width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0}
.mdot.red{background:var(--red)}
.mday-task{font-size:10px;margin-top:2px;padding:1px 4px;border-radius:4px;background:var(--pdim);color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;font-weight:500}
.mday-task.over{background:var(--rdim);color:var(--red)}
.mday-task.done-t{opacity:.4;text-decoration:line-through}
.mday-more{font-size:10px;color:var(--t3);margin-top:2px;padding-left:2px}
.wtask.drag-over{border:1.5px dashed var(--purple);background:var(--pdim)}
.fs-drop-zone.fs-drag-over{outline:2px dashed var(--purple);outline-offset:-2px;background:var(--pdim)!important}

/* ─── TIME SCHEDULE ─── */
.sched-wrap{display:flex;gap:0;margin-top:8px;overflow-y:auto;max-height:75vh}
.sched-hours{width:48px;flex-shrink:0;position:relative}
.sched-main{flex:1;position:relative;border-left:1px solid var(--border)}
.hlabel{position:absolute;right:6px;font-size:10px;color:var(--t3);transform:translateY(-50%)}
.hline{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.hline-half{position:absolute;left:0;right:0;height:1px;border-top:1px dashed var(--border);opacity:.4}
.fixed-blk{position:absolute;left:0;right:0;border-radius:4px;padding:3px 7px;font-size:11px;overflow:hidden;border-left:3px solid;opacity:.85}
.fixed-blk-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fixed-blk-time{font-size:10px;opacity:.7}
.task-blk{position:absolute;left:52%;right:4px;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:600;overflow:hidden;background:var(--purple);color:#fff;cursor:pointer;z-index:10;min-height:20px}
.task-blk.done-blk{opacity:.5;text-decoration:line-through}
.task-blk.overlap-blk{background:linear-gradient(135deg,#f59e0b,#d97706);border:1.5px solid #fcd34d;box-shadow:0 0 0 1.5px #f59e0b40,2px 2px 6px rgba(0,0,0,.25)}
.overlap-badge{position:absolute;top:2px;right:3px;background:rgba(0,0,0,.35);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px;line-height:1.4;pointer-events:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:20;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:var(--red);border-radius:50%}
.sched-add-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:8px}
/* ─── SCHEDULE SIDE PANEL ─── */
.sched-layout{display:flex;gap:12px;align-items:flex-start}
.sched-side-panel{width:236px;flex-shrink:0;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);overflow-y:auto;max-height:75vh;min-height:120px;transition:border-color .15s,box-shadow .15s}
.sched-side-panel.drag-over{border-color:var(--purple);background:var(--pdim);box-shadow:0 0 0 2px var(--purple)40}
.fs-dash-panel{flex-shrink:0;width:188px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);overflow-y:auto;max-height:80vh;min-height:80px;transition:border-color .15s,box-shadow .15s;box-shadow:var(--shadow-sm);position:sticky;top:8px;align-self:flex-start}
.fs-dash-panel.drag-over{border-color:var(--purple);background:var(--pdim);box-shadow:0 0 0 2px rgba(109,40,217,0.25)}
.fs-panel-task{border:1px solid var(--border);background:var(--card2);border-radius:7px!important}
.fs-panel-task:hover{border-color:var(--purple);background:var(--pdim)}
@media(max-width:700px){.fs-dash-panel{width:100%}}
.sched-side-hdr{font-size:12px;font-weight:700;color:var(--t2);padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2;display:flex;align-items:center;justify-content:space-between}
/* タスクアイテム */
.sched-side-task{margin:6px 6px 2px;padding:8px 9px 8px 7px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:grab;font-size:12px;font-weight:600;color:var(--text);transition:background .15s,border-color .15s,box-shadow .15s;user-select:none;display:flex;align-items:flex-start;gap:6px}
.sched-side-task:hover{background:var(--pdim);border-color:var(--purple);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sched-side-task.dragging{opacity:.3;cursor:grabbing;box-shadow:none}
.sched-side-task.done-side{opacity:.45}
/* サブタスクアイテム */
.sched-side-sub{margin:0 6px 4px 20px;padding:6px 9px 6px 7px;border-radius:6px;background:var(--surface);border:1px solid var(--border);cursor:grab;font-size:11px;font-weight:500;color:var(--t2);transition:background .15s,border-color .15s,box-shadow .15s;user-select:none;display:flex;align-items:center;gap:6px;position:relative}
.sched-side-sub::before{content:'';position:absolute;left:-11px;top:50%;width:8px;height:1px;background:var(--border)}
.sched-side-sub:hover{background:var(--pdim);border-color:var(--purple);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.08)}
.sched-side-sub.dragging{opacity:.3;cursor:grabbing}
.sched-side-sub.done-sub{opacity:.4;text-decoration:line-through}
/* ドラッグハンドル */
.sched-dh{color:var(--t3);font-size:12px;line-height:1;flex-shrink:0;margin-top:1px;letter-spacing:-1px}
/* タイムラインのサブタスクブロック */
.sub-blk{background:linear-gradient(135deg,#7c3aedcc,#6d28d9aa)!important;border-left:2px solid #a78bfa!important;font-size:10px!important}
.sub-blk-label{font-size:9px;opacity:.75;line-height:1;margin-bottom:1px}
.sched-col{flex:1;min-width:0}
@media(max-width:700px){.sched-layout{flex-direction:column}.sched-side-panel{width:100%;max-height:220px}}

/* ─── 固定タイムスケジュール: Structured風タイムライン表示（会長指示2026-07-06） ─── */
/* 中央レール＋円形ノード＋浮きカード方式。画像/アイコン素材やStructuredの文言は使用せず全て自作CSS/SVG。 */
.fs-tl-daynav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;padding:2px 2px 12px;border-bottom:1px solid var(--border)}
.fs-tl-daynav-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--t2);font-size:15px;font-weight:700;transition:background .15s,border-color .15s,color .15s}
.fs-tl-daynav-btn:hover{background:var(--pdim);border-color:var(--purple);color:var(--purple)}
.fs-tl-daynav-label{font-size:14px;font-weight:800;color:var(--text);letter-spacing:.2px}
.fs-tl-daynav-sub{font-size:11px;font-weight:600;color:var(--t3);margin-left:6px}
.fs-tl-daynav-today{font-size:11px;font-weight:700;color:var(--purple);background:var(--pdim);border:1px solid rgba(109,40,217,0.25);border-radius:99px;padding:3px 10px;margin-left:8px}
.fs-tl-wrap{display:flex;position:relative;min-width:280px;padding:6px 0 24px}
.fs-tl-axis{width:var(--fs-tl-axis-w);flex-shrink:0;position:relative}
.fs-tl-tick{position:absolute;left:0;right:-1px;height:1px;background:transparent}
.fs-tl-label{position:absolute;left:0;right:10px;transform:translateY(-50%);font-size:9px;color:var(--t3);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.fs-tl-label-hour{font-size:10.5px;font-weight:700;color:var(--t2)}
@media(max-width:700px){.fs-tl-label{font-size:8px;right:7px}.fs-tl-label-hour{font-size:9px}}
.fs-tl-col{flex:1;min-width:0;position:relative;margin-left:4px;cursor:default}
/* 中央レール: 縦の帯（実線=予定あり、点線=空き時間） */
.fs-tl-rail{position:absolute;left:22px;width:3px;border-radius:99px;background:var(--border);z-index:0}
.fs-tl-rail-gap{position:absolute;left:21px;width:2px;border-left:2px dotted var(--t3);opacity:.55;z-index:0;pointer-events:auto;cursor:copy}
.fs-tl-rail-gap:hover{opacity:1}
.fs-tl-gap-plus{position:absolute;left:5px;top:50%;transform:translateY(-50%) scale(.6);width:34px;height:34px;border-radius:50%;background:var(--card);border:1.5px dashed var(--purple);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;opacity:0;transition:opacity .15s,transform .15s;pointer-events:none;box-shadow:var(--shadow-sm)}
.fs-tl-rail-gap:hover .fs-tl-gap-plus{opacity:1;transform:translateY(-50%) scale(1)}
/* 現在時刻ライン: カードより背面（z-index低）、薄く。左ガター内は実線+濃いチップで可読性確保 */
.fs-tl-now{position:absolute;left:0;right:0;height:1px;background:var(--red);z-index:1;pointer-events:none;opacity:.4}
.fs-tl-now-gutter{position:absolute;left:0;width:var(--fs-tl-axis-w);height:2px;background:var(--red);z-index:6;pointer-events:none;opacity:1}
.fs-tl-now-chip{position:absolute;left:2px;top:-9px;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px;white-space:nowrap;font-variant-numeric:tabular-nums;box-shadow:var(--shadow-sm);z-index:7}
@media(max-width:700px){.fs-tl-now-chip{font-size:8.5px;padding:1px 4px}}
/* 帯: ブロック範囲を示す色帯（レール上、アクセント色12〜16%半透明+左3pxボーダー） */
.fs-tl-range-band{position:absolute;left:16px;right:8px;border-radius:6px;background:var(--band-c,var(--purple));opacity:.13;border-left:3px solid var(--band-c,var(--purple));z-index:0;pointer-events:none}
.fs-tl-range-band.now{opacity:.2}
/* ヘッダー: 開始時刻位置に固定表示する小型ヘッダーカード（1〜2行）。近接ブロックは右にオフセット可能 */
.fs-tl-hdr{position:absolute;left:34px;right:8px;max-width:440px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--hdr-c,var(--purple));border-radius:10px;box-shadow:var(--shadow-sm);font-size:12px;padding:6px 10px;z-index:4;cursor:pointer;transition:box-shadow .15s,opacity .2s;display:flex;align-items:center;gap:8px}
.fs-tl-hdr:hover{box-shadow:var(--shadow)}
.fs-tl-hdr.fs-drag-over{outline:2px dashed var(--purple);outline-offset:-2px;background:var(--pdim)!important}
.fs-tl-hdr.done{opacity:.6}
.fs-tl-hdr-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--hdr-c,var(--border));flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;background:transparent;transition:background .15s}
.fs-tl-hdr-chk.done{background:var(--hdr-c,var(--purple))}
.fs-tl-hdr-body{flex:1;min-width:0}
.fs-tl-hdr-title{font-weight:700;font-size:12.5px;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs-tl-hdr-title.done{text-decoration:line-through;color:var(--t3)}
.fs-tl-hdr-meta{font-size:10.5px;color:var(--t3);margin-top:1px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs-tl-hdr-progress{font-size:10px;font-weight:700;background:var(--card2);border-radius:99px;padding:1px 7px;flex-shrink:0;color:var(--t2)}
@media(max-width:700px){.fs-tl-hdr{left:26px;right:4px;padding:5px 8px}}
/* 項目（サブタスク）行: ブロック範囲内の自分の時刻位置に絶対配置される小さな1行 */
.fs-tl-item-row{position:absolute;left:34px;right:8px;max-width:420px;height:26px;display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0 8px;font-size:11.5px;z-index:2;box-shadow:var(--shadow-sm)}
.fs-tl-item-row .fs-tl-sub-chk-round{width:14px;height:14px;flex-shrink:0}
.fs-tl-item-row-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fs-tl-item-row-time{font-size:9.5px;color:var(--t3);flex-shrink:0;font-variant-numeric:tabular-nums}
@media(max-width:700px){.fs-tl-item-row{left:26px;right:4px}}
/* あふれた項目の「+N項目」チップ */
.fs-tl-overflow-chip{position:absolute;left:34px;height:22px;display:flex;align-items:center;padding:0 9px;background:var(--card2);border:1px dashed var(--border);border-radius:99px;font-size:10.5px;font-weight:700;color:var(--t2);cursor:pointer;z-index:3}
.fs-tl-overflow-chip:hover{border-color:var(--purple);color:var(--purple)}
@media(max-width:700px){.fs-tl-overflow-chip{left:26px}}
/* 時刻付きタスク（帯に属さない単発タスク）の小チップ */
.fs-tl-chip{position:absolute;left:34px;right:8px;background:var(--card);border:1.5px solid var(--purple);border-radius:10px;font-size:11px;padding:5px 10px;z-index:2;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:6px;cursor:grab}
.fs-tl-chip.fs-drag-over{outline:2px dashed var(--purple);background:var(--pdim)!important}
@media(max-width:700px){.fs-tl-chip{left:26px;right:4px}}
/* サブタスク: 丸型チェックボックス */
.fs-tl-sub-chk-round{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:background .15s,border-color .15s;position:relative}
.fs-tl-sub-chk-round.done{background:var(--purple);border-color:var(--purple)}
.fs-tl-sub-chk-round.done::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:900}
@keyframes fsTlFadeDone{from{opacity:1}to{opacity:.6}}
.fs-tl-hdr.done{animation:fsTlFadeDone .25s ease forwards}
/* 詳細パネル（ヘッダータップで開く）内の項目行 */
.fs-detail-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)}
.fs-detail-item:last-child{border-bottom:none}
.fs-detail-item input[type=time]{width:92px;flex-shrink:0;padding:4px 6px;font-size:12px}
.fs-detail-item input[type=text]{flex:1;padding:4px 8px;font-size:12px}

/* ─── PROJECT BOARD ─── */
.board-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.board-col{min-width:220px;max-width:240px;flex-shrink:0}
.board-col-hdr{font-size:12px;font-weight:700;padding:8px 12px;border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.proj-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.proj-card:hover{border-color:rgba(109,40,217,0.25);transform:translateY(-2px);box-shadow:var(--shadow)}
.proj-card-title{font-weight:700;font-size:13px;margin-bottom:4px}
.proj-card-client{font-size:11px;color:var(--t2)}
.proj-card-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.proj-profit{font-size:16px;font-weight:800;color:var(--green);margin-top:4px}
.proj-due-label{font-size:11px;color:var(--t2);margin-top:4px}
.proj-due-label.urgent{color:var(--red)}
.proj-due-label.soon{color:var(--amber)}

/* ─── CLIENT LIST ─── */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.client-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.client-name{font-size:16px;font-weight:700}
.job-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card2);border-radius:var(--rs);margin-bottom:5px;cursor:pointer;transition:border-color .15s;border:1px solid transparent}
.job-item:hover{border-color:var(--border)}
.job-title{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-dates{font-size:11px;color:var(--t2)}

/* ─── HABIT ITEMS ─── */
.habit-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:9px}
.habit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.habit-name{font-weight:600;font-size:14px}
.streak-badge{font-size:13px;font-weight:700;color:var(--amber);display:flex;align-items:center;gap:3px}
.streak-risk{font-size:11px;color:var(--red);font-weight:700;background:var(--rdim);padding:2px 7px;border-radius:100px}
.habit-week{display:flex;gap:4px}
.hday{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;flex-direction:column;flex-shrink:0}
.hday:hover{border-color:var(--purple)}
.hday.done{background:var(--gdim);border-color:var(--green);color:var(--green)}
.hday.done::after{content:'✓';font-size:12px}
.hday.done span{display:none}
.hday.fail{background:var(--rdim);border-color:var(--red);color:var(--red)}
.hday.fail::after{content:'✕';font-size:12px}
.hday.fail span{display:none}
.hday.today-h{border-color:var(--purple)}
.hday.future-h{cursor:default;opacity:.35}
.habit-meta{font-size:11px;color:var(--t2);display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

/* ─── HABIT TIME SCHEDULE ─── */
.habit-sched-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.habit-time-badge{font-size:13px;font-weight:700;color:var(--purple);background:var(--pdim);padding:4px 10px;border-radius:var(--rs);flex-shrink:0;min-width:60px;text-align:center}
.habit-sched-info{flex:1}
.habit-sched-name{font-weight:600}
.habit-sched-days{font-size:11px;color:var(--t2);margin-top:2px}

/* ─── GOALS ─── */
.goal-item{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:11px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.goal-item:hover{box-shadow:var(--shadow)}
.goal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.goal-title{font-size:15px;font-weight:700}
.ms-item{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:13px;color:var(--t2)}
.ms-chk{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ms-chk:hover{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.1)}
.ms-chk.done{background:linear-gradient(135deg,var(--purple),#4f46e5);border-color:var(--purple)}
.ms-chk.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.ms-text.done{text-decoration:line-through;color:var(--t3)}
.ms-move{color:var(--t3);padding:2px 5px;border-radius:4px;font-size:13px;cursor:pointer;line-height:1}
.ms-move:hover{color:var(--text);background:var(--card2)}
.rev-remaining-box{background:var(--adim);border:1.5px solid rgba(180,83,9,0.2);border-radius:var(--rs);padding:10px 12px;margin-top:10px;font-size:13px}
.rev-remaining-box strong{color:var(--amber)}

/* ─── JOURNAL ─── */
.journal-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.jcal-day{text-align:center;padding:5px 3px;font-size:12px;border-radius:var(--rs);cursor:pointer;transition:all .15s;border:1px solid transparent}
.jcal-day:hover{border-color:var(--border)}
.jcal-day.has-entry{background:var(--pdim);color:var(--pl);border-color:var(--purple)}
.jcal-day.selected{background:var(--purple);color:#fff;border-color:var(--purple)}
.jcal-day.today-j{font-weight:700}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{font-size:22px;padding:6px;border-radius:var(--rs);border:2px solid var(--border);cursor:pointer;transition:all .15s;line-height:1}
.mood-btn:hover,.mood-btn.sel{border-color:var(--purple);background:var(--pdim);transform:scale(1.1)}
.energy-row{display:flex;gap:6px;align-items:center}
.energy-btn{width:32px;height:32px;border-radius:var(--rs);border:2px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.energy-btn:hover,.energy-btn.sel{border-color:var(--purple);background:var(--pdim);color:var(--pl)}

/* ─── REVENUE LOG ─── */
.log-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.log-date{font-size:12px;color:var(--t2);min-width:80px}
.log-amount{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:13px;font-weight:500}
.log-note{font-size:11px;color:var(--t2)}

/* ─── SETTINGS ─── */
.sched-edit-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sched-edit-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.day-check-row{display:flex;gap:6px;flex-wrap:wrap}
.day-cb{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:all .15s;user-select:none}
.day-cb input{display:none}
.day-cb.sel{background:var(--pdim);border-color:var(--purple);color:var(--pl)}

/* ─── MORNING CHECKIN BANNER ─── */
.checkin-banner{background:linear-gradient(135deg,rgba(109,40,217,0.07),rgba(29,78,216,0.05));border:1.5px solid rgba(109,40,217,0.18);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;box-shadow:0 2px 12px rgba(109,40,217,0.06)}
.checkin-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:10px}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:660px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-size:17px;font-weight:800;letter-spacing:-.2px}
.mclose{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;transition:all .15s}
.mclose:hover{background:var(--card2);color:var(--text)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11px;color:var(--t3);margin-top:3px}
.mfooter{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.postpone-list{display:flex;flex-direction:column;gap:6px}
.postpone-opt{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;font-size:13px;transition:all .15s;background:var(--card)}
.postpone-opt:hover{border-color:var(--purple);color:var(--purple);background:var(--pdim)}
.compassion-msg{background:var(--bdim);border:1.5px solid rgba(29,78,216,0.2);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--t2);margin-top:12px}

/* ─── FILTER BAR ─── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid var(--border);color:var(--t2);transition:all .15s;cursor:pointer;background:var(--card)}
.fbtn:hover,.fbtn.act{background:var(--pdim);border-color:rgba(109,40,217,0.3);color:var(--purple)}

/* ─── SUB VIEW TABS ─── */
.sub-tabs{display:flex;gap:2px;background:var(--card2);border-radius:10px;padding:3px;margin-bottom:16px;width:fit-content;border:1.5px solid var(--border)}
.stab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.stab.act{background:var(--card);color:var(--purple);box-shadow:var(--shadow-sm)}
.stab:hover:not(.act){color:var(--text)}

/* ─── SECTION TITLE ─── */
.section-ttl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px;margin-top:20px}
.section-ttl:first-child{margin-top:0}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:44px 20px;color:var(--t2)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:22px;right:22px;background:var(--text);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;color:#fff;box-shadow:var(--shadow-lg);z-index:9999;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{background:linear-gradient(135deg,#059669,#10b981)}
#toast.warn{background:linear-gradient(135deg,#b45309,#d97706)}
#toast.err{background:linear-gradient(135deg,#dc2626,#ef4444)}

/* ─── CELEBRATION ─── */
@keyframes celebrate{0%{transform:scale(1)}25%{transform:scale(1.4) rotate(-5deg)}50%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1)}}
.celebrating{animation:celebrate .4s ease}

/* ─── SALES LEADS ─── */
.sl-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:100px;font-size:12px;font-weight:700;border:1.5px solid;cursor:default}
.sl-未接触{background:var(--card2);border-color:var(--border);color:var(--t2)}
.sl-架電予定{background:var(--blue);border-color:var(--blue);color:#fff}
.sl-メール済み{background:#ecfccb;border-color:rgba(77,124,15,0.35);color:#4d7c0f}
.sl-DM済み{background:var(--pkdim);border-color:rgba(219,39,119,0.3);color:var(--pink)}
.sl-HP作成済{background:var(--bdim);border-color:rgba(29,78,216,0.25);color:var(--blue)}
.sl-電話済{background:var(--cdim);border-color:rgba(14,116,144,0.25);color:var(--cyan)}
.sl-アポ{background:var(--adim);border-color:rgba(180,83,9,0.25);color:var(--amber)}
.sl-商談{background:var(--pdim);border-color:rgba(109,40,217,0.25);color:var(--purple)}
.sl-成約{background:var(--gdim);border-color:rgba(5,150,105,0.25);color:var(--green)}
.sl-失注{background:var(--rdim);border-color:rgba(220,38,38,0.25);color:var(--red)}
.sl-row{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;transition:all .15s;box-shadow:var(--shadow-sm)}
.sl-row:hover{border-color:var(--t3);box-shadow:var(--shadow);transform:translateY(-1px)}
.sl-name{font-weight:700;font-size:14px;margin-bottom:3px}
.sl-meta{font-size:11px;color:var(--t2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.sl-inline-input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;color:var(--text);min-width:100px;max-width:200px}
.sl-inline-input:focus{border-color:var(--purple);outline:none}
.sl-status-btn{padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;transition:all .15s}
.sl-status-btn:hover{filter:brightness(0.9)}
.sl-appr-btn{padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--card2);color:var(--t2);cursor:pointer;transition:all .15s}
.sl-appr-btn:hover{border-color:var(--purple)}
.sl-appr-btn.act{background:var(--purple);border-color:var(--purple);color:#fff}
.sl-summary-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:700;border:1.5px solid;margin-right:6px;margin-bottom:6px}
.sl-biz-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding:4px;background:var(--card2);border:1.5px solid var(--border);border-radius:12px}
.sl-biz-tab{flex:1;min-width:120px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:700;border:1.5px solid transparent;background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.sl-biz-tab:hover{color:var(--text);background:var(--card)}
.sl-biz-tab.act{background:var(--purple);border-color:var(--purple);color:#fff}
.sl-biz-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 5px;border-radius:100px;font-size:11px;font-weight:700;background:rgba(0,0,0,.12);color:inherit}
.sl-biz-tab.act .sl-biz-count{background:rgba(255,255,255,.25)}
.sl-pager{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center}
/* ── 投稿管理 表示切替タブ ── */
.pview-tabs{display:inline-flex;gap:4px;margin-bottom:12px;padding:4px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px}
.pview-tab{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:700;border:1.5px solid transparent;background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.pview-tab:hover{color:var(--text);background:var(--card)}
.pview-tab.act{background:var(--purple);border-color:var(--purple);color:#fff}
/* ── 月カレンダー ── */
.pcal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.pcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.pcal-wdrow{margin-bottom:6px}
.pcal-wd{text-align:center;font-size:12px;font-weight:700;padding:4px 0}
.pcal-cell{min-height:96px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:5px 6px;cursor:pointer;overflow:hidden;transition:border-color .15s}
.pcal-cell:hover{border-color:var(--purple)}
.pcal-out{background:var(--card2);opacity:.5}
.pcal-today{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple) inset}
.pcal-daynum{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.pcal-dot{display:none;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:100px;font-size:10px;font-weight:700;background:var(--purple);color:#fff}
.pcal-chips{display:flex;flex-direction:column}
/* ── 週タイムライン ── */
.ptl-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow-x:auto;background:var(--card)}
.ptl-timecol{flex-shrink:0;width:52px;border-right:1.5px solid var(--border);background:var(--card2)}
.ptl-hour{font-size:10px;color:var(--t3);text-align:right;padding:0 6px;border-bottom:1px dashed var(--border);box-sizing:border-box;display:flex;align-items:flex-start;justify-content:flex-end}
.ptl-cols{display:grid;grid-template-columns:repeat(7,minmax(90px,1fr));flex:1}
.ptl-col{border-right:1px solid var(--border)}
.ptl-col:last-child{border-right:none}
.ptl-colhead{text-align:center;font-size:12px;font-weight:700;height:24px;line-height:24px;border-bottom:1.5px solid var(--border);background:var(--card2)}
.ptl-today{background:var(--pdim)}
.ptl-daybody{position:relative}
/* ── スマホ縮退(<=430px) ── */
@media(max-width:430px){
  .pcal-cell{min-height:52px;padding:3px}
  .pcal-chips{display:none}
  .pcal-dot{display:inline-flex}
  .pview-tab{padding:6px 9px;font-size:12px}
  .ptl-cols{grid-template-columns:repeat(7,minmax(56px,1fr))}
}
.sl-pager button{padding:5px 13px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;transition:all .15s}
.sl-pager button:hover:not(:disabled){border-color:var(--purple);color:var(--purple)}
.sl-pager button:disabled{opacity:.4;cursor:default}
.sl-pager span{font-size:12px;color:var(--t2)}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* ─── TWO COL ─── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* ─── HAMBURGER & DRAWER ─── */
/* NOTE: base styles must come BEFORE the media query so @media can override display */
#mob-hamburger{
  display:none;position:fixed;
  top:calc(env(safe-area-inset-top) + 10px);
  left:12px;
  z-index:300;background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;width:40px;height:40px;
  align-items:center;justify-content:center;cursor:pointer;
  flex-direction:column;gap:5px;padding:10px;
  box-shadow:var(--shadow)
}
#mob-hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .2s}
/* ─── MOBILE LAYOUT + SAFE AREA ─── */
@media(max-width:700px){
  .two-col{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  #sidebar{display:none}
  #main{
    padding:14px;
    /* ノッチ・Dynamic Island の分だけ上に余白 */
    padding-top:calc(env(safe-area-inset-top) + 56px);
    /* 下タブバー + ホームインジケーター分 */
    padding-bottom:calc(env(safe-area-inset-bottom) + 70px);
  }
  #mob-nav{display:flex}
  #mob-hamburger{display:flex}
}
#mob-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);z-index:100;
  /* ホームインジケーター分の余白 */
  padding-bottom:env(safe-area-inset-bottom);
}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;font-size:10px;color:var(--t2);cursor:pointer;gap:3px}
.mnav-item.active{color:var(--pl)}
.mnav-item .nav-icon{font-size:18px}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;transition:opacity .2s}
#mob-overlay.open{display:block;opacity:1}
#mob-drawer{
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  z-index:250;transform:translateX(-100%);
  transition:transform .25s ease;
  display:flex;flex-direction:column;
  /* ドロワー内もsafe-area対応 */
  padding-top:calc(env(safe-area-inset-top) + 20px);
  padding-bottom:calc(env(safe-area-inset-bottom) + 20px);
  overflow-y:auto
}
#mob-drawer.open{transform:translateX(0)}
.woop-section{background:var(--card2);border-radius:var(--rs);padding:12px;margin-top:12px}
.woop-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.woop-text{font-size:13px;color:var(--t2)}
.inline-input{background:none;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:3px 0;font-size:inherit;width:auto;color:var(--text)}
.inline-input:focus{border-bottom-color:var(--purple)}

/* ─── FIXED SCHEDULE DROP ZONES ─── */
.fs-dropzone{height:6px;border-radius:4px;margin:2px 0;transition:all .15s;position:relative;cursor:default}
.fs-dropzone:hover,.fs-dropzone.fs-dz-over{height:28px;background:rgba(109,40,217,0.07);border:1.5px dashed rgba(109,40,217,0.35);border-radius:8px;cursor:copy}
.fs-dropzone.fs-dz-over{background:rgba(109,40,217,0.12)!important}
.fs-dz-plus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;font-size:11px;font-weight:700;color:var(--purple);pointer-events:none;transition:opacity .15s}
.fs-dropzone:hover .fs-dz-plus,.fs-dropzone.fs-dz-over .fs-dz-plus{opacity:1}
/* ─── FIXED SCHEDULE CHECKBOXES ─── */
.fs-chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card)}
.fs-chk:hover{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.1)}
.fs-chk.done{border-color:var(--green)}
.fs-chk.done::after{content:'✓';color:var(--green);font-size:13px;font-weight:800}
.fs-sub-chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card)}
.fs-sub-chk:hover{border-color:var(--purple)}
.fs-sub-chk.done{border-color:var(--green)}
.fs-sub-chk.done::after{content:'✓';color:var(--green);font-size:10px;font-weight:800}

/* ─── DRAG & DROP ─── */
.task-item[draggable]{cursor:grab}
.task-item.drag-over{border:2px dashed var(--purple);background:var(--pdim)}
.task-item.dragging{opacity:.4}
.task-blk[draggable]{cursor:grab}
.drop-zone{position:absolute;left:0;right:0;height:30px;z-index:5;transition:background .1s}
.drop-zone.drag-over{background:var(--pdim);border:2px dashed var(--purple);border-radius:4px}

/* ─── MEMO / BRAIN DUMP ─── */
.memo-capture{background:var(--card);border:2px solid var(--purple);border-radius:var(--r);padding:16px;margin-bottom:16px}
.memo-capture textarea{min-height:90px;font-size:15px;border:none;background:transparent;padding:0;resize:none}
.memo-capture textarea:focus{border:none;outline:none}
.memo-item{background:var(--card);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border)}
.memo-item.pinned{border-color:var(--amber)}
.memo-item-text{flex:1;font-size:13px;white-space:pre-wrap;line-height:1.6}
.memo-item-text.done{text-decoration:line-through;color:var(--t3)}
.memo-acts{display:flex;gap:4px;flex-shrink:0}
.memo-cat{font-size:10px;padding:2px 7px;border-radius:100px;background:var(--card2);color:var(--t2);margin-top:3px;display:inline-block}

/* ─── REVENUE TABS ─── */
.rev-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.rev-tab{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600;background:var(--card);color:var(--t2);cursor:pointer;border:1px solid var(--border);transition:all .15s}
.rev-tab.act{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ─── PROFIT / PAYMENT PAGES ─── */
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.profit-row:last-child{border-bottom:none}
.profit-total{font-size:18px;font-weight:700;color:var(--green)}
.profit-neg{color:var(--red)}
.payment-row{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.pmt-worker{font-weight:600;min-width:80px}
.pmt-amount{color:var(--amber);font-weight:700}

/* ─── WORKERS ─── */
.worker-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--card2);border:1px solid var(--border);border-radius:100px;font-size:12px;margin:2px}

/* ─── JOB SUBTASK ─── */
.job-sub-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.job-sub-item:last-child{border:none}

/* ─── NO-CODE CUSTOMIZE ─── */
.cust-nav-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;transition:opacity .15s,border-color .15s;user-select:none}
.cust-nav-row:hover{border-color:var(--purple)}
.cust-nav-row.hidden-row{opacity:.38}
.drag-handle{color:var(--t3);font-size:18px;cursor:grab;flex-shrink:0;line-height:1}
.toggle-sw{width:38px;height:22px;background:var(--border);border-radius:100px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--purple)}
.toggle-sw::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.toggle-sw.on::after{transform:translateX(16px)}
.cp-card{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.cp-card:hover{border-color:var(--purple)}
.block-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:8px}
.block-type-tag{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.block-add-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.icon-pick{font-size:22px;cursor:pointer;padding:4px 5px;border-radius:6px;border:2px solid transparent;display:inline-block;line-height:1.2;transition:border-color .1s}
.icon-pick.sel{border-color:var(--purple)}
.cpb{margin-bottom:14px}
.cpb-heading{font-size:21px;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px}
.cpb-heading-input{font-size:21px;font-weight:700;width:100%;border:none;background:transparent;color:var(--text);padding:0 0 8px;border-bottom:1px solid var(--border);outline:none;box-sizing:border-box}
.cpb-heading-input::placeholder{color:var(--t3)}
.cpb-text{font-size:13px;color:var(--t2);white-space:pre-wrap;line-height:1.75}
.cpb-text-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;min-height:60px;font-family:inherit}
.cpb-text-input::placeholder{color:var(--t3)}
.cpb-note{background:var(--adim);border:1px solid var(--amber);border-radius:var(--rs);padding:13px 15px;font-size:13px;white-space:pre-wrap;line-height:1.75}
.cpb-note-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;min-height:60px;padding:13px 15px;font-family:inherit;border-radius:var(--rs)}
.cpb-note-input::placeholder{color:var(--t3)}
.cpb-counter{text-align:center;padding:18px 0}
.cpb-counter-val{font-size:60px;font-weight:700;color:var(--pl);line-height:1}
.cpb-counter-lbl{font-size:12px;color:var(--t2);margin-top:5px}
.cpb-counter-btns{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:14px}
.cpb-check-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cpb-check-item:last-child{border:none}
.cpb-link-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cpb-link-item:last-child{border:none}
.cpb-link-a{color:var(--blue);text-decoration:underline;font-size:13px;word-break:break-all}

/* ─── JOURNAL TABS ─── */
.j-tab-active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ─── NOTION BLOCK TYPES ─── */
.cpb-h1{font-size:28px;font-weight:800;line-height:1.2;padding:4px 0 6px;border-bottom:2px solid var(--border);margin-bottom:4px;color:var(--text)}
.cpb-h2{font-size:22px;font-weight:700;line-height:1.3;padding:3px 0 5px;border-bottom:1px solid var(--border);margin-bottom:2px;color:var(--text)}
.cpb-h3{font-size:17px;font-weight:600;line-height:1.4;padding:2px 0 4px;color:var(--text)}
.cpb-h-input{width:100%;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none;padding:2px 0;box-sizing:border-box}
.cpb-h-input::placeholder{color:var(--t3)}
.cpb-h1-input{font-size:28px;font-weight:800}
.cpb-h2-input{font-size:22px;font-weight:700}
.cpb-h3-input{font-size:17px;font-weight:600}
.cpb-bullet,.cpb-numbered{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.cpb-bullet-input,.cpb-numbered-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit}
.cpb-bullet-input::placeholder,.cpb-numbered-input::placeholder{color:var(--t3)}
.cpb-bullet-lines,.cpb-numbered-lines{display:flex;flex-direction:column;gap:2px}
.cpb-bullet-line,.cpb-numbered-line{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.75}
.cpb-bullet-line::before{content:'•';color:var(--pl);flex-shrink:0;margin-top:1px}
.cpb-numbered-line-num{color:var(--pl);flex-shrink:0;font-weight:600;min-width:18px}
.cpb-quote{border-left:4px solid var(--purple);padding:10px 16px;background:var(--pdim);border-radius:0 var(--rs) var(--rs) 0;font-style:italic;color:var(--t2);font-size:14px;line-height:1.75}
.cpb-quote-input{width:100%;border:none;background:transparent;color:var(--text);font-size:14px;font-style:italic;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit}
.cpb-quote-input::placeholder{color:var(--t3)}
.cpb-divider{padding:12px 0}
.cpb-divider hr{border:none;border-top:2px solid var(--border);margin:0}
.cpb-toggle{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cpb-toggle-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;user-select:none;font-weight:600}
.cpb-toggle-arrow{font-size:11px;color:var(--t2);transition:transform .2s;flex-shrink:0}
.cpb-toggle-arrow.open{transform:rotate(90deg)}
.cpb-toggle-body{padding:10px 14px 14px 36px;font-size:13px;color:var(--t2);white-space:pre-wrap;line-height:1.75;border-top:1px solid var(--border)}
.cpb-toggle-input{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;line-height:1.75;resize:none;outline:none;box-sizing:border-box;font-family:inherit;min-height:60px}
.cpb-code{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:var(--rs);padding:14px 16px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12.5px;color:#a8b4d8;white-space:pre;overflow-x:auto;line-height:1.7}
.cpb-code-input{width:100%;border:none;background:transparent;color:#a8b4d8;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:12.5px;line-height:1.7;resize:none;outline:none;box-sizing:border-box;min-height:80px;white-space:pre}
.cpb-code-input::placeholder{color:#555570}

/* ─── BLOCK DRAG & DROP ─── */
.notion-block-wrap{position:relative;display:flex;align-items:flex-start;gap:6px;padding:2px 0;transition:opacity .15s}
.notion-block-wrap.dragging-block{opacity:.35}
.notion-block-wrap.drag-over-block{border-top:2px solid var(--purple)}
.block-drag-handle{color:var(--t3);font-size:16px;cursor:grab;flex-shrink:0;padding:6px 2px;opacity:0;transition:opacity .15s;line-height:1;user-select:none;margin-top:2px;border-radius:4px}
.block-drag-handle:hover{background:var(--border);color:var(--text)}
.notion-block-wrap:hover .block-drag-handle{opacity:1}
.notion-block-wrap .cpb{flex:1;margin-bottom:0}
.notion-block-wrap .cpb-h1,.notion-block-wrap .cpb-h2,.notion-block-wrap .cpb-h3{flex:1}

/* ─── SLASH COMMAND POPUP ─── */
#slash-popup{position:fixed;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:9990;min-width:240px;max-height:340px;overflow-y:auto;padding:6px}
.slash-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;transition:background .1s}
.slash-item:hover,.slash-item.sel{background:var(--pdim);color:var(--pl)}
.slash-item-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.slash-item-label{flex:1}
.slash-item-hint{font-size:11px;color:var(--t3)}

/* ─── WORKER CARDS ─── */
.worker-page-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}

/* ─── PRIORITY TABLE ─── */
.priority-table th{position:sticky;top:0;background:var(--card2)}

/* ─── AI CHAT ─── */
.ai-model-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ai-model-tab{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;cursor:pointer;transition:all .15s;font-weight:600;box-shadow:var(--shadow-sm)}
.ai-model-tab:hover{border-color:rgba(109,40,217,0.3);color:var(--text)}
.ai-model-tab.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--purple),#4f46e5);box-shadow:0 2px 8px rgba(109,40,217,0.3)}
.ai-msgs{display:flex;flex-direction:column;gap:12px;margin-bottom:100px}
.ai-msg{max-width:88%;display:flex;flex-direction:column;gap:3px}
.ai-msg-user{align-self:flex-end;align-items:flex-end}
.ai-msg-assistant{align-self:flex-start;align-items:flex-start}
.ai-msg-meta{font-size:11px;color:var(--t3);padding:0 4px}
.ai-msg-body{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word}
.ai-msg-user .ai-msg-body{background:linear-gradient(135deg,var(--purple),#4f46e5);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 10px rgba(109,40,217,0.2)}
.ai-msg-assistant .ai-msg-body{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm)}
.ai-msg-body pre{background:#1e1e2e;border:1px solid #2d2d4e;border-radius:10px;padding:12px;overflow-x:auto;margin:8px 0;font-size:12px}
.ai-msg-body code{font-family:monospace;background:rgba(109,40,217,0.08);color:var(--purple);padding:1px 5px;border-radius:4px;font-size:12px}
.ai-msg-body pre code{background:none;padding:0;color:#a8b4d8}
.ai-msg-body ul,.ai-msg-body ol{padding-left:18px;margin:6px 0}
.ai-msg-body li{margin-bottom:3px}
.ai-msg-body h2,.ai-msg-body h3,.ai-msg-body h4{margin:10px 0 4px;font-size:14px}
.ai-typing{display:flex;gap:5px;align-items:center;padding:12px 16px}
.ai-typing span{width:7px;height:7px;background:var(--t3);border-radius:50%;animation:aibounce 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aibounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.ai-input-bar{position:fixed;bottom:0;left:220px;right:0;padding:12px 18px;background:rgba(255,255,255,0.9);border-top:1.5px solid var(--border);display:flex;gap:8px;align-items:flex-end;z-index:90;backdrop-filter:blur(8px)}
@media(max-width:700px){.ai-input-bar{left:0;bottom:calc(env(safe-area-inset-bottom) + 60px);padding:8px 12px}}
.ai-input-bar textarea{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;font-size:14px;background:var(--card);color:var(--text);resize:none;max-height:120px;min-height:42px;outline:none;font-family:inherit;line-height:1.4;box-shadow:var(--shadow-sm)}
.ai-input-bar textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.1)}
.ai-ctx-bar{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ai-ctx-tag{background:var(--pdim);border:1px solid var(--purple);color:var(--pl);border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}

/* ===ナビのカテゴリー分け=== */
.nav-cat{margin-bottom:2px}
.nav-cat-hd{display:flex;align-items:center;gap:6px;padding:8px 14px 4px;font-size:10.5px;font-weight:800;color:var(--t3);cursor:pointer;user-select:none;letter-spacing:.06em}
.nav-cat-hd:hover{color:var(--text)}
.nav-cat-arrow{width:11px;font-size:9px;flex-shrink:0}

/* ===Googleドキュメント風エディタ(ドキュメントタブ)=== */
.gdoc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.gdoc-title{flex:1;min-width:150px;font-size:18px;font-weight:600;border:1px solid transparent;background:transparent;padding:4px 8px;border-radius:4px;color:var(--text)}
.gdoc-title:hover{border-color:var(--border)}
.gdoc-title:focus{border-color:var(--purple);outline:none}
.gdoc-savestat{font-size:11px;color:var(--t3);flex-shrink:0;min-width:64px;text-align:right}
.gdoc-toolbar{position:sticky;top:0;z-index:25;display:flex;align-items:center;gap:1px;flex-wrap:wrap;background:#edf2fa;border:1px solid #dadce0;border-radius:14px;padding:4px 10px}
.gdoc-btn{min-width:28px;height:28px;padding:0 7px;border:none;border-radius:4px;font-size:13px;color:#444746;background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-weight:600}
.gdoc-btn:hover{background:rgba(68,71,70,.1)}
.gdoc-sep{width:1px;height:18px;background:#c7cbd1;margin:0 5px;flex-shrink:0}
.gdoc-style{border:none;background:transparent;font-size:12.5px;color:#444746;padding:2px 2px;cursor:pointer;border-radius:4px;max-width:110px}
.gdoc-style:hover{background:rgba(68,71,70,.1)}
.gdoc-fsval{font-size:12.5px;color:#444746;min-width:20px;text-align:center}
.gdoc-canvas{background:#f8f9fa;padding:22px 8px 90px;margin-top:10px;border-radius:8px;min-height:72vh}
.gdoc-page{background:#fff;border:1px solid #dadce0;width:min(816px,calc(100% - 16px));margin:0 auto;min-height:1056px;padding:76px 68px;color:#202124;font-size:11pt;line-height:1.7;outline:none;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;overflow-wrap:break-word;box-sizing:border-box}
.gdoc-page h1{font-size:24pt;font-weight:400;margin:14px 0 8px;line-height:1.35}
.gdoc-page h2{font-size:16pt;font-weight:600;margin:18px 0 6px}
.gdoc-page h3{font-size:13pt;font-weight:600;margin:14px 0 4px}
.gdoc-page h4{font-size:11pt;font-weight:700;margin:12px 0 4px}
.gdoc-page p{margin:0 0 3px}
.gdoc-page ul,.gdoc-page ol{margin:4px 0;padding-left:28px}
.gdoc-page li{margin-bottom:2px}
.gdoc-page a{color:#1a73e8}
/* チェックリスト(2026-07-13) */
.gdoc-page ul.gdoc-check{list-style:none;padding-left:6px}
.gdoc-page ul.gdoc-check li{position:relative;list-style:none;padding-left:30px;margin-bottom:3px}
.gdoc-page ul.gdoc-check li::before{content:"";position:absolute;left:2px;top:.2em;width:17px;height:17px;border:2px solid #9aa0a6;border-radius:4px;box-sizing:border-box;cursor:pointer}
.gdoc-page ul.gdoc-check li.done::before{background:#6d28d9;border-color:#6d28d9}
.gdoc-page ul.gdoc-check li.done::after{content:"";position:absolute;left:7px;top:.3em;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);pointer-events:none}
.gdoc-page ul.gdoc-check li.done{color:#9aa0a6;text-decoration:line-through}
.gdoc-page blockquote{border-left:3px solid #dadce0;margin:8px 0;padding:2px 0 2px 14px;color:#5f6368}
.gdoc-page hr{border:none;border-top:1px solid #dadce0;margin:16px 0}
.gdoc-page pre{background:#f1f3f4;border:1px solid #e0e3e7;border-radius:6px;padding:12px 14px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10pt;line-height:1.6;white-space:pre-wrap;overflow-wrap:break-word;margin:8px 0}
.gdoc-page table{border-collapse:collapse;margin:10px 0;width:100%;font-size:10.5pt}
.gdoc-page th,.gdoc-page td{border:1px solid #dadce0;padding:6px 10px;text-align:left;vertical-align:top}
.gdoc-page th{background:#f1f3f4;font-weight:700}
.gdoc-colwrap{position:relative;display:inline-flex}
.gdoc-pop{position:absolute;top:32px;left:0;z-index:40;display:none;gap:5px;background:#fff;border:1px solid #dadce0;border-radius:8px;padding:8px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.gdoc-swatch{width:20px;height:20px;border-radius:50%;border:1px solid #dadce0;cursor:pointer;padding:0;flex-shrink:0}
@media(max-width:600px){.gdoc-page{padding:34px 18px;min-height:60vh}.gdoc-canvas{padding:14px 4px 60px}}

</style>
</head>

</div>

<div id="mob-drawer">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 14px 16px">
    <div class="logo" style="margin:0;padding:0">mono.create <small>社内連絡アプリ</small></div>
    <button onclick="closeDrawer()" style="background:none;border:none;font-size:20px;color:var(--t2);cursor:pointer;line-height:1;padding:4px 6px">✕</button>
  </div>
  <div id="mob-drawer-nav"></div>

</div>

  <div class="mnav-item" id="mnav-more" onclick="toggleDrawer()"><span class="nav-icon">☰</span>メニュー</div>
</div>

const SCOLBG={'案件掲載中':'bc','未着手':'bk','進行中':'bb','編集者進行中':'bpk','初稿完成':'bp','確認待ち':'ba','FB待ち':'bk','修正中':'br','完了':'bg','キャンセル':'bk'};
const DAYS=['日','月','火','水','木','金','土'];
