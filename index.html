// ===FIREBASE===
firebase.initializeApp({
  apiKey:"AIzaSyA8kjyY8xF4usk5K7TyBfab_wW3EIFr9Z4",
  authDomain:"editflow-mono-create.firebaseapp.com",
  projectId:"editflow-mono-create",
  storageBucket:"editflow-mono-create.firebasestorage.app",
  messagingSenderId:"280142126082",
  appId:"1:280142126082:web:3defcc1b0d370b14781b1b"
});
const fbAuth=firebase.auth();
const fbDb=firebase.firestore();
let FB_USER=null;
let _fbSaveTimer=null;
let _fbUnsubscribe=null;

function fbSave(){
  if(!FB_USER)return;
  S._uid=FB_USER.uid;
  _stampTeamChanges();
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer=setTimeout(()=>{
    fbDb.collection('users').doc(FB_USER.uid).set({
      json_mcapp:_packState(),
      ts_mcapp:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(e=>console.error('Firestore save error:',e));
    _teamSave();
  },2000);
}

// 個人ドキュメント(users/{uid})も肥大時はLZ圧縮する(Firestore 1MiB制限対策)
// チームデータ(TEAM_KEYS + bizBoard)は shared/mcapp が唯一の真実(EditFlowのshared/teamとは完全分離)。個人docには保存しない
// (二重管理で、アカウント切替時に個人docの古い/空のチームデータが共有取り込み分を上書きする事故を防ぐ)
function _packState(){
  const EXCL={bizBoard:1};TEAM_KEYS.forEach(k=>EXCL[k]=1);
  const personal={};for(const k in S){if(!EXCL[k])personal[k]=S[k];}
  const json=JSON.stringify(personal);
  if(window.LZString&&json.length>500000){
    try{return 'LZ:'+LZString.compressToBase64(json);}catch(_){return json;}
  }
  return json;
}
function _applyCloudData(json){
  if(typeof json==='string'&&json.slice(0,3)==='LZ:'){
    if(!window.LZString)return;                 // ライブラリ未ロード時はスキップ(既存Sを保持)
    json=LZString.decompressFromBase64(json.slice(3));
    if(json==null)return;
  }
  const cloud=JSON.parse(json);
  const def=defState();
  // チームデータは shared/mcapp が唯一の真実。個人docで上書きせず現在のメモリ内容を保持する。
  const keepTeam={};TEAM_KEYS.forEach(k=>keepTeam[k]=S[k]);const keepBiz=S.bizBoard;
  S=migrate(Object.assign(def,cloud));
  TEAM_KEYS.forEach(k=>{if(keepTeam[k]!==undefined)S[k]=keepTeam[k];});
  if(keepBiz!==undefined)S.bizBoard=keepBiz;
  ['tasks','habits','jobs','logs','journals','goals','clients','workers','checkIns','customPages','customEx','navConfig','meals','workouts','pipeline','teamKgis','teamKpis','teamPosts','teamDocs','teamPages','bizUnits','teamMeetings','salesLeads','hpFees','salesSites','templates','bizInfo','crmClients'].forEach(k=>{if(!Array.isArray(S[k]))S[k]=def[k]||[];});
  if(FB_USER)S._uid=FB_USER.uid;
  localStorage.setItem(DB,JSON.stringify(S));
}

function fbSetupRealtimeSync(){
  if(!FB_USER)return;
  if(_fbUnsubscribe){_fbUnsubscribe();_fbUnsubscribe=null;}
  // 同じ端末で別アカウントがサインインした場合、前アカウントの個人データが
  // 新アカウントへ漏れる/上書きするのを防ぐため、ローカルを初期化してクラウド優先にする。
  if(S._uid&&S._uid!==FB_USER.uid){
    // 【安全策 v-10】ローカルを消す前に必ずバックアップを残す
    // (クラウド同期が権限等で機能していない環境でのデータ消失を防ぐ)
    try{
      localStorage.setItem('ef_team_v5_backup_'+S._uid+'_'+Date.now(), JSON.stringify(S));
      // バックアップは直近3件まで保持
      const bk=Object.keys(localStorage).filter(k=>k.startsWith('ef_team_v5_backup_')).sort();
      while(bk.length>3){localStorage.removeItem(bk.shift());}
    }catch(e){console.warn('backup before switch failed',e);}
    S=migrate(defState());
    S._uid=FB_USER.uid;S._savedAt=0;
    window._teamSnap={};
    localStorage.setItem(DB,JSON.stringify(S));
    if(typeof render==='function')render();
  }
  // FB_USER確定後に理想スケジュール移行を再評価（会長アカウントはこの時点でfsが確定・クラウドへも同期される）
  S=migrate(S);
  let _firstLoad=true;
  _fbUnsubscribe=fbDb.collection('users').doc(FB_USER.uid).onSnapshot(doc=>{
    if(!doc.exists||!doc.data()?.json_mcapp){
      if(_firstLoad){fbSave();_firstLoad=false;}
      return;
    }
    const cloudTs=doc.data().ts_mcapp?.toMillis?.()??0;
    const localTs=S._savedAt||0;
    if(_firstLoad){
      _firstLoad=false;
      if(localTs>cloudTs+1000){
        fbSave();
        toast('☁️ ローカルデータをクラウドに同期中…');
        return;
      }
      _applyCloudData(doc.data().json_mcapp);
      fbSave();
      render();
      toast('☁️ クラウドから同期しました');
    } else {
      // リアルタイム更新 — クラウドが明らかに新しい場合のみ適用
      if(cloudTs>localTs+2000){
        _applyCloudData(doc.data().json_mcapp);
        renderSyncSafe(); // ドキュメント編集中はDOMを置き換えない(入力消失防止)
        toast('📱 他のデバイスから同期しました');
      }
    }
  },e=>console.error('Firestore snapshot error:',e));
}

// ===チーム共有（案件・クライアント・編集者を全アカウントで共有）===
// 個人データ(タスク/習慣/目標/ジャーナル等)は users/{uid} のまま非公開。
// チームデータは社内アプリ専用の shared/mcapp に保存(EditFlow の shared/team とは別物)。
// Firestoreルールが共有アクセスを許可していれば自動で有効化。許可されない場合は
// permission-denied を検知して自動で個人モードへフォールバック（現状維持・無害）。
const TEAM_KEYS=['jobs','clients','workers','pipeline','teamKgis','teamKpis','teamPosts','teamDocs','teamPages','bizUnits','teamMeetings','salesLeads','hpFees','salesSites','templates','bizInfo','crmClients'];
let TEAM_SHARE_OK=null;      // null=未判定 / true=共有有効 / false=個人モード
let _teamUnsub=null;
window._teamSnap=window._teamSnap||{};
function _entSig(e){const o={};for(const k in e){if(k!=='updatedAt')o[k]=e[k];}return JSON.stringify(o);}
// チーム共有フィールドのエンコード/デコード。salesLeadsは肥大するためLZ圧縮する。
function _teamEncode(k,arr){
  const json=JSON.stringify(arr||[]);
  if(k==='salesLeads'&&window.LZString&&json.length>4000){
    try{return 'LZ:'+LZString.compressToBase64(json);}catch(_){return json;}
  }
  return json;
}
function _teamDecode(raw){
  if(typeof raw!=='string')return null;
  let s=raw;
  if(s.slice(0,3)==='LZ:'){
    if(!window.LZString)return null;      // ライブラリ未ロード時は今回のマージをスキップ(壊さない)
    s=LZString.decompressFromBase64(s.slice(3));
    if(s==null)return null;
  }
  try{return JSON.parse(s);}catch(_){return null;}
}

// ─── salesLeads分割格納(2026-07-13): shared/mcapp_leads_0..3 へ分割保存 ───
// mcapp本体はドキュメント全体1MiB上限に達したため、肥大するsalesLeadsだけ別doc群に逃がす。
// 本体のsalesLeadsフィールドは'SHARDED'マーカー(旧クライアントはJSON解釈不能→null→無害スキップ)。
// 旧形式(LZ:ペイロード)が本体に残っていれば従来どおり読み込む(移行の後方互換)。
const SL_SHARD_N=4;
let _slShardJson='';
let _slShardUnsubs=[];
function _slEncodeShard(arr){const j=JSON.stringify(arr);return (window.LZString&&j.length>4000)?'LZ:'+LZString.compressToBase64(j):j;}
function _slSplitShards(leads){
  const LIMIT=820000;  // 1doc≦1MiBに対し余裕を持つ(200件間隔チェックの膨らみ込みで最大~860KB)
  const shards=[];let cur=[];
  for(const l of (leads||[])){
    cur.push(l);
    if(cur.length%200===0&&_slEncodeShard(cur).length>LIMIT){cur.pop();shards.push(cur);cur=[l];}
  }
  if(cur.length&&_slEncodeShard(cur).length>LIMIT){const h=Math.ceil(cur.length/2);shards.push(cur.slice(0,h));cur=cur.slice(h);}
  shards.push(cur);
  while(shards.length>SL_SHARD_N){const last=shards.pop();shards[shards.length-1]=shards[shards.length-1].concat(last);}
  while(shards.length<SL_SHARD_N)shards.push([]);
  return shards;
}
function _slShardsSave(){
  if(!FB_USER||TEAM_SHARE_OK===false||!window.LZString)return;
  const json=JSON.stringify(S.salesLeads||[]);
  if(json===_slShardJson)return;      // リード変更なし→書き込み節約
  _slShardJson=json;
  const shards=_slSplitShards(S.salesLeads||[]);
  shards.forEach((arr,i)=>{
    fbDb.collection('shared').doc('mcapp_leads_'+i)
      .set({ts:firebase.firestore.FieldValue.serverTimestamp(),by:FB_USER.uid,part:_slEncodeShard(arr)},{merge:true})
      .catch(e=>console.warn('leads shard save',i,(e&&e.code)||e));
  });
}
function _stampTeamChanges(){
  TEAM_KEYS.forEach(k=>{(S[k]||[]).forEach(e=>{
    if(!e||!e.id)return;
    const sig=_entSig(e);
    if(window._teamSnap[e.id]!==sig){e.updatedAt=Date.now();window._teamSnap[e.id]=sig;}
  });});
  // 経営ボード(bizBoard)はオブジェクト型。全体で更新時刻を管理し「新しい方優先」で共有する。
  // _seed(種データ)は共有対象にしない。実データ(人が入力/編集した内容)だけタイムスタンプを進める。
  if(S.bizBoard && !S.bizBoard._seed){const{updatedAt,_seed,...rest}=S.bizBoard;const sig=JSON.stringify(rest);if(window._teamSnap['__bizBoard']!==sig){S.bizBoard.updatedAt=Date.now();window._teamSnap['__bizBoard']=sig;}}
}
function _teamSnapRebase(){
  TEAM_KEYS.forEach(k=>{(S[k]||[]).forEach(e=>{if(e&&e.id)window._teamSnap[e.id]=_entSig(e);});});
  if(S.bizBoard){const{updatedAt,...rest}=S.bizBoard;window._teamSnap['__bizBoard']=JSON.stringify(rest);}
}
function mergeTeamArr(local,remote){
  const by={};
  (local||[]).forEach(e=>{if(e&&e.id)by[e.id]=e;});
  (remote||[]).forEach(e=>{if(!e||!e.id)return;const ex=by[e.id];if(!ex||(e.updatedAt||0)>(ex.updatedAt||0))by[e.id]=e;});
  return Object.values(by);
}
function _teamSave(){
  if(!FB_USER||TEAM_SHARE_OK===false)return;
  const payload={ts:firebase.firestore.FieldValue.serverTimestamp(),by:FB_USER.uid};
  // salesLeadsは分割格納(shared/mcapp_leads_0..3)へ移行済み。本体にはマーカーのみ置く
  // (旧クライアントはマーカーをJSON解釈できず無害スキップ。他キーは従来どおり)
  TEAM_KEYS.forEach(k=>{payload[k]=(k==='salesLeads')?'SHARDED':_teamEncode(k,S[k]||[]);});
  // _seed(種データ)はクラウドへ書かない。merge:true なので既存の実データを消さずに保持する。
  if(S.bizBoard && !S.bizBoard._seed) payload.bizBoard=_teamEncode('bizBoard',S.bizBoard);
  fbDb.collection('shared').doc('mcapp').set(payload,{merge:true})
    .then(()=>{if(TEAM_SHARE_OK!==true){TEAM_SHARE_OK=true;renderAuthUI();}})
    .catch(e=>{const c=e&&e.code;if(c==='permission-denied'&&TEAM_SHARE_OK!==false){TEAM_SHARE_OK=false;renderAuthUI();}console.warn('team share save:',c||e);});
  _slShardsSave();
}
function fbSetupTeamSync(){
  if(!FB_USER)return;
  if(_teamUnsub){_teamUnsub();_teamUnsub=null;}
  _teamUnsub=fbDb.collection('shared').doc('mcapp').onSnapshot(doc=>{
    if(TEAM_SHARE_OK!==true){TEAM_SHARE_OK=true;renderAuthUI();}
    if(!doc.exists){_teamSave();return;}
    const d=doc.data()||{};
    let changed=false;
    TEAM_KEYS.forEach(k=>{
      if(typeof d[k]!=='string')return;
      const remote=_teamDecode(d[k]);
      if(remote==null)return;
      const merged=mergeTeamArr(S[k]||[],remote);
      if(JSON.stringify(merged)!==JSON.stringify(S[k]||[])){S[k]=merged;changed=true;}
    });
    // 経営ボード(bizBoard): オブジェクト全体を「新しい方優先」で取り込む。
    // 種データ(_seed)は updatedAt=0 なので、実データ(updatedAt>0)が常に勝ち、種で上書きされない。
    // 取り込みで内容が入れ替わる直前に、現在の実データを必ずローカルへバックアップ(誤消失の復元用)。
    if(typeof d.bizBoard==='string'){const rb=_teamDecode(d.bizBoard);if(rb&&(rb.updatedAt||0)>((S.bizBoard&&S.bizBoard.updatedAt)||0)){bizBackup('cloud-adopt');S.bizBoard=rb;changed=true;}}
    if(changed){_teamSnapRebase();localStorage.setItem(DB,JSON.stringify(S));renderSyncSafe();}
  },e=>{const c=e&&e.code;if(c==='permission-denied'&&TEAM_SHARE_OK!==false){TEAM_SHARE_OK=false;renderAuthUI();}console.warn('team share sync:',c||e);});
  // salesLeads分割doc(mcapp_leads_0..3)の購読。各shardは部分集合なのでid+updatedAtでマージ(削除しない)
  _slShardUnsubs.forEach(u=>{try{u();}catch(_){}});
  _slShardUnsubs=[];
  for(let i=0;i<SL_SHARD_N;i++){
    _slShardUnsubs.push(fbDb.collection('shared').doc('mcapp_leads_'+i).onSnapshot(doc=>{
      if(!doc.exists)return;
      const remote=_teamDecode((doc.data()||{}).part);
      if(!Array.isArray(remote)||!remote.length)return;
      const merged=mergeTeamArr(S.salesLeads||[],remote);
      if(JSON.stringify(merged)!==JSON.stringify(S.salesLeads||[])){
        S.salesLeads=merged;_teamSnapRebase();localStorage.setItem(DB,JSON.stringify(S));renderSyncSafe();
      }
    },e=>console.warn('leads shard sync',i,(e&&e.code)||e)));
  }
}
function signInWithGoogle(){
  // スマホ含め全端末でポップアップ優先(タップ直結ならモバイルSafari/Chromeでも開ける)。
  // リダイレクト方式はauthDomainがgithub.ioと異なるためモバイルの3rd-partyストレージ遮断で
  // 復帰時にログインが失われる既知問題があり、最後の手段に格下げ(2026-07-05)。
  const provider=new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(e=>{
    const c=(e&&e.code)||'';
    if(c==='auth/popup-blocked'||c==='auth/cancelled-popup-request'||c==='auth/operation-not-supported-in-this-environment'){
      fbAuth.signInWithRedirect(provider).catch(e2=>{showAuthError(e2);});
    }else if(c!=='auth/popup-closed-by-user'){
      showAuthError(e);
    }
  });
}
// サインイン失敗の原因を画面に表示(原因特定用)
function showAuthError(e){
  const code=(e&&e.code)||'';
  const msg=(e&&e.message)||String(e||'');
  let hint='';
  if(code==='auth/unauthorized-domain')hint='このドメインがFirebaseの承認済みドメインに未登録です。';
  else if(code==='auth/operation-not-allowed')hint='FirebaseコンソールでGoogleサインインが無効になっています。';
  else if(code==='auth/network-request-failed')hint='通信エラーです。電波状況をご確認ください。';
  alert('サインインに失敗しました\n'+code+(hint?'\n'+hint:'')+'\n'+msg.slice(0,120));
}

function _isEmbeddedWebview(){
  const ua=navigator.userAgent||'';
  if(/(Line\/|FBAN|FBAV|FB_IAB|Instagram|MicroMessenger|KAKAOTALK|NAVER)/i.test(ua))return true;  // 代表的アプリ内ブラウザ
  const iOS=/iPad|iPhone|iPod/.test(ua);
  if(iOS&&window.navigator.standalone===true)return true;  // iOSホーム画面に追加したPWA
  if(iOS&&!/Safari/.test(ua))return true;                  // iOS WKWebView(Safariトークン無し)
  if(/Android/.test(ua)&&/;\s*wv\)/.test(ua))return true;  // Android WebView
  return false;
}

function gcalEventsForDate(date){
  // アプリ内の全タスクタイトルセット（削除済み除く）— タイトル照合用
  const appTaskTitles=new Set(
    (S.tasks||[]).filter(t=>!t.deleted).map(t=>(t.title||'').trim().toLowerCase())
  );
  // GcalEventIDで取り込み済みのイベントIDセット
  const importedGcalIds=new Set((S.tasks||[]).filter(t=>t.gcalEventId).map(t=>t.gcalEventId));

  return _gcalUpcomingEvents.filter(e=>{
    const d=e.start?.date||e.start?.dateTime?.slice(0,10);
    if(d!==date)return false;
    const title=(e.summary||'').trim();
    // 除外: 確保時間
    if(title.includes('確保時間'))return false;
    // 除外: アプリがGcalに書き込んだイベント（案件納品・請求書・旧gcalSync）
    if(title.startsWith('🧾 請求書提出:'))return false;
    if(title.startsWith('📋 提出:'))return false;
    if(title.startsWith('📋 '))return false;
    // 除外: 既にアプリタスクとして取り込み済み（ID照合）
    if(importedGcalIds.has(e.id))return false;
    // 除外: アプリ内に同名タスクが既にある（タイトル照合 — 最重要）
    if(appTaskTitles.has(title.toLowerCase()))return false;
    return true;
  });
}
async function gcalFetchCalendarList(){
  if(!_gcalToken)return;
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader',{
      headers:{'Authorization':'Bearer '+_gcalToken}
    });
    if(!res.ok)return;
    const json=await res.json();
    _gcalCalendarList=json.items||[];
    renderGcalUI();
  }catch(e){console.error('gcalFetchCalendarList error',e);}
}
function gcalToggleCalendar(id){
  if(!S.settings)S.settings={};
  let ids=S.settings.gcalCalendarIds||(S.settings.gcalCalendarId?[S.settings.gcalCalendarId]:['primary']);
  if(ids.includes(id)){
    ids=ids.filter(x=>x!==id);
    if(ids.length===0)ids=['primary'];
  }else{
    ids=[...ids,id];
  }
  S.settings.gcalCalendarIds=ids;
  save();
  gcalFetchUpcoming();
  renderGcalUI();
}
async function gcalFetchUpcoming(){
  if(!_gcalToken)return;
  const td=today();
  const tMax=new Date(new Date(td+'T00:00:00').getTime()+2*86400000).toLocalYmd();
  const timeMin=new Date(td+'T00:00:00').toISOString();
  const timeMax=new Date(tMax+'T00:00:00').toISOString();
  const calIds=S.settings?.gcalCalendarIds||(S.settings?.gcalCalendarId?[S.settings.gcalCalendarId]:['primary']);
  try{
    const results=await Promise.all(calIds.map(async id=>{
      const calId=encodeURIComponent(id);
      const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime&maxResults=30`,{
        headers:{'Authorization':'Bearer '+_gcalToken}
      });
      if(!res.ok)return[];
      const json=await res.json();
      return json.items||[];
    }));
    const all=[].concat(...results);
    all.sort((a,b)=>{
      const ta=a.start?.dateTime||a.start?.date||'';
      const tb=b.start?.dateTime||b.start?.date||'';
      return ta<tb?-1:ta>tb?1:0;
    });
    _gcalUpcomingEvents=all;
  }catch(e){console.error('gcalFetchUpcoming error',e);_gcalUpcomingEvents=[];}
  renderGcalUI();
}

function saveGcalClientId(){

function _gcalInitAndAuth(clientId,silent=false){
  if(typeof google==='undefined'){if(!silent)toast('Google APIの読み込み中です。少し待ってから再試行してください','warn');return;}
  _gcalTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:GCAL_SCOPE,
    callback:(resp)=>{
      if(resp.error){
        if(!silent){
          toast('Googleカレンダーの連携に失敗しました: '+resp.error,'err');
          if(S.settings)S.settings.gcalConnected=false;
          save();
        }
        // silent失敗時はgcalConnectedをtrueのまま維持（次回リロードで再試行できるよう）
        // ただしサイドバーに再接続ボタンを表示
        renderGcalUI();
        return;
      }
      _gcalToken=resp.access_token;
      if(S.settings)S.settings.gcalConnected=true;
      save();
      if(!silent)toast('📅 Googleカレンダーと連携しました！');
      gcalFetchCalendarList();
      gcalFetchUpcoming();
      startSheetsAutoSync();
      render();
      // トークンは1時間で失効→自動リフレッシュ
      setTimeout(()=>_gcalRefreshToken(clientId), 55*60*1000);
    }
  });
  _gcalTokenClient.requestAccessToken({prompt:silent?'':'select_account'});
}
function _gcalRefreshToken(clientId){
  // バックグラウンドでトークンを自動更新（ポップアップなし）
  if(!S.settings?.gcalConnected)return;
  _gcalInitAndAuth(clientId,true);
}

function gcalDisconnect(){
  if(_gcalToken&&typeof google!=='undefined'){
    google.accounts.oauth2.revoke(_gcalToken,()=>{});
  }
  _gcalToken=null;
  _gcalCalendarList=[];
  _gcalUpcomingEvents=[];
  if(S.settings)S.settings.gcalConnected=false;
  save();
  render();
  toast('Googleカレンダーの連携を解除しました');
}

async function gcalSync(){

async function gcalImportEvents(){
  if(!_gcalToken){toast('先にGoogleカレンダーと連携してください','warn');return;}
  const td=today();
  const tMax=new Date(new Date(td+'T00:00:00').getTime()+30*86400000).toLocalYmd();
  let events=[];
  try{
    const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${td}T00%3A00%3A00Z&timeMax=${tMax}T00%3A00%3A00Z&singleEvents=true&orderBy=startTime`,{
      headers:{'Authorization':'Bearer '+_gcalToken}
    });
    const json=await res.json();
    events=json.items||[];
  }catch(e){console.error('gcalImportEvents error',e);toast('カレンダー取り込みに失敗しました','err');return;}
  let n=0,nTimed=0;
  for(const event of events){
    if(!event.summary)continue;
    if(S.tasks.find(t=>t.gcalEventId===event.id))continue;
    const isTimed=!!event.start?.dateTime;
    const dueDate=event.start?.date||event.start?.dateTime?.slice(0,10)||null;
    let startTime=null,endTime=null;
    if(isTimed){
      // タイムゾーンを考慮してローカル時刻で抽出
      const sd=new Date(event.start.dateTime),ed=new Date(event.end?.dateTime||event.start.dateTime);
      startTime=`${String(sd.getHours()).padStart(2,'0')}:${String(sd.getMinutes()).padStart(2,'0')}`;
      endTime=`${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
      if(startTime===endTime)endTime=null; // 同じなら終了なし
      nTimed++;
    }
    S.tasks.push({id:uid(),title:event.summary,dueDate,startTime,endTime,gcalEventId:event.id,done:false,description:event.description||'',createdAt:new Date().toISOString()});
    n++;
  }
  if(n>0){save();render();}
  toast(`📅 ${n}件取り込み${nTimed?`（うち時刻付き ${nTimed}件）`:''}`);
}

// スプレッドシートへの書き込み（1案件）
async function sheetsWriteJob(job){
  if(!_gcalToken)return;
  const sid=(S.settings.sheetsId||'').trim();
  if(!sid)return;
  const tab=(S.settings.sheetsTab||'').trim();
  const pfx=tab?`'${tab}'!`:'';

  // ワーカー名・クライアント名を解決
  const workerNames=getJobWorkerNames(job)||'';
  const client=job.clientId?(S.clients||[]).find(c=>c.id===job.clientId):null;
  const clientName=client?client.name:'';

  // 既存行を検索（タイトル一致）
  let targetRow=-1;
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A:A')}`,{headers:{'Authorization':'Bearer '+_gcalToken}});
    if(res.ok){
      const d=await res.json();
      const rows=d.values||[];
      for(let i=1;i<rows.length;i++){
        if((rows[i][0]||'').trim()===(job.title||'').trim()){targetRow=i+1;break;}
      }
    }
  }catch(e){console.error('sheetsWriteJob find error',e);return;}

  // 書き込む値（I,Jは既存値を保持）
  let matLink='',refLink='';
  if(targetRow>0){
    try{
      const r2=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'I'+targetRow+':J'+targetRow)}`,{headers:{'Authorization':'Bearer '+_gcalToken}});
      if(r2.ok){const d2=await r2.json();const v=d2.values?.[0]||[];matLink=v[0]||'';refLink=v[1]||'';}
    }catch(e){}
  }

  const rowVals=[
    job.title||'',
    job.status||'',
    workerNames,
    job.sharedDate||'',
    job.editorDraftDate||'',
    job.clientDraftDate||'',
    job.deliveryDate||'',
    job.unitPrice!=null?String(job.unitPrice):'',
    matLink,
    refLink,
    clientName,
    job.notes||''
  ];

  try{
    if(targetRow>0){
      // 既存行を更新
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A'+targetRow+':L'+targetRow)}?valueInputOption=USER_ENTERED`,{
        method:'PUT',
        headers:{'Authorization':'Bearer '+_gcalToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[rowVals]})
      });
    }else{
      // 新規行を追加
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sid)}/values/${encodeURIComponent(pfx+'A:L')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{
        method:'POST',
        headers:{'Authorization':'Bearer '+_gcalToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[rowVals]})
      });
    }
    console.log('[Sheets] synced:',job.title);
  }catch(e){console.error('sheetsWriteJob write error',e);}
}

function sheetRowToJob(row,childRows){
  // col: A=0案件名, B=1ステータス, C=2担当編集者, D=3編集共有日, E=4編集者初稿提出日
  //      F=5クライアント初稿確認日, G=6納品日, H=7報酬額, I=8素材リンク, J=9参考動画リンク
  //      K=10プロマネ, L=11備考
  const get=(r,i)=>(r[i]||'').trim();
  const parseDate=(s)=>{
    if(!s)return'';
    // MM/DD or YYYY/MM/DD or M月D日
    s=s.replace(/\s/g,'');
    const m1=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(m1)return`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
    const m2=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if(m2){const y=new Date().getFullYear();return`${y}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;}
    const m3=s.match(/^(\d{1,2})月(\d{1,2})日?$/);
    if(m3){const y=new Date().getFullYear();return`${y}-${m3[1].padStart(2,'0')}-${m3[2].padStart(2,'0')}`;}
    return'';
  };
  const parsePrice=(s)=>{
    if(!s)return 0;
    const n=parseInt(s.replace(/[¥,￥\s]/g,''));
    return isNaN(n)?0:n;
  };
  // Worker lookup by name
  const workerName=get(row,2);
  const worker=workerName?(S.workers||[]).find(w=>w.name===workerName||w.name.includes(workerName)||workerName.includes(w.name)):null;
  // Client lookup by name (プロマネ欄 = clientId)
  const clientName=get(row,10);
  const client=clientName?(S.clients||[]).find(c=>c.name===clientName||c.name.includes(clientName)||clientName.includes(c.name)):null;
  // Notes from I, J, L
  const notesParts=[];
  const matLink=get(row,8);const refLink=get(row,9);const備考=get(row,11);
  if(matLink)notesParts.push('素材: '+matLink);
  if(refLink)notesParts.push('参考: '+refLink);
  if(備考)notesParts.push(備考);
  // Subtasks from child rows
  const subtasks=childRows.map((cr,i)=>({
    id:uid(),title:get(cr,0).replace(/^[└├│\s]+/,'').trim(),
    status:'案件掲載中',done:false,
    workerId:null,unitPrice:0,workerPay:0,
    sharedDate:parseDate(get(cr,3)),
    editorDraftDate:parseDate(get(cr,4)),
    clientDraftDate:parseDate(get(cr,5)),
    deliveryDate:parseDate(get(cr,6))
  })).filter(s=>s.title);
  return{
    id:uid(),
    title:get(row,0),
    status:'案件掲載中',
    workerId:worker?worker.id:null,
    clientId:client?client.id:null,
    scope:'',
    unitPrice:parsePrice(get(row,7)),
    profit:0,
    workerPay:0,
    sharedDate:parseDate(get(row,3)),
    editorDraftDate:parseDate(get(row,4)),
    clientDraftDate:parseDate(get(row,5)),
    deliveryDate:parseDate(get(row,6)),
    invoiceDate:'',paymentDate:'',payoutDate:'',
    notes:notesParts.join('\n'),
    subtasks,
    createdAt:new Date().toISOString()
  };
}

function sheetsDoImport(allJobs){
  // Get checked indices
  const checked=[...document.querySelectorAll('.sheets-chk')].filter(c=>c.checked).map(c=>parseInt(c.dataset.idx));
  if(!checked.length){toast('取り込む案件を選択してください','warn');return;}
  const toImport=allJobs||window._sheetsPreviews||[];
  let n=0;
  for(const i of checked){
    const j=toImport[i];
    if(!j)continue;
    if(!j.title)continue;
    S.jobs.push(j);n++;
  }
  save();render();closeModal();
  toast(`📊 ${n}件の案件を取り込みました`);
}

const HAKEN_TEMPLATE = "編集者テンプレ";
function _hakenSanitize(n){ return String(n||'').replace(/[:\\\/?*\[\]]/g,' ').replace(/\s+/g,' ').trim().slice(0,90); }
async function _hakenSheetsMeta(){

async function _hakenBatch(requests){

async function hakenEnsureWorkerTab(rawName, meta){
  if(typeof _gcalToken==='undefined'||!_gcalToken)return {noauth:true};
  var name=_hakenSanitize(rawName); if(!name)return {skip:true};
  if(!meta)meta=await _hakenSheetsMeta();
  if(meta.some(function(p){return _hakenSanitize(p.title)===name;}))return {exists:true};
  var tpl=meta.find(function(p){return p.title===HAKEN_TEMPLATE;});

  var newId=r1.replies[0].duplicateSheet.properties.sheetId;
  try{ await _hakenBatch([{addProtectedRange:{protectedRange:{range:{sheetId:newId,startColumnIndex:5,endColumnIndex:7},description:'自動計算(編集不可)',warningOnly:false}}}]); }catch(e){}
  return {created:true};
}

function migrate(d){
  // migrate ef_v4 → ef_v5
  const old=localStorage.getItem(DB_OLD);
  if(old&&!localStorage.getItem(DB)){try{const o=JSON.parse(old);Object.assign(d,o);localStorage.setItem(DB,JSON.stringify(d));localStorage.removeItem(DB_OLD);}catch{}}
  // migrate v10→v11: 指定ワーカーをトライアルに設定、誤採用ログ削除
  if(!d.settings._workerTrialMigrated2){
    const trialWorkerNames=['矢田部','菅野','鈴木','松下'];
    (d.workers||[]).forEach(w=>{
      if(trialWorkerNames.some(n=>w.name&&w.name.includes(n))){
        w.employStatus='trial';
        // 誤った採用ログを削除
        (d.logs||[]).forEach(l=>{
          if(l.type==='hire'&&l.result==='内定'&&(l.sourceWorkerId===w.id||l.title===w.name))l.deleted=true;
        });
      }
    });
    d.settings._workerTrialMigrated2=true;
  }
  // migrate v9→v10: 指定クライアントのトライアル設定・削除・重複除去
  if(!d.settings._clientTrialMigrated2){
    const trialNames=['藤原みさき','ゆめみん日和','磯崎良太'];
    const deleteNames=['なな','優樹'];
    // トライアルに設定
    (d.clients||[]).forEach(c=>{
      if(trialNames.some(n=>c.name&&c.name.includes(n)))c.isTrial=true;
    });
    // 削除
    (d.clients||[]).forEach(c=>{
      if(deleteNames.some(n=>c.name&&c.name.includes(n)))c.deleted=true;
    });
    // ゆめみん日和様の重複除去（最初の1件を残す）
    const yumeCls=(d.clients||[]).filter(c=>!c.deleted&&c.name&&c.name.includes('ゆめみん日和'));
    if(yumeCls.length>1)yumeCls.slice(1).forEach(c=>c.deleted=true);
    // トライアル/削除クライアントの誤った成約ログを削除
    const badClients=(d.clients||[]).filter(c=>c.isTrial||c.deleted);
    (d.logs||[]).forEach(l=>{
      if(l.type==='sales'&&l.result==='成約'&&badClients.some(c=>c.id===l.sourceClientId||c.name===l.title))l.deleted=true;
    });
    d.settings._clientTrialMigrated2=true;
  }
  // migrate v8→v9: 進行中 + 外注担当者あり → 編集者進行中
  if(!d.settings)d.settings={};
  if(!d.settings._editorStatusMigrated){
    const workers=d.workers||[];
    let n=0;
    (d.jobs||[]).forEach(j=>{
      if(j.deleted||j.status!=='進行中')return;
      // 外注担当者＝SELF_WID以外のworkerIdが設定されている
      const isOutsourced=j.workerId&&j.workerId!=='self'&&workers.find(w=>w.id===j.workerId);
      if(isOutsourced){j.status='編集者進行中';n++;}
      // サブタスクも同様に変換
      (j.subtasks||[]).forEach(s=>{
        if(s.status==='進行中'&&s.workerId&&s.workerId!=='self'&&workers.find(w=>w.id===s.workerId)){
          s.status='編集者進行中';n++;
        }
      });
    });
    d.settings._editorStatusMigrated=true;
    if(n>0)console.log(`[migrate] 編集者進行中に変換: ${n}件`);
  }
  // migrate: workerId(単一) → workerIds(配列)
  if(!d.settings._workerIdsMigrated){
    (d.jobs||[]).forEach(j=>{
      if(!j.workerIds){
        j.workerIds=j.workerId?[j.workerId]:[];
      }
    });
    d.settings._workerIdsMigrated=true;
  }
  // migrate: 会長の生活OSに基づく理想タイムスケジュールへ更新（一度だけ）
  //  - 会長アカウント(mono.create.group)は、サインイン時にクラウド側を確実に上書きして同期（本人だけ・佐々木ら他アカウントは対象外）
  //  - それ以外は「未編集=旧デフォルトの人」だけ上書き（自分でカスタムした人の予定は温存）
  if(!d.settings._fsIdealSeedV1){
    const sig=a=>JSON.stringify((a||[]).map(f=>[f.s,f.e,f.t]));
    let _email='';try{_email=((typeof FB_USER!=='undefined'&&FB_USER&&FB_USER.email)||'').toLowerCase();}catch(_){}
    const isChairman=_email==='mono.create.group@gmail.com'; // 参照のみ残置(強制上書きは廃止)
    // 2026-07-13修正: 会長アカウントを毎回DEFAULT_FSで強制上書きしていたため、再読込のたびに
    // カスタム予定が消える不具合があった。isChairman強制上書きを廃止。
    // カスタム済み(空でなく旧デフォルトでもない)の予定は誰であっても絶対に上書きしない。
    if(!d.fs||d.fs.length===0||sig(d.fs)===sig(LEGACY_FS)){
      d.fs=JSON.parse(JSON.stringify(DEFAULT_FS));
    }
    d.settings._fsIdealSeedV1=true; // 評価済みフラグ(次回以降このブロックに入らない=カスタム維持)
  }
  return d;
}

// JST安全な日付文字列(toISOStringはUTC基準で-1日ズレるため全置換済み・HANDOFF§1参照)
Date.prototype.toLocalYmd=function(){return`${this.getFullYear()}-${String(this.getMonth()+1).padStart(2,'0')}-${String(this.getDate()).padStart(2,'0')}`;};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(d,time){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
  const diff=Math.round((dt-now)/86400000);
  const suffix=time?` ${time}`:'';
  if(diff<0)return`${Math.abs(diff)}日超過`;
  if(diff===0)return`今日${suffix}`;if(diff===1)return`明日${suffix}`;return`${diff}日後${suffix}`;
}

  if(diff<0)return'overdue';if(diff<=2)return'urgent';if(diff<=5)return'soon';return'';
}

function getWeekStart(off){const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day)+off*7);return d;}
function getWeekDays(off){const s=getWeekStart(off);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return d.toLocalYmd();});}
function getMonthDays(off){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+off;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const sd=(first.getDay()+6)%7;
  const days=Array(sd).fill(null);
  for(let i=1;i<=last.getDate();i++){const _d=new Date(y,m,i);days.push(`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`);}
  while(days.length%7!==0)days.push(null);
  return{y:first.getFullYear(),m:first.getMonth(),days};
}

function calcStreak(dates){
  if(!dates||!dates.length)return 0;
  const sorted=[...dates].sort().reverse();let streak=0,d=new Date(today());
  for(let i=0;i<365;i++){const ds=d.toLocalYmd();if(sorted.includes(ds)){streak++;d.setDate(d.getDate()-1);}else if(i===0)d.setDate(d.getDate()-1);else break;}
  return streak;
}

}

function revGoalStats(g){
  // 収益目標 = 売上ベース（paymentDate基準・単価/売上合計、外注費は引かない）
  const n=new Date(),td=today(),yr=n.getFullYear(),mo=n.getMonth();
  const hz=g.horizon||'this_month';
  const paidJobs=(S.jobs||[]).filter(j=>!j.deleted&&j.paymentDate);
  let earned=0,endDate;
  if(hz==='this_month'){
    const ym=td.slice(0,7);
    earned=paidJobs.filter(j=>j.paymentDate.startsWith(ym)).reduce((s,j)=>s+jobMainIn(j),0);
    endDate=new Date(yr,mo+1,0);
  }else if(hz==='next_month'){
    const nm=new Date(yr,mo+1,1);
    const ym=`${nm.getFullYear()}-${String(nm.getMonth()+1).padStart(2,'0')}`;
    earned=paidJobs.filter(j=>j.paymentDate.startsWith(ym)).reduce((s,j)=>s+jobMainIn(j),0);
    endDate=new Date(yr,mo+2,0);
  }else if(hz==='monthly'){
    const tm=g.targetMonth||td.slice(0,7);
    earned=paidJobs.filter(j=>j.paymentDate.startsWith(tm)).reduce((s,j)=>s+jobMainIn(j),0);
    const[tyr,tmo]=tm.split('-').map(Number);
    endDate=new Date(tyr,tmo,0);
  }else if(hz==='year1'){
    earned=paidJobs.filter(j=>j.paymentDate.startsWith(String(yr))).reduce((s,j)=>s+jobMainIn(j),0);
    endDate=new Date(yr,11,31);
  }else{
    earned=paidJobs.reduce((s,j)=>s+jobMainIn(j),0);
    endDate=g.deadline?new Date(g.deadline):new Date(n.getTime()+(hz==='year5'?5:10)*365.25*86400000);
  }
  const remaining=Math.max(0,(g.targetAmount||0)-earned);
  const daysLeft=Math.max(1,Math.ceil((endDate-n)/86400000)+1);
  const pct=g.targetAmount>0?Math.min(100,Math.round(earned/g.targetAmount*100)):0;
  return{earned,remaining,daysLeft,pct};
}

function checkKpiLock(){return false;/*team:no personal gate*/
  if(!S.settings?.kpiLockEnabled)return false;
  if(!S.divisions||S.divisions.length===0)return false;
  const td=today();
  const now=new Date(td+'T00:00:00');
  const dayOfWeek=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
  const mondayStr=monday.toLocalYmd();
  const activeDivs=S.divisions.filter(d=>!d.deleted);
  if(activeDivs.length===0)return false;
  return activeDivs.some(d=>{
    const h=d.horizons?.['1w'];
    if(!h?.updatedAt)return true;
    return h.updatedAt<mondayStr;
  });
}
function checkDailyLock(){return false;/*team:no personal gate*/
  // タイムスケジュールロック（最優先）
  if(checkTimeScheduleLock())return true;
  // 目標振り返りロック
  if(checkGoalLock())return true;
  // 朝：当日の初稿・クライアント提出確認ロック
  if(checkDraftMorningLock())return true;
  const now=new Date();
  const hour=now.getHours();
  const td=today();
  const morningLockOn=S.settings?.morningLockEnabled!==false;
  const eveningLockOn=S.settings?.eveningLockEnabled!==false;
  const hasMorning=S.journals.some(j=>j.date===td&&(j.type==='morning'||!j.type)&&(j.topPriority||j.focusBlock||j.notToDo||j.decisions||j.obstacle||j.commitment||j.mood||j.content||j.gratitude||j.win));
  // 朝8時以降で朝のジャーナルが未完了 → 朝ロック（設定ON時のみ）
  if(morningLockOn&&hour>=8&&hour<19&&!hasMorning&&!sessionStorage.getItem('ef_skip_morning_'+td))return true;
  if(hour<19){
    // 時間帯に関わらずKPIロックをチェック
    return checkKpiLock();
  }
  // 夜：翌日（前日）の初稿・クライアント提出確認ロック
  if(checkDraftEveLock())return true;
  if(!eveningLockOn)return checkKpiLock();
  const hasEvening=S.journals.some(j=>j.date===td&&j.type==='evening'&&(j.achievement||j.reflection||j.tomorrow));
  const todayHabits=S.habits.filter(h=>!h.deleted);
  const habitDone=todayHabits.length===0||todayHabits.every(h=>(h.completedDates||[]).includes(td)||(h.failedDates||[]).includes(td));
  const gymOk=!S.settings?.gymCommit||gymDoneToday();
  if(!hasMorning||!hasEvening||!habitDone||!gymOk)return true;
  return checkKpiLock();
}
function gymDoneToday(){
  const td=today();
  const w=S.workouts.find(w=>w.date===td);
  return w&&(w.isRest||(w.entries||[]).length>0||(w.exercises||[]).length>0);
}
function markGymRest(date){
  date=date||today();
  let w=S.workouts.find(w=>w.date===date);
  if(!w){w={date,entries:[],exercises:[]};S.workouts.push(w);}
  if(w.isRest){w.isRest=false;save();render();toast('休みの記録を取り消しました');}
  else{w.isRest=true;save();render();toast('❌ 休みとして記録しました');}
}

function biz2(){
  let b=S.bizBoard;
  if(!b||typeof b!=='object')b=S.bizBoard={};
  if(b.v===2){
    if(typeof b.north!=='string')b.north=BIZ_BOARD.north;
    if(!Array.isArray(b.units)||!b.units.length)b.units=[{id:'all',name:'全社'}];
    if(!b.data||typeof b.data!=='object')b.data={};
    b.units.forEach(u=>{if(!b.data[u.id])b.data[u.id]={goals:[],roadmap:[],issues:[]};});
    if(!Array.isArray(b.cadence))b.cadence=[];
    if(!b.org||!Array.isArray(b.org.roles))b.org={roles:bizOrgSeed()};
    if(!b.active||!b.units.some(u=>u.id===b.active))b.active=b.units[0].id;
    return b;
  }
  const legacy=b||{};
  const done=legacy.done||{}, roadOv=legacy.roadOv||{}, goalOv=legacy.goalOv||{};
  const hiddenIssues=legacy.hiddenIssues||[], hiddenTasks=legacy.hiddenTasks||[];
  const extra=legacy.extra||[], userGoals=legacy.userGoals||[], userRoadmap=legacy.userRoadmap||[], userIssues=legacy.userIssues||[];
  const allGoals=[
    ...BIZ_BOARD.goals.map((g,i)=>{const ov=goalOv[i]||{};return{id:uid(),label:ov.label||g.label,target:ov.target||g.target,detail:ov.detail!==undefined?ov.detail:g.detail};}),
    ...userGoals.map(g=>({id:g.id||uid(),label:g.label,target:g.target,detail:g.detail}))
  ];
  const allRoad=[
    ...BIZ_BOARD.roadmap.map(r=>{const ov=roadOv[r.no]||{};return{id:uid(),title:ov.title||r.title,note:ov.note!==undefined?ov.note:r.note,st:ov.st||r.st};}),
    ...userRoadmap.map(r=>({id:r.id||uid(),title:r.title,note:'',st:r.st||'todo'}))
  ];
  const allIssues=[
    ...BIZ_BOARD.issues.filter(i=>!hiddenIssues.includes(i.id)).map(i=>{
      const tasks=[
        ...i.tasks.filter(t=>!hiddenTasks.includes(t.id)).map(t=>({id:uid(),text:t.text,owner:t.owner||'',due:t.due||'',done:!!done[t.id]})),
        ...extra.filter(x=>x.issueId===i.id).map(x=>({id:uid(),text:x.text,owner:x.owner||'',due:'',done:!!done[x.id]}))
      ];
      return{id:uid(),title:i.title,why:i.why||'',tasks};
    }),
    ...userIssues.map(i=>({id:i.id||uid(),title:i.title,why:i.why||'',tasks:(i.tasks||[]).map(t=>({id:t.id||uid(),text:t.text,owner:t.owner||'',due:t.due||'',done:!!done[t.id]}))}))
  ];
  const mkUnit=(sid)=>{const s=BU_PLAN_SEEDS[sid]||{roadmap:[],issues:[]};return{
    goals:[],
    roadmap:s.roadmap.map(r=>({id:uid(),title:r.t,note:'',st:r.st||'todo'})),
    issues:s.issues.map(i=>({id:uid(),title:i.t,why:i.why||'',tasks:i.tasks.map(t=>({id:uid(),text:t.x,owner:t.o||'',due:'',done:false}))}))
  };};
  // この端末に「人が入力した実データ」が有ったか判定。無ければ純粋な種データ扱いにする。
  // 種データは updatedAt=0 かつ _seed:true とし、クラウドへは絶対に push しない(実データを上書きしない)。
  const hadReal=!!legacy.updatedAt || userGoals.length||userRoadmap.length||userIssues.length||extra.length
    ||Object.keys(done).length||Object.keys(roadOv).length||Object.keys(goalOv).length
    ||hiddenIssues.length||hiddenTasks.length||(typeof legacy.north==='string'&&!!legacy.north)
    ||(Array.isArray(legacy.cadence)&&legacy.cadence.length&&typeof legacy.cadence[0]==='object');
  const nb={
    v:2,
    north:(typeof legacy.north==='string'&&legacy.north)||BIZ_BOARD.north,
    units:[{id:'all',name:'全社'},{id:'u_hp',name:'HP構築'},{id:'u_dispatch',name:'編集者派遣'},{id:'u_shift',name:'シフトさん'}],
    active:'all',

    updatedAt: hadReal ? (legacy.updatedAt||Date.now()) : 0,
  };

  if(hadReal) bizBackup('migrate-v1-v2');
  S.bizBoard=nb; save();
  return nb;
}

// --- 経営ボードのローカルバックアップ(誤消失の復元用) ---
const BIZ_BAK_KEY='mcapp_biz_bak';
function _bizContentCount(b){try{let n=0;const dd=b&&b.data||{};Object.keys(dd).forEach(k=>{const u=dd[k]||{};n+=(u.goals||[]).length+(u.roadmap||[]).length;(u.issues||[]).forEach(i=>{n+=1+((i.tasks||[]).length);});n+=((u.kgimap&&u.kgimap.nodes)||[]).length;});n+=((b&&b.org&&b.org.roles)||[]).length;return n;}catch(e){return 0;}}
function bizBackup(reason){
  try{
    const b=S.bizBoard; if(!b||b._seed) return;                 // 種データは保存しない
    if(_bizContentCount(b)<=0) return;                          // 空は保存しない
    const arr=JSON.parse(localStorage.getItem(BIZ_BAK_KEY)||'[]');
    const sig=JSON.stringify((({updatedAt,_seed,...r})=>r)(b));
    if(arr.length&&arr[arr.length-1].sig===sig) return;         // 直前と同一なら重複保存しない
    arr.push({ts:Date.now(),reason:reason||'',sig,count:_bizContentCount(b),board:b});
    while(arr.length>12) arr.shift();
    localStorage.setItem(BIZ_BAK_KEY,JSON.stringify(arr));
  }catch(e){console.warn('bizBackup failed',e);}
}
// 復元候補を集める(専用バックアップ + 旧・アカウント切替バックアップ ef_team_v5_backup_*)
function bizRestoreCandidates(){
  const out=[];
  try{JSON.parse(localStorage.getItem(BIZ_BAK_KEY)||'[]').forEach(x=>{if(x&&x.board)out.push({ts:x.ts,src:'自動バックアップ',reason:x.reason||'',count:x.count||_bizContentCount(x.board),board:x.board});});}catch(e){}
  try{Object.keys(localStorage).filter(k=>k.startsWith('ef_team_v5_backup_')).forEach(k=>{
    try{const s=JSON.parse(localStorage.getItem(k));const bb=s&&s.bizBoard;const c=_bizContentCount(bb);if(bb&&c>0){const ts=parseInt(k.split('_').pop(),10)||0;out.push({ts,src:'旧バックアップ',reason:'account-switch',count:c,board:bb});}}catch(_){}}); }catch(e){}
  return out.sort((a,b)=>b.ts-a.ts);
}
function bizRestore(ts){
  const c=bizRestoreCandidates().find(x=>String(x.ts)===String(ts));
  if(!c){toast('復元候補が見つかりません','warn');return;}
  if(!confirm('このバックアップ('+new Date(c.ts).toLocaleString()+' / '+c.count+'項目)で現在の経営ボードを上書きします。よろしいですか?'))return;
  bizBackup('before-restore');
  const nb=JSON.parse(JSON.stringify(c.board));nb.v=2;delete nb._seed;nb.updatedAt=Date.now();

function orgDel(id){
  const o=bizOrg();const r=o.roles.find(x=>x.id===id);if(!r)return;
  const kids=o.roles.filter(x=>x.parentId===id);
  const msg=kids.length?('「'+r.name+'」を削除しますか?(配下'+kids.length+'名は上位へ繰り上げます)'):('「'+r.name+'」を削除しますか?');
  if(!confirm(msg))return;

function orgMove(id){
  const o=bizOrg();const r=o.roles.find(x=>x.id===id);if(!r)return;
  const desc=new Set([id]);let added=true;
  while(added){added=false;o.roles.forEach(x=>{if(x.parentId&&desc.has(x.parentId)&&!desc.has(x.id)){desc.add(x.id);added=true;}});}
  const cands=o.roles.filter(x=>!desc.has(x.id));
  const list=cands.map((x,i)=>(i+1)+'. '+x.name+(x.title?'('+x.title+')':'')).join('\n');
  const ans=prompt('「'+r.name+'」の上司を番号で選択:\n0. (トップに配置)\n'+list);
  if(ans===null)return;
  const n=parseInt(ans,10);if(isNaN(n))return;
  if(n===0)r.parentId=null;
  else if(n>=1&&n<=cands.length)r.parentId=cands[n-1].id;
  bizTouch();
}
// ===XMind風ツリー図エンジン(組織図・KGIマップ共通)===
// dir:'down'=トップダウン組織図 / 'right'=右展開マインドマップ。折りたたみ(collapsed)・ズーム対応
const BIZ_ZOOM={org:1,kgi:1};
function bizZoom(which,delta){let z=BIZ_ZOOM[which]||1;z=delta===0?1:Math.min(2,Math.max(0.4,Math.round((z+delta)*10)/10));BIZ_ZOOM[which]=z;render();}
function bizZoomBar(which){const z=Math.round((BIZ_ZOOM[which]||1)*100);return`<div style="display:flex;gap:6px;align-items:center;margin:0 0 6px">
  <button class="btn btn-g btn-xs" onclick="bizZoom('${which}',-0.1)">－</button>
  <span style="font-size:11px;color:var(--t3);min-width:40px;text-align:center">${z}%</span>
  <button class="btn btn-g btn-xs" onclick="bizZoom('${which}',0.1)">＋</button>
  <button class="btn btn-g btn-xs" onclick="bizZoom('${which}',0)">100%</button>
</div>`;}
function bizTreeRender(nodes,opts){
  const {dir,NW,NH,HGAP,VGAP,cardFn,toggleFn,zoomKey}=opts;const OFF=12;
  const byId={};nodes.forEach(n=>byId[n.id]=n);
  const childrenOf=pid=>nodes.filter(n=>(n.parentId||null)===(pid||null));
  const cache={};
  function span(id){if(cache[id]!==undefined)return cache[id];const n=byId[id];const kids=n.collapsed?[]:childrenOf(id);
    let s;if(dir==='down')s=kids.length?kids.reduce((a,k)=>a+span(k.id),0)+HGAP*(kids.length-1):NW;
    else s=kids.length?kids.reduce((a,k)=>a+span(k.id),0)+VGAP*(kids.length-1):NH;cache[id]=s;return s;}
  const pos={};
  function place(id,depth,start){const n=byId[id];const kids=n.collapsed?[]:childrenOf(id);const s=span(id);
    if(dir==='down'){pos[id]={x:start+s/2-NW/2,y:OFF+depth*(NH+VGAP)};let c=start;kids.forEach(k=>{place(k.id,depth+1,c);c+=span(k.id)+HGAP;});}
    else{pos[id]={x:OFF+depth*(NW+HGAP),y:start+s/2-NH/2};let c=start;kids.forEach(k=>{place(k.id,depth+1,c);c+=span(k.id)+VGAP;});}}
  let cur=OFF;childrenOf(null).forEach(r=>{place(r.id,0,cur);cur+=span(r.id)+(dir==='down'?HGAP:VGAP);});
  let maxX=0,maxY=0;Object.values(pos).forEach(p=>{maxX=Math.max(maxX,p.x+NW);maxY=Math.max(maxY,p.y+NH);});
  const canvasW=maxX+OFF,canvasH=maxY+OFF;
  let paths='';
  nodes.forEach(n=>{const p=pos[n.id];if(!p||n.collapsed)return;childrenOf(n.id).forEach(k=>{const c=pos[k.id];if(!c)return;
    if(dir==='down'){const x1=p.x+NW/2,y1=p.y+NH,x2=c.x+NW/2,y2=c.y,busY=y1+VGAP/2;paths+=`<path d="M${x1},${y1} V${busY} H${x2} V${y2}" fill="none" stroke="var(--t3)" stroke-width="1.6" opacity="0.55"/>`;}
    else{const x1=p.x+NW,y1=p.y+NH/2,x2=c.x,y2=c.y+NH/2,mx=(x1+x2)/2;paths+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="var(--t3)" stroke-width="1.6" opacity="0.5"/>`;}});});
  let nodeHtml='';
  nodes.forEach(n=>{const p=pos[n.id];if(!p)return;
    nodeHtml+=`<div style="position:absolute;left:${p.x}px;top:${p.y}px;width:${NW}px;min-height:${NH}px;box-sizing:border-box">${cardFn(n)}</div>`;
    if(childrenOf(n.id).length){let tx,ty;if(dir==='down'){tx=p.x+NW/2-9;ty=p.y+NH+Math.min(VGAP/2,16)-9;}else{tx=p.x+NW+Math.min(HGAP/2,16)-9;ty=p.y+NH/2-9;}
      nodeHtml+=`<button onclick="${toggleFn}('${n.id}')" title="${n.collapsed?'展開':'折りたたむ'}" style="position:absolute;left:${tx}px;top:${ty}px;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--t3);background:var(--card);color:var(--t2);font-size:12px;line-height:16px;text-align:center;cursor:pointer;padding:0;z-index:2">${n.collapsed?'+':'−'}</button>`;}});
  const z=BIZ_ZOOM[zoomKey]||1;
  return`${bizZoomBar(zoomKey)}<div style="overflow:auto;max-height:560px;border:1px solid var(--card2);border-radius:10px;background:var(--bg)">
    <div style="width:${Math.ceil(canvasW*z)}px;height:${Math.ceil(canvasH*z)}px">
      <div style="position:relative;width:${canvasW}px;height:${canvasH}px;transform:scale(${z});transform-origin:top left">
        <svg width="${canvasW}" height="${canvasH}" style="position:absolute;left:0;top:0;pointer-events:none;overflow:visible">${paths}</svg>
        ${nodeHtml}
      </div>
    </div>
  </div>`;
}

function bizKgi(){

function kgiDel(id){
  const k=bizKgi();const n=k.nodes.find(x=>x.id===id);if(!n)return;
  const del=new Set([id]);let added=true;
  while(added){added=false;k.nodes.forEach(x=>{if(x.parentId&&del.has(x.parentId)&&!del.has(x.id)){del.add(x.id);added=true;}});}
  const cnt=del.size;
  if(!confirm('「'+n.text+'」を削除しますか?'+(cnt>1?'(配下'+(cnt-1)+'件も一緒に削除)':'')))return;
  k.nodes=k.nodes.filter(x=>!del.has(x.id));bizTouch();
}

function buTouch(u){u.updatedAt=Date.now();save();render();}
function buCommission(u,kind,repType){
  const c=buComm(u);
  if(kind==='sale'){
    if(repType==='sasaki')return{sasaki:c.saleSasaki,staff:0};
    if(repType==='staff')return{sasaki:c.saleMgr,staff:c.saleStaff};
  }else if(kind==='recruit'){
    if(repType==='sasaki')return{sasaki:c.recruitSasaki,staff:0};
    if(repType==='staff')return{sasaki:c.recruitMgr,staff:c.recruitStaff};
  }
  return{sasaki:0,staff:0};
}
function buThisMonth(dateStr){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return String(dateStr||'').startsWith(ym);
}
function buAddSale(unitId){

  const repType=document.getElementById(`bu-reptype-${unitId}`).value;

  const product=(document.getElementById(`bu-product-${unitId}`).value||'').trim();

  const c=buCommission(u,'sale',repType);
  u.sales=u.sales||[];
  u.sales.unshift({id:uid(),date:today(),client,product,amount,repType,rep:rep||(repType==='sasaki'?'佐々木':''),

function buSetRecruit(unitId,rid,field,value){

  const r=(u.recruits||[]).find(x=>x.id===rid);if(!r)return;
  r[field]=value;r.updatedAt=Date.now();

function panelTaskDrop(e,targetId){
  e.preventDefault();e.stopPropagation();
  const id=_taskDragId;
  if(!id||id===targetId){_taskDragId=null;return;}
  const from=S.tasks.findIndex(t=>t.id===id);
  const to=S.tasks.findIndex(t=>t.id===targetId);
  if(from<0||to<0){_taskDragId=null;return;}
  const[item]=S.tasks.splice(from,1);S.tasks.splice(to,0,item);
  save();render();_taskDragId=null;
}
function blockTaskDrop(e,targetId){
  e.preventDefault();e.stopPropagation();
  const id=_taskDragId;
  if(!id||id===targetId){_taskDragId=null;return;}
  const src=S.tasks.find(t=>t.id===id);
  const tgt=S.tasks.find(t=>t.id===targetId);
  if(!src||!tgt){_taskDragId=null;return;}
  // 別ブロックのタスクの上に載せた → そのブロックへ移動（時間帯またぎの入れ替え）
  if(tgt.fsBlockId&&src.fsBlockId!==tgt.fsBlockId){
    src.fsBlockId=tgt.fsBlockId;
    if(tgt.startTime)src.startTime=tgt.startTime;
    src.fsSlot=tgt.fsSlot;
  }
  // 配列内の順序を入れ替え（splice後にインデックスがずれるため再取得）
  const from=S.tasks.findIndex(t=>t.id===id);
  if(from<0){_taskDragId=null;return;}
  const[item]=S.tasks.splice(from,1);
  const to=S.tasks.findIndex(t=>t.id===targetId);
  if(to<0){S.tasks.push(item);}else{S.tasks.splice(to,0,item);}
  save();render();_taskDragId=null;
}
function fsDashPanelDragOver(e){e.preventDefault();document.querySelector('.fs-dash-panel')?.classList.add('drag-over');}
function fsDashPanelDragLeave(e){document.querySelector('.fs-dash-panel')?.classList.remove('drag-over');}
function fsDashPanelDrop(e,date){
  e.preventDefault();
  document.querySelector('.fs-dash-panel')?.classList.remove('drag-over');
  const id=_taskDragId;
  if(!id)return;
  const t=S.tasks.find(t=>t.id===id);

  if(t.fsBlockId){_taskDragId=null;return;}
  if(date)t.dueDate=date;
  save();render();
  _taskDragId=null;
}

// <input type=time>にセット可能な値のみ返す（'24:00'や'-1'等の特殊値は空欄にしてHTMLバリデーションエラーを防ぐ。データは書き換えない）
function fsTimeInputVal(v){return /^([01]\d|2[0-3]):[0-5]\d$/.test(v)?v:'';}
// ブロックの開始〜終了を30分刻みの目盛りバーとして表示（見た目のみ・データ構造は変更しない）
function rFs30MinTicks(sm,em,nowM,isNow,color){
  if(sm===null||em===null||em<=sm)return'';
  const dur=em-sm;
  if(dur<=0||dur>24*60)return'';
  const step=30;
  const ticks=[];
  for(let m=sm-(sm%step);m<=em;m+=step){
    if(m<sm||m>em)continue;
    const pct=((m-sm)/dur*100).toFixed(2);
    const h=Math.floor(m/60)%24,mi=m%60;
    const lbl=mi===0?`${h}時`:`${h}:${String(mi).padStart(2,'0')}`;
    ticks.push(`<div style="position:absolute;left:${pct}%;top:0;height:100%;border-left:1px solid ${color}30"></div>
      <div style="position:absolute;left:${pct}%;top:100%;transform:translateX(-50%);font-size:9px;color:var(--t3);white-space:nowrap;margin-top:2px">${lbl}</div>`);
  }
  const nowPct=isNow&&nowM>=sm&&nowM<=em?((nowM-sm)/dur*100).toFixed(2):null;
  return`<div style="position:relative;height:5px;margin:2px 0 14px 28px;background:${color}12;border-radius:3px">
    ${ticks.join('')}
    ${nowPct!==null?`<div style="position:absolute;left:${nowPct}%;top:-3px;width:2px;height:11px;background:${color};border-radius:1px"></div>`:''}
  </div>`;
}
// 固定タイムスケジュールをリスト表示（compact=trueで説明文省略、dateで対象日指定、timeline=trueで時間軸タイムライン表示）
function rFixedScheduleList(compact=false,droppable=false,date,timeline=false){
  const fs=S.fs||DEFAULT_FS;
  if(!fs.length)return'';
  const now=new Date();
  const nowM=now.getHours()*60+now.getMinutes();
  const td=date||today();
  // 今日以外は「進行中」表示をしない
  const isTargetToday=!date||date===today();
  // タイムライン表示（会長指示2026-07-05: 帯+浮きカード方式）は専用関数へ分岐
  if(timeline)return rFsTimelineView(fs,droppable,td,isTargetToday,nowM);
  const blocksHtml=fs.map((f,i)=>{
    const hasStart=f.s&&f.s!=='-1'&&f.s!=='';
    const sm=hasStart?tMin(f.s):null;
    const em=tMin(f.e==='24:00'||f.e==='-1'?'24:00':f.e);
    const isNow=isTargetToday&&hasStart&&sm!==null&&nowM>=sm&&nowM<em;
    const blockId=f.id||('b'+i);
    const dropAttrs=droppable?`ondragover="fsBlockDragOver(event,${i})" ondragleave="fsBlockDragLeave(event,${i})" ondrop="fsBlockDrop(event,'${f.s}','${blockId}',${i},'${td}')" id="fs-block-${i}"`:'';
    // →区切りのサブタスク解析（タイトルと説明、両方）
    const titleParts=f.t.includes('→')?f.t.split('→').map(s=>s.trim()).filter(Boolean):[];
    const descParts=f.d&&f.d.includes('→')?f.d.split('→').map(s=>s.trim()).filter(Boolean):[];
    const allParts=[...titleParts,...descParts];
    const hasParts=allParts.length>=2;
    // チェック状態（今日のみ有効・翌日自動リセット）
    const ck=getFsCk(blockId);
    const allPartsDone=hasParts&&allParts.every((_,idx)=>!!ck.subs[idx]);
    const mainDone=ck.main||(hasParts&&allPartsDone);
    // このブロック時間帯の今日タスク（開始時間が有効な場合のみ）
    const blockTasks=droppable&&hasStart&&sm!==null?(S.tasks||[]).filter(t=>{
      if(t.deleted)return false;
      if(t.dueDate&&t.dueDate!==td)return false;
      if(!t.startTime)return false;
      const tm=tMin(t.startTime);
      return tm>=sm&&tm<em;
    }):[];
    // ブロックに属するタスク（fsBlockId または startTime範囲）をスロット順に
    const allBlockTasks=droppable?(S.tasks||[]).filter(t=>{
      if(t.deleted)return false;
      if(t.dueDate&&t.dueDate!==td)return false;
      if(t.fsBlockId===blockId)return true;
      if(!t.fsBlockId&&hasStart&&sm!==null&&t.startTime){const tm=tMin(t.startTime);return tm>=sm&&tm<em;}
      return false;
    }):[];
    // タスクカード生成ヘルパー
    const rBlockTask=t=>`<div class="task-item" id="ti-${t.id}"
  draggable="true" ondragstart="taskDragStart(event,'${t.id}')" ondragend="taskDragEnd(event)"
  ondragover="event.preventDefault();event.stopPropagation();this.classList.add('drag-over')"
  ondragleave="this.classList.remove('drag-over')"
  ondrop="blockTaskDrop(event,'${t.id}')"
  style="border-left:2px solid ${f.c};margin:2px 0;padding:6px 10px;cursor:grab;box-shadow:none;flex-shrink:0">
  <div class="chk ${t.done?'done':''}" style="width:16px;height:16px;border-radius:4px;flex-shrink:0" onclick="toggleDone('${t.id}')"></div>
  <div class="task-body" style="min-width:0">
    <div class="task-ttl ${t.done?'done':''}" style="font-size:12px">${esc(t.title)}</div>
  </div>
  <div class="task-acts" style="opacity:1;gap:2px">
    <button class="tact" style="padding:2px 5px;font-size:11px" onclick="openTaskModal('${t.id}')">✏️</button>
    <button class="tact del" style="padding:2px 5px;font-size:11px" onclick="delTask('${t.id}')">🗑</button>
  </div>
</div>`;
    // ドロップゾーン生成ヘルパー（slot: -1=先頭, 0=sub[0]後, 1=sub[1]後...）
    const rDz=(slot,label)=>droppable?`<div class="fs-dropzone"
  ondragover="fsInternalDragOver(event)" ondragleave="fsInternalDragLeave(event)"
  ondrop="fsInternalDrop(event,'${blockId}',${slot},'${td}','${f.s||''}')"
  onclick="openFsTaskModal('${blockId}',${slot},'${f.s||''}','${td}')">
  <div class="fs-dz-plus">＋ ${label||'ここに追加'}</div>
</div>`:'';
    // サブタスクとタスクをインターリーブしたリスト構築
    let subList='';
    if(hasParts&&!compact){
      // スロット -1: サブタスク[0]の前
      const beforeAll=allBlockTasks.filter(t=>(t.fsSlot??9999)<0);
      subList+=rDz(-1,'タスクを追加');
      subList+=beforeAll.map(rBlockTask).join('');
      allParts.forEach((item,idx)=>{
        const done=!!ck.subs[idx];
        subList+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 2px">
  <div class="fs-sub-chk ${done?'done':''}" onclick="event.stopPropagation();toggleFsSub('${blockId}',${idx})"></div>
  <span style="font-size:13px;flex:1;${done?'text-decoration:line-through;color:var(--t3)':'color:var(--text)'}">${esc(item)}</span>
</div>`;
        // このサブタスクの後ろのスロット
        const atSlot=allBlockTasks.filter(t=>(t.fsSlot??9999)===idx);
        subList+=rDz(idx,'タスクを追加');
        subList+=atSlot.map(rBlockTask).join('');
      });
      // 末尾（スロットが最後以降）
      const trailing=allBlockTasks.filter(t=>(t.fsSlot??9999)>allParts.length-1&&(t.fsSlot??9999)<9999-(allParts.length));
      subList+=trailing.map(rBlockTask).join('');
    }
    // サブタスクなしブロックのタスク一覧（ドロップゾーンを各タスクの前後に配置）
    const plainTasks=hasParts?'':(droppable
      ?rDz(-1,'先頭に追加')+allBlockTasks.map((t,idx)=>rBlockTask(t)+rDz(idx,'ここに追加')).join('')
      :allBlockTasks.map(rBlockTask).join(''));
    const bodyInner=`<div style="display:flex;align-items:center;gap:9px">

    ${(hasStart||f.e)?`<div style="font-size:11px;color:var(--t3);flex-shrink:0;min-width:82px;font-variant-numeric:tabular-nums">${hasStart?f.s+'〜':''}${f.e||''}</div>`:''}
    <div style="flex:1;min-width:0">
      ${hasParts
        ?`<div style="font-weight:700;font-size:13px;${mainDone?'text-decoration:line-through;color:var(--t3)':'color:var(--text)'}">${isNow?'▶ ':''}<span style="color:${f.c}">${esc(f.t.split('→')[0].trim())}</span><span style="color:var(--t3);font-size:11px;margin-left:4px">→ ${allParts.length}項目</span></div>`
        :`<div style="font-weight:600;font-size:13px;${mainDone?'text-decoration:line-through;color:var(--t3)':''}${isNow?';color:'+f.c+';font-weight:700':''}">${isNow?'▶ ':''}${esc(f.t)}</div>
      ${!compact&&f.d&&!descParts.length?`<div style="font-size:11px;color:var(--t2);margin-top:1px">${esc(f.d)}</div>`:''}`
      }
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      ${isNow?`<span style="font-size:10px;background:${f.c}20;color:${f.c};border:1px solid ${f.c}40;border-radius:99px;padding:2px 8px;font-weight:700">進行中</span>`:''}
      ${droppable&&!hasParts?`<button class="btn btn-xs" style="background:${f.c}12;color:${f.c};border:1px solid ${f.c}30;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700" onclick="openFsTaskModal('${blockId}',9999,'${f.s||''}','${td}')">＋</button>`:''}
    </div>
  </div>
  ${!compact&&hasStart&&f.e?rFs30MinTicks(sm,em,nowM,isNow,f.c):''}
  ${hasParts&&!compact?`<div style="margin:8px 0 2px 28px;padding-top:6px;border-top:1px solid ${f.c}18">${subList}</div>`:''}
  ${!hasParts&&plainTasks?`<div style="margin:4px 0 0 28px">${plainTasks}</div>`:''}`;
    const blockBaseStyle=`border-left:3px solid ${f.c};${isNow?'background:'+f.c+'0e':'background:var(--card)'};transition:background .15s;flex-direction:column;align-items:stretch;gap:0;padding:11px 14px`;
    return`<div class="task-item fs-drop-zone" ${dropAttrs} style="${blockBaseStyle}">${bodyInner}</div>`;
  });
  return blocksHtml.join('');
}

// ===== タイムライン表示（会長指示2026-07-05: 帯+浮きカード方式） =====
// 背景レイヤー=時間範囲を薄色で塗った帯（Googleカレンダー背景予定風）、前景レイヤー=チェック項目のコンパクトな浮きカード。
// カード同士は「後のカードtop = max(自身の開始位置, 直前カード底+8px)」で必ず押し下げて重なりゼロにする。
// 所要時間を「◯時間◯分」形式に整形（会長指示2026-07-06: Structured同等の所要時間表示）
function fsDurationLabel(sm,em){
  let dur=em-sm;if(dur<0)dur+=24*60;
  const h=Math.floor(dur/60),m=dur%60;
  if(h&&m)return`${h}時間${m}分`;
  if(h)return`${h}時間`;
  return`${m}分`;
}
// ブロックのノード表示文字（icon優先・未設定はタイトル頭文字。絵文字/文字とも先頭1書記素で概算）
function fsNodeGlyph(f){
  if(f.icon)return f.icon;
  const t=(f.t||'').split('→')[0].trim();
  return t?[...t][0]:'・';
}
// 項目（サブタスク）の時刻位置レイアウト計算（会長承認済み新設計 2026-07-06）
// - itemTimes[idx]（'HH:MM'）が設定されていればその位置（範囲外はclamp）
// - 未設定の項目は start + i*(duration/n) で等間隔配置
// - 同位置衝突は最小限だけ下にnudge
// - 範囲の高さに全項目が収まらない場合、収まる分だけ返しoverflowに残りを積む
function fsLayoutItems(allParts,itemTimes,sm,em,rangeTopPx,rangeHPx,PPM){
  const n=allParts.length;
  const ROW_H=26,GAP=3,PAD_TOP=4,PAD_BOTTOM=4;
  itemTimes=itemTimes||{};
  // 1) 理想位置（分）を算出
  const idealMin=allParts.map((_,idx)=>{
    const t=itemTimes[idx];
    if(t){
      let m=tMin(t);
      if(m<sm)m=sm;
      if(m>em)m=em;
      return m;
    }
    return sm+(n>0?idx*((em-sm)/n):0);
  });
  // 2) px位置に変換し、開始順（元のidx順=時系列とみなす）でnudge衝突回避
  let items=allParts.map((item,idx)=>({idx,item,top:rangeTopPx+(idealMin[idx]-sm)*PPM}));
  let prevBottom=-Infinity;
  items.forEach(o=>{
    if(o.top<prevBottom+ROW_H+GAP)o.top=prevBottom+ROW_H+GAP;
    prevBottom=o.top;
  });
  // 3) 範囲内に収まる件数を判定（範囲下端 - PAD_BOTTOM を超えたら以降はoverflow）
  const limit=rangeTopPx+rangeHPx-PAD_BOTTOM-ROW_H;
  const visible=[],overflow=[];
  items.forEach(o=>{ (o.top<=limit+0.5?visible:overflow).push(o); });
  // 範囲が極端に狭く1件も入らない場合でも先頭1件だけは表示（完全非表示を避ける）
  if(!visible.length&&items.length){visible.push(items[0]);overflow.shift();}
  return{visible,overflow,ROW_H};
}
function rFsTimelineView(fs,droppable,td,isTargetToday,nowM){
  const TL_START_M=0,TL_END_M=24*60;
  const TL_PPM=1.2; // 1分あたりのpx（CSS変数 --fs-tl-ppm と一致させる）
  const totalH=(TL_END_M-TL_START_M)*TL_PPM;
  // 1) 各ブロックの帯情報（深夜跨ぎは2分割）
  const bands=[];
  fs.forEach((f,i)=>{
    const hasStart=f.s&&f.s!=='-1'&&f.s!=='';
    if(!hasStart||!f.e)return;
    const blockId=f.id||('b'+i);
    let sm=tMin(f.s);
    let em=tMin(f.e==='24:00'||f.e==='-1'?'24:00':f.e);
    if(em<=sm)em+=24*60; // 深夜跨ぎ（例: 23:30〜翌0:30）
    const isNow=isTargetToday&&nowM>=sm&&nowM<em;
    if(em<=24*60){
      bands.push({i,f,blockId,sm,em,isNow,splitPart:null});
    }else{
      bands.push({i,f,blockId,sm,em:24*60,isNow:isTargetToday&&nowM>=sm,splitPart:'start'});
      bands.push({i,f,blockId,sm:0,em:em-24*60,isNow:isTargetToday&&nowM<(em-24*60),splitPart:'end'});
    }
  });
  bands.sort((a,b)=>a.sm-b.sm);
  // 2) 中央レール: 予定がある区間は実線、空いている区間は点線（クリック/ホバーで＋表示→タスク追加）
  const railSegs=[];
  {
    const covered=bands.map(b=>[b.sm,b.em]).sort((a,b)=>a[0]-b[0]);
    let cursor=TL_START_M;
    covered.forEach(([s,e])=>{
      if(s>cursor)railSegs.push({top:cursor,h:s-cursor,gap:true});
      if(e>cursor){railSegs.push({top:Math.max(s,cursor),h:e-Math.max(s,cursor),gap:false});cursor=Math.max(cursor,e);}
    });
    if(cursor<TL_END_M)railSegs.push({top:cursor,h:TL_END_M-cursor,gap:true});
  }
  const railHtml=railSegs.map(seg=>{
    const top=(seg.top-TL_START_M)*TL_PPM;
    const h=Math.max(seg.h*TL_PPM,2);
    if(seg.gap){
      return`<div class="fs-tl-rail-gap" style="top:${top}px;height:${h}px" onclick="fsTlColClick(event,'${td}')" title="クリックしてこの時間にタスクを追加">
  <div class="fs-tl-gap-plus">＋</div>
</div>`;
    }
    return`<div class="fs-tl-rail" style="top:${top}px;height:${h}px"></div>`;
  }).join('');
  // 3) 帯（範囲色帯）: ブロックの開始〜終了をアクセント色12〜16%半透明+左3pxボーダーで表示。ドロップ対象も兼ねる。
  const bandsHtml=bands.map(b=>{
    const{f,blockId,sm,em,splitPart,isNow}=b;
    const top=(sm-TL_START_M)*TL_PPM;
    const h=Math.max((em-sm)*TL_PPM,18);
    const dropAttrs=droppable?`ondragover="fsBlockDragOver(event,${b.i})" ondragleave="fsBlockDragLeave(event,${b.i})" ondrop="fsBlockDrop(event,'${f.s}','${blockId}',${b.i},'${td}')" id="fs-block-${b.i}${splitPart||''}"`:'';
    return`<div class="fs-tl-range-band fs-tl-band fs-drop-zone ${isNow?'now':''}" ${dropAttrs} style="top:${top}px;height:${h}px;--band-c:${f.c}"></div>`;
  }).join('');
  // 4) ヘッダー（開始時刻ピッタリに固定）+ 項目行（範囲内に時刻連動で絶対配置）
  //    ヘッダー同士が近接する場合は右にオフセットして重なりを避ける（押し下げはしない）
  const headerSeeds=bands.filter(b=>b.splitPart!=='end').map(b=>({...b,sortKey:b.sm}));
  headerSeeds.sort((a,b)=>a.sortKey-b.sortKey||a.i-b.i);
  let prevHdrTop=-Infinity,prevHdrOffset=0;
  const headersHtml=[],itemsHtml=[];
  headerSeeds.forEach(b=>{
    const{f,i,blockId,sm,em,isNow}=b;
    const blockId2=blockId;
    const hdrTop=(sm-TL_START_M)*TL_PPM;
    // 近接ヘッダー（24px以内）は右にオフセットして重なり回避。ヘッダーは押し下げしない。
    let offsetX=0;
    if(hdrTop-prevHdrTop<24){offsetX=prevHdrOffset+18;}else{offsetX=0;}
    prevHdrTop=hdrTop;prevHdrOffset=offsetX;
    // チェック状態・サブタスク解析
    const titleParts=f.t.includes('→')?f.t.split('→').map(s=>s.trim()).filter(Boolean):[];
    const descParts=f.d&&f.d.includes('→')?f.d.split('→').map(s=>s.trim()).filter(Boolean):[];
    const allParts=[...titleParts,...descParts];
    const hasParts=allParts.length>=2;
    const ck=getFsCk(blockId2);
    const doneCount=hasParts?allParts.filter((_,idx)=>!!ck.subs[idx]).length:0;
    const allPartsDone=hasParts&&doneCount===allParts.length;
    const mainDone=ck.main||(hasParts&&allPartsDone);
    const durLbl=fsDurationLabel(sm,em);
    const dropAttrs=droppable?`ondragover="fsBlockDragOver(event,${i})" ondragleave="fsBlockDragLeave(event,${i})" ondrop="fsBlockDrop(event,'${f.s}','${blockId2}',${i},'${td}')" id="fs-card-${i}"`:'';
    const titleTxt=esc(f.t.split('→')[0].trim());
    headersHtml.push(`<div class="fs-tl-hdr fs-drop-zone ${mainDone?'done':''}" ${dropAttrs} style="top:${hdrTop}px;margin-left:${offsetX}px;--hdr-c:${f.c}" onclick="openFsDetailModal('${blockId2}')" title="タップで詳細を開く">
  <div class="fs-tl-hdr-chk ${mainDone?'done':''}" onclick="event.stopPropagation();toggleFsMain('${blockId2}')">${mainDone?'✓':''}</div>
  <div class="fs-tl-hdr-body">
    <div class="fs-tl-hdr-title ${mainDone?'done':''}">${isNow?'▶ ':''}${titleTxt}</div>
    <div class="fs-tl-hdr-meta">
      <span>${esc(f.s)}–${esc(f.e==='24:00'?'24:00':f.e)} ・ ${durLbl}</span>
      ${isNow?`<span style="color:${f.c};font-weight:700">● 進行中</span>`:''}
    </div>
  </div>
  ${hasParts?`<div class="fs-tl-hdr-progress">${doneCount}/${allParts.length}</div>`:(droppable?`<button class="btn btn-xs" style="background:${f.c}12;color:${f.c};border:1px solid ${f.c}30;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;flex-shrink:0" onclick="event.stopPropagation();openFsTaskModal('${blockId2}',9999,'${f.s||''}','${td}')">＋</button>`:'')}
</div>`);
    // 項目（サブタスク）行: 範囲内の時刻位置に絶対配置。時刻未設定は等間隔、設定済みはその位置（clamp）。
    if(hasParts){
      const rangeTopPx=(sm-TL_START_M)*TL_PPM;
      const rangeHPx=Math.max((em-sm)*TL_PPM,18);
      const{visible,overflow}=fsLayoutItems(allParts,f.itemTimes,sm,em,rangeTopPx,rangeHPx,TL_PPM);
      visible.forEach(({idx,top})=>{
        const item=allParts[idx];
        const done=!!ck.subs[idx];
        const itemTime=f.itemTimes&&f.itemTimes[idx];
        itemsHtml.push(`<div class="fs-tl-item-row" style="top:${top}px" onclick="event.stopPropagation()">
  <div class="fs-tl-sub-chk-round ${done?'done':''}" onclick="event.stopPropagation();toggleFsSub('${blockId2}',${idx})"></div>
  <span class="fs-tl-item-row-name" style="${done?'text-decoration:line-through;color:var(--t3)':'color:var(--text)'}">${esc(item)}</span>
  ${itemTime?`<span class="fs-tl-item-row-time">${esc(itemTime)}</span>`:''}
</div>`);
      });
      if(overflow.length){
        const lastVisible=visible.length?visible[visible.length-1]:null;
        const chipTop=lastVisible?lastVisible.top+30:rangeTopPx+4;
        itemsHtml.push(`<div class="fs-tl-overflow-chip" style="top:${Math.min(chipTop,rangeTopPx+rangeHPx-22)}px" onclick="event.stopPropagation();openFsOverflowPopover(event,'${blockId2}')">+${overflow.length}項目</div>`);
      }
    }
  });
  // 5) 時刻付きだが固定ブロックに属さない単発タスク（fsBlockIdなし・startTimeのみ）を小チップ表示
  const chipTasks=(S.tasks||[]).filter(t=>!t.deleted&&!t.fsBlockId&&t.dueDate===td&&t.startTime);
  const chipsHtml=chipTasks.map(t=>{
    const tm=tMin(t.startTime);
    const top=(tm-TL_START_M)*TL_PPM;
    return`<div class="fs-tl-chip" id="ti-${t.id}" draggable="true"
  ondragstart="taskDragStart(event,'${t.id}')" ondragend="taskDragEnd(event)"
  style="top:${top}px">
  <div class="chk ${t.done?'done':''}" style="width:14px;height:14px;flex-shrink:0" onclick="toggleDone('${t.id}')"></div>
  <span style="font-size:10px;color:var(--t3);flex-shrink:0;font-variant-numeric:tabular-nums">${esc(t.startTime)}</span>
  <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${t.done?'text-decoration:line-through;color:var(--t3)':''}">${esc(t.title)}</span>
  <button class="tact" style="padding:1px 4px;font-size:10px;flex-shrink:0" onclick="event.stopPropagation();openTaskModal('${t.id}')">✏️</button>
</div>`;
  }).join('');
  // 6) 時間軸目盛り
  const ticks=[];
  for(let m=TL_START_M;m<=TL_END_M;m+=30){
    const top=(m-TL_START_M)*TL_PPM;
    const isHour=m%60===0;
    const h=Math.floor(m/60)%24,mi=m%60;
    ticks.push(`<div class="fs-tl-tick${isHour?' fs-tl-tick-hour':''}" style="top:${top}px"></div>
      <div class="fs-tl-label${isHour?' fs-tl-label-hour':''}" style="top:${top}px">${mi===0?`${h}:00`:`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`}</div>`);
  }
  const nowTop=(isTargetToday&&nowM>=TL_START_M&&nowM<=TL_END_M)?(nowM-TL_START_M)*TL_PPM:null;
  const nowLabel=isTargetToday?`${String(Math.floor(nowM/60)).padStart(2,'0')}:${String(nowM%60).padStart(2,'0')}`:'';
  // 空き時間クリックでのタスク追加は常時有効（ダッシュボード/編集画面どちらでも動く。ドラッグ割当のdroppable設定とは独立）
  const colClickAttr=`onclick="fsTlColClick(event,'${td}')"`;
  return`<div class="fs-tl-wrap" style="height:${totalH}px">
    <div class="fs-tl-axis" style="height:${totalH}px">${ticks.join('')}${nowTop!==null?`<div class="fs-tl-now-gutter" style="top:${nowTop}px"></div><span class="fs-tl-now-chip" style="top:${nowTop-9}px">${nowLabel}</span>`:''}</div>
    <div class="fs-tl-col" style="height:${totalH}px" ${colClickAttr}>
      ${railHtml}
      ${bandsHtml}
      ${nowTop!==null?`<div class="fs-tl-now" style="top:${nowTop}px"></div>`:''}
      ${headersHtml.join('')}
      ${itemsHtml.join('')}
      ${chipsHtml}
    </div>
  </div>`;
}
// タイムライン空き部分クリック → クリックY座標から時刻算出(30分スナップ)してタスク追加モーダルを開く
function fsTlColClick(e,date){
  // 帯/ヘッダー/項目/チップ/チェック/ボタン等の子要素クリックは個別ハンドラに任せ、ここでは無視
  if(e.target.closest('.fs-tl-band,.fs-tl-hdr,.fs-tl-item-row,.fs-tl-chip,.fs-tl-overflow-chip'))return;
  const col=e.currentTarget;
  const rect=col.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const TL_PPM=1.2;
  let totalMin=Math.round(y/TL_PPM);
  totalMin=Math.max(0,Math.min(24*60-1,totalMin));
  const snapped=Math.round(totalMin/30)*30;
  const h=Math.floor(snapped/60)%24,mi=snapped%60;
  const timeStr=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
  openTaskModal(null,date,timeStr);
}

// ===SCHEDULE D&D===
// IDフォーマット: タスク → "taskId" / サブタスク → "taskId::N" / 追加時間帯 → "taskId::tsN"
let _schedDragId=null,_schedDragOffset=0;
function _parseSchedId(id){
  if(!id)return{isSub:false,isSlot:false,taskId:id,subIdx:-1,slotIdx:-1};
  const sep=id.indexOf('::');
  if(sep<0)return{isSub:false,isSlot:false,taskId:id,subIdx:-1,slotIdx:-1};
  const suffix=id.slice(sep+2);
  if(suffix.startsWith('ts')){
    return{isSub:false,isSlot:true,taskId:id.slice(0,sep),subIdx:-1,slotIdx:parseInt(suffix.slice(2))};
  }
  return{isSub:true,isSlot:false,taskId:id.slice(0,sep),subIdx:parseInt(suffix),slotIdx:-1};
}
function schedDragStart(e,id){
  _schedDragId=id;
  e.dataTransfer.effectAllowed='move';
  const rect=e.currentTarget.getBoundingClientRect();
  _schedDragOffset=Math.round((e.clientY-rect.top)/PPM/15)*15;
}
function schedDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function schedDrop(e,date){
  e.preventDefault();
  if(!_schedDragId)return;
  const wrap=document.getElementById('sched-main-wrap');
  if(!wrap)return;
  const main=wrap.querySelector('.sched-main');
  const rect=main.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const mins=Math.round(y/PPM/15)*15-_schedDragOffset+SS;
  const {isSub,isSlot,taskId,subIdx,slotIdx}=_parseSchedId(_schedDragId);
  const t=S.tasks.find(t=>t.id===taskId);
  if(!t)return;
  if(isSub){
    const s=(t.subtasks||[])[subIdx];
    if(!s)return;
    const dur=s.endTime?tMin(s.endTime)-tMin(s.startTime):30;
    s.startTime=mToT(Math.max(SS,Math.min(SE-15,mins)));
    s.endTime=mToT(Math.max(SS+15,Math.min(SE,mins+dur)));
    t.dueDate=date;
    save();render();_schedDragId=null;_schedDragOffset=0;
    toast('サブタスクをスケジュールに配置しました');
  }else if(isSlot){
    const sl=(t.timeSlots||[])[slotIdx-1];
    if(!sl)return;
    const dur=sl.e?tMin(sl.e)-tMin(sl.s):60;
    sl.s=mToT(Math.max(SS,Math.min(SE-15,mins)));
    sl.e=mToT(Math.max(SS+15,Math.min(SE,mins+dur)));
    t.dueDate=date;
    save();render();_schedDragId=null;_schedDragOffset=0;
    toast(`時間帯 ${slotIdx+1}/${(t.timeSlots.length+1)} を更新しました`);
  }else{
    const dur=t.endTime?tMin(t.endTime)-tMin(t.startTime):60;
    t.startTime=mToT(Math.max(SS,Math.min(SE-15,mins)));
    t.endTime=mToT(Math.max(SS+15,Math.min(SE,mins+dur)));
    t.dueDate=date;
    save();render();_schedDragId=null;_schedDragOffset=0;
    toast('スケジュールを更新しました');
  }
}

let _taskDragId=null,_taskDragSnap=null;
// 安全網: ドラッグがどんな終わり方をしても（枠外ドロップ・タッチ中断等）
// 残留状態を必ずリセットし、次のドラッグが誤動作しないようにする。
document.addEventListener('dragend',()=>{
  setTimeout(()=>{
    _taskDragId=null;_taskDragSnap=null;_wdayDragId=null;_schedDragId=null;_schedDragOffset=0;
    document.querySelectorAll('.dragging,.drag-over,.fs-drag-over,.fs-dz-over').forEach(el=>el.classList.remove('dragging','drag-over','fs-drag-over','fs-dz-over'));
  },0);
});
function taskDragStart(e,id){
  _taskDragId=id;
  const t=S.tasks.find(t=>t.id===id);
  _taskDragSnap=t?{fsBlockId:t.fsBlockId,fsSlot:t.fsSlot,dueDate:t.dueDate,startTime:t.startTime}:null;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
}
function taskDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.task-item.drag-over,.fs-drop-zone.fs-drag-over').forEach(el=>el.classList.remove('drag-over','fs-drag-over'));
  // dropハンドラが正常処理した場合は_taskDragId=nullになっているので何もしない
  // ドロップが未処理（キャンセル等）の場合は元の状態に戻す
  if(_taskDragId&&_taskDragSnap){
    const t=S.tasks.find(t=>t.id===_taskDragId);
    if(t){
      t.fsBlockId=_taskDragSnap.fsBlockId;
      t.fsSlot=_taskDragSnap.fsSlot;
      t.dueDate=_taskDragSnap.dueDate;

function fsBlockDrop(e,startTime,blockId,i,date){
  e.preventDefault();e.stopPropagation();
  document.getElementById('fs-block-'+i)?.classList.remove('fs-drag-over');
  const id=_taskDragId||_wdayDragId;
  if(!id)return;
  const t=S.tasks.find(t=>t.id===id);
  if(!t){_taskDragId=null;_wdayDragId=null;return;}
  // 既に同じブロックに居る場合のみ何もしない（並び替えはドロップゾーンで）
  if(t.fsBlockId===blockId){_taskDragId=null;_wdayDragId=null;return;}
  const moving=!!t.fsBlockId; // 別ブロックからの移動か、未割り当てからの新規割り当てか
  if(startTime&&startTime!=='-1'&&startTime!=='')t.startTime=startTime;
  t.fsBlockId=blockId;
  t.fsSlot=undefined; // スロット位置はリセット
  // dueDateが未設定の場合のみ日付をセット（既存のdueDateは保持）
  if(!t.dueDate)t.dueDate=date||today();
  save();render();toast(moving?`🔀 ${esc(t.title)} を移動しました`:`📌 ${esc(t.title)} をスケジュールに割り当てました`);
  _taskDragId=null;_wdayDragId=null;
}

// ===固定スケジュール チェック===
function playCheckSound(done=true){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(done){
      osc.type='sine';
      osc.frequency.setValueAtTime(784,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1046,ctx.currentTime+0.1);
      gain.gain.setValueAtTime(0.22,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.28);
      osc.start();osc.stop(ctx.currentTime+0.28);
    }else{
      osc.type='sine';
      osc.frequency.setValueAtTime(523,ctx.currentTime);
      gain.gain.setValueAtTime(0.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);
      osc.start();osc.stop(ctx.currentTime+0.18);
    }
  }catch(ex){}
}
function getFsCk(blockId){
  const td=today();
  if(!S.fsChecked)S.fsChecked={};
  if(!S.fsChecked[td])S.fsChecked[td]={};
  if(!S.fsChecked[td][blockId])S.fsChecked[td][blockId]={main:false,subs:{}};
  return S.fsChecked[td][blockId];
}
function toggleFsMain(blockId){
  const ck=getFsCk(blockId);
  ck.main=!ck.main;
  playCheckSound(ck.main);
  save();render();
}
function toggleFsSub(blockId,subIdx){
  const ck=getFsCk(blockId);
  ck.subs[subIdx]=!ck.subs[subIdx];

  if(isFsDetailModalOpen(blockId))renderFsDetailModal(blockId);

// ヘッダータップで開く詳細パネル（会長承認済み新設計）: 全項目チェックリスト+編集+削除+追加をここで完結させる
function fsFindBlock(blockId){return(S.fs||[]).find((f,i)=>(f.id||('b'+i))===blockId);}
function fsBlockIndex(blockId){return(S.fs||[]).findIndex((f,i)=>(f.id||('b'+i))===blockId);}

function rFsDetailModalBody(blockId){
  const f=fsFindBlock(blockId);
  if(!f)return`<div class="mhdr"><div class="mtitle">見つかりません</div><button class="mclose" onclick="closeModal()">✕</button></div>`;

  const descParts=f.d&&f.d.includes('→')?f.d.split('→').map(s=>s.trim()).filter(Boolean):[];
  const allParts=[...titleParts,...descParts];
  const hasParts=allParts.length>=2;
  const ck=getFsCk(blockId);
  const doneCount=hasParts?allParts.filter((_,idx)=>!!ck.subs[idx]).length:0;

</div>`;
  }).join(''):`<div style="font-size:12px;color:var(--t2);padding:8px 4px">この予定には項目（→区切り）がありません。「項目を追加」で作成できます。</div>`;
  return`<div class="mhdr"><div class="mtitle" style="color:${f.c}">${esc(f.t.split('→')[0].trim())}</div><button class="mclose" onclick="closeModal()">✕</button></div>
<div style="font-size:12px;color:var(--t2);margin-bottom:10px">${esc(f.s)}–${esc(f.e==='24:00'?'24:00':f.e)} ・ ${fsDurationLabel(tMin(f.s),tMin(f.e==='24:00'||f.e==='-1'?'24:00':f.e))}${hasParts?` ・ ${doneCount}/${allParts.length}完了`:''}</div>
<div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);margin-bottom:6px">
  <div class="fs-tl-hdr-chk ${mainDone?'done':''}" style="--hdr-c:${f.c}" onclick="toggleFsMain('${blockId}');renderFsDetailModal('${blockId}')">${mainDone?'✓':''}</div>
  <span style="font-size:13px;font-weight:700;${mainDone?'text-decoration:line-through;color:var(--t3)':''}">この予定全体を完了にする</span>
</div>
<div id="fs-detail-items">${itemRows}</div>
<div class="mfooter" style="flex-wrap:wrap;gap:8px">
  <button class="btn btn-g btn-sm" onclick="fsDetailAddItem('${blockId}')">＋ 項目を追加</button>
  <button class="btn btn-p btn-sm" onclick="closeModal();render()">閉じる</button>
</div>`;
}
function fsDetailUpdateItemText(blockId,idx,val){
  const f=fsFindBlock(blockId);if(!f)return;
  const titleParts=f.t.includes('→')?f.t.split('→').map(s=>s.trim()):[f.t];
  const descParts=f.d&&f.d.includes('→')?f.d.split('→').map(s=>s.trim()):(f.d?[f.d]:[]);
  if(idx<titleParts.length){titleParts[idx]=val;f.t=titleParts.join('→');}
  else{const di=idx-titleParts.length;descParts[di]=val;f.d=descParts.join('→');}
  save();render();
  if(isFsDetailModalOpen(blockId))renderFsDetailModal(blockId);
}
function fsDetailUpdateItemTime(blockId,idx,val){
  const f=fsFindBlock(blockId);if(!f)return;
  if(!f.itemTimes)f.itemTimes={};
  if(val)f.itemTimes[idx]=val;else delete f.itemTimes[idx];
  save();render();
}
function fsDetailDeleteItem(blockId,idx){
  const f=fsFindBlock(blockId);if(!f)return;
  const titleParts=f.t.includes('→')?f.t.split('→').map(s=>s.trim()):[f.t];
  const descParts=f.d&&f.d.includes('→')?f.d.split('→').map(s=>s.trim()):(f.d?[f.d]:[]);
  const n=titleParts.length;
  if(idx<n)titleParts.splice(idx,1);else descParts.splice(idx-n,1);
  f.t=titleParts.join('→');f.d=descParts.join('→');
  // itemTimesのインデックスを詰め直す
  if(f.itemTimes){
    const newTimes={};
    Object.keys(f.itemTimes).map(Number).sort((a,b)=>a-b).forEach(k=>{
      if(k<idx)newTimes[k]=f.itemTimes[k];
      else if(k>idx)newTimes[k-1]=f.itemTimes[k];
    });
    f.itemTimes=newTimes;
  }
  // チェック状態のインデックスも詰め直す
  const ck=getFsCk(blockId);
  const newSubs={};
  Object.keys(ck.subs).map(Number).sort((a,b)=>a-b).forEach(k=>{
    if(k<idx)newSubs[k]=ck.subs[k];
    else if(k>idx)newSubs[k-1]=ck.subs[k];
  });
  ck.subs=newSubs;
  save();render();
  renderFsDetailModal(blockId);
}
function fsDetailAddItem(blockId){
  const f=fsFindBlock(blockId);if(!f)return;
  const name=prompt('項目名を入力してください');
  if(!name||!name.trim())return;
  const titleParts=f.t.includes('→')?f.t.split('→').map(s=>s.trim()):[f.t];
  titleParts.push(name.trim());
  f.t=titleParts.join('→');
  save();render();
  renderFsDetailModal(blockId);
}

function taskListDrop(e){

function sortJobs(jobs){
  switch(JOB_SORT){
    case 'deadline': return [...jobs].sort((a,b)=>(a.deliveryDate||'9999')>(b.deliveryDate||'9999')?1:-1);
    case 'f1date': return [...jobs].sort((a,b)=>(a.editorDraftDate||'9999')>(b.editorDraftDate||'9999')?1:-1);
    case 'clientdraft': return [...jobs].sort((a,b)=>(a.clientDraftDate||'9999')>(b.clientDraftDate||'9999')?1:-1);
    case 'f1worker': return [...jobs].sort((a,b)=>{const wa=getJobWorkerNames(a);const wb=getJobWorkerNames(b);return wa>wb?1:-1;});
    case 'status': return [...jobs].sort((a,b)=>a.status>b.status?1:-1);
    case 'title': return [...jobs].sort((a,b)=>a.title>b.title?1:-1);
    default: return jobs;
  }
}

function jobTotalIn(j){
  const subs=j.subtasks||[];
  if(subs.some(s=>s.unitPrice>0))return subs.reduce((s,sub)=>s+(sub.unitPrice||0),0);
  return j.unitPrice||j.profit||0;
}
const SELF_WID='__self';
function getJobWorkerIds(j){return j.workerIds||(j.workerId?[j.workerId]:[]);}
function getJobWorkerNames(j){
  const ids=getJobWorkerIds(j);
  if(!ids.length)return'';
  return ids.map(id=>id===SELF_WID?'自分':(S.workers.find(w=>w.id===id)?.name||'')).filter(Boolean).join(', ');
}
function jobTotalOut(j){
  const subs=j.subtasks||[];
  if(subs.some(s=>s.unitPrice>0||s.workerPay>0))
    return subs.filter(s=>s.workerId!==SELF_WID).reduce((sum,s)=>sum+(s.workerPay||0),0);
  const wids=getJobWorkerIds(j);
  if(!wids.length||wids.every(id=>id===SELF_WID))return 0;
  return j.workerPay||0;
}
function jobProfit(j){return jobTotalIn(j)-jobTotalOut(j);}
// 利益ページ用：サブタスクを含まずメインタスクの金額のみ
function jobMainIn(j){return j.unitPrice||j.profit||0;}
function jobMainOut(j){
  const wids=getJobWorkerIds(j);
  const mainPay=(wids.length&&!wids.every(id=>id===SELF_WID))?(j.workerPay||0):0;
  const subPay=(j.subtasks||[]).filter(s=>s.workerId!==SELF_WID).reduce((sum,s)=>sum+(s.workerPay||0),0);
  return mainPay+subPay;
}
function jobMainProfit(j){return jobMainIn(j)-jobMainOut(j);}
