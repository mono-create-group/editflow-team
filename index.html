// New page modal
function openNewPageModal(){
  openModal(`<div class="mhdr"><div class="mtitle">新しいページを作成</div><button class="mclose" onclick="closeModal()">✕</button></div>
<div class="fg"><div class="fl">ページタイトル *</div><input id="cp-ttl" placeholder="例：アイデアボード・進捗メモ"></div>
<div class="fg"><div class="fl">アイコン</div>
  <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px" id="cp-icon-row">
    ${CP_ICONS.map((ic,i)=>`<span class="icon-pick${i===0?' sel':''}" onclick="pickIcon('${ic}',this)">${ic}</span>`).join('')}
  </div>
  <input type="hidden" id="cp-icon-val" value="📄">
</div>
<div class="mfooter"><button class="btn btn-g" onclick="closeModal()">キャンセル</button><button class="btn btn-p" onclick="createCustomPage()">作成</button></div>`);
  document.getElementById('cp-ttl')?.focus();
}
function pickIcon(ic,el){
  document.querySelectorAll('.icon-pick').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');document.getElementById('cp-icon-val').value=ic;
}
function createCustomPage(){
  const title=document.getElementById('cp-ttl')?.value.trim();
  if(!title){toast('タイトルを入力してください','err');return;}
  const icon=document.getElementById('cp-icon-val')?.value||'📄';
  const page={id:uid(),title,icon,blocks:[]};
  if(!S.customPages)S.customPages=[];
  S.customPages.push(page);
  getNavCfg();save();closeModal();
  V=`cp_${page.id}`;render();
  setTimeout(()=>editCustomPage(page.id),80);
}
function delCustomPage(id){
  if(!confirm('このページを削除しますか？'))return;
  S.customPages=(S.customPages||[]).filter(p=>p.id!==id);
  if(S.navConfig)S.navConfig=S.navConfig.filter(c=>c.id!==`cp_${id}`);
  if(V===`cp_${id}`)V='customize';
  save();render();toast('ページを削除しました');
}

function rBlockEd(b,i,pid,total){

  }else if(b.type==='note'){
    inner=`<textarea rows="3" style="border-color:var(--amber)" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;

    inner=`<textarea rows="3" style="border-left:4px solid var(--purple);border-radius:0 var(--rs) var(--rs) 0;font-style:italic" oninput="updBF('${pid}',${i},'content',this.value)">${esc(b.content||'')}</textarea>`;

// ブロックエディタは個人ページ(customPages)とチーム共有ページ(teamPages)の両方を扱う。
// idはuidで一意なので、両配列を横断して該当ページを引く。編集操作はどちらの配列でもそのまま動く。
function _findPageById(pid){
  return (S.customPages||[]).find(p=>p.id===pid)||(S.teamPages||[]).find(p=>p.id===pid)||null;
}
// Block field updaters (live-save)
function updBF(pid,idx,field,val){const page=_findPageById(pid);if(page?.blocks[idx])page.blocks[idx][field]=val;save();}
function addBlock(pid,type,afterIdx){
  const page=_findPageById(pid);if(!page)return;
  // Special defaults for types not covered by makeBlockDefaults
  let nb;
  if(type==='heading')nb={id:uid(),type:'heading',text:'見出し'};
  else if(type==='counter')nb={id:uid(),type:'counter',label:'カウンター',value:0,step:1};
  else nb=makeBlockDefaults(type,uid());
  if(afterIdx!=null&&afterIdx>=0&&afterIdx<page.blocks.length){
    page.blocks.splice(afterIdx+1,0,nb);
  }else{
    page.blocks.push(nb);
  }
  save();render();
  // focus newly added block
  setTimeout(()=>{
    const newIdx=afterIdx!=null?afterIdx+1:page.blocks.length-1;
    const el=document.querySelector(`[data-block-idx="${newIdx}"] textarea,[data-block-idx="${newIdx}"] input`);
    if(el){el.focus();if(el.tagName==='TEXTAREA'){el.selectionStart=el.selectionEnd=0;}}
  },30);
}
function deleteBlock(pid,idx){const page=_findPageById(pid);if(!page)return;page.blocks.splice(idx,1);save();render();}
function moveBlock(pid,idx,dir){
  const page=_findPageById(pid);if(!page)return;
  const ni=idx+dir;if(ni<0||ni>=page.blocks.length)return;
  [page.blocks[idx],page.blocks[ni]]=[page.blocks[ni],page.blocks[idx]];save();render();
}
function addCI(pid,bi){const p=_findPageById(pid);if(!p)return;if(!p.blocks[bi].items)p.blocks[bi].items=[];p.blocks[bi].items.push({id:uid(),text:'',done:false});save();render();}
function delCI(pid,bi,ii){const p=_findPageById(pid);if(!p)return;p.blocks[bi].items.splice(ii,1);save();render();}
function updCI(pid,bi,ii,val){const p=_findPageById(pid);if(p?.blocks[bi]?.items[ii])p.blocks[bi].items[ii].text=val;save();}
function addLI(pid,bi){const p=_findPageById(pid);if(!p)return;if(!p.blocks[bi].items)p.blocks[bi].items=[];p.blocks[bi].items.push({id:uid(),label:'',url:''});save();render();}
function delLI(pid,bi,ii){const p=_findPageById(pid);if(!p)return;p.blocks[bi].items.splice(ii,1);save();render();}
function updLI(pid,bi,ii,field,val){const p=_findPageById(pid);if(p?.blocks[bi]?.items[ii])p.blocks[bi].items[ii][field]=val;save();}

  <button class="btn btn-p btn-sm" style="margin-top:12px" onclick="CP_EDIT_MODE=true;render()">＋ ブロックを追加</button>

function rBlockInner(b,pid,idx){
  const onInput=(field,extra='')=>`updBF('${pid}',${idx},'${field}',this.value);${extra}`;
  const autoH=`this.style.height='auto';this.style.height=this.scrollHeight+'px'`;
  const kbAttr=`data-pid="${pid}" data-idx="${idx}"`;
  const textKb=`onkeydown="blockKeyDown(event,this)"`;

// ─── BLOCK DRAG & DROP ───
let _dragBlockIdx=null,_dragBlockPid=null;
function blockDragStart(e,idx,pid){
  _dragBlockIdx=idx;_dragBlockPid=pid;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging-block');
}
function blockDragEnd(e){
  _dragBlockIdx=null;_dragBlockPid=null;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>{
    el.classList.remove('dragging-block','drag-over-block');
  });
}
function blockDragOver(e,idx,pid){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(_dragBlockPid!==pid)return;
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockIdx!==idx)e.currentTarget.classList.add('drag-over-block');
}
function blockDrop(e,toIdx,pid){
  e.preventDefault();
  document.querySelectorAll('.notion-block-wrap').forEach(el=>el.classList.remove('drag-over-block'));
  if(_dragBlockPid!==pid||_dragBlockIdx===null||_dragBlockIdx===toIdx)return;
  const page=_findPageById(pid);if(!page)return;
  const from=_dragBlockIdx,to=toIdx;
  const [moved]=page.blocks.splice(from,1);
  page.blocks.splice(to,0,moved);
  _dragBlockIdx=null;_dragBlockPid=null;
  save();render();
}

// ─── KEYBOARD: Enter / Backspace ───
function blockKeyDown(e,el){
  // If slash popup is active, let slashKeyDown handle keys
  if(_slashState&&_slashState.el===el)return;
  const pid=el.dataset.pid||el.closest('[data-pid]')?.dataset.pid;
  const idx=+(el.dataset.idx||el.closest('[data-block-idx]')?.dataset.blockIdx);
  if(pid==null||isNaN(idx))return;
  const page=_findPageById(pid);if(!page)return;
  const b=page.blocks[idx];if(!b)return;
  const isHeading=['h1','h2','h3','heading'].includes(b.type);
  const isText=['text','note','quote'].includes(b.type);

  // Enter key
  if(e.key==='Enter'&&!e.shiftKey){
    // Heading → add text block below
    if(isHeading){
      e.preventDefault();
      addBlock(pid,'text',idx);
      return;
    }
    // Text/note/quote: Shift+Enter = newline (default), Enter = new same-type block
    if(isText){
      e.preventDefault();
      const content=el.value||'';
      const isEmpty=!content.trim();
      addBlock(pid,isEmpty?'text':b.type,idx);
      return;
    }
  }

  // Backspace on empty text-like block → delete block and focus prev
  if(e.key==='Backspace'){
    const val=el.value||'';
    if(!val){
      e.preventDefault();
      if(page.blocks.length<=1)return;
      page.blocks.splice(idx,1);
      save();render();
      // focus previous block
      setTimeout(()=>{
        const prevIdx=Math.max(0,idx-1);
        const prevEl=document.querySelector(`[data-block-idx="${prevIdx}"] textarea,[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();if(prevEl.tagName==='TEXTAREA'){const l=prevEl.value.length;prevEl.selectionStart=prevEl.selectionEnd=l;}}
      },30);
    }
  }
}

// ─── LIST ITEM KEYBOARD ───
function listItemKeyDown(e,el,pid,blockIdx,itemIdx){
  const page=_findPageById(pid);if(!page)return;
  const b=page.blocks[blockIdx];if(!b)return;
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    b.items=b.items||[''];
    b.items.splice(itemIdx+1,0,'');
    save();render();
    setTimeout(()=>{
      const inputs=document.querySelectorAll(`[data-block-idx="${blockIdx}"][data-pid="${pid}"] ~ div input, .notion-block-wrap[data-block-idx="${blockIdx}"] input`);
      // find the new input at itemIdx+1
      const allInputs=document.querySelectorAll('.notion-block-wrap input');
      // simpler: re-query the block wrapper
      const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
      if(wrap){const ins=wrap.querySelectorAll('input');if(ins[itemIdx+1])ins[itemIdx+1].focus();}
    },30);
    return;
  }
  if(e.key==='Backspace'&&!el.value){
    e.preventDefault();
    b.items=b.items||[''];
    if(b.items.length<=1){
      // Remove the whole block if only one empty item
      page.blocks.splice(blockIdx,1);
      save();render();
      setTimeout(()=>{
        const prevIdx=Math.max(0,blockIdx-1);
        const prevEl=document.querySelector(`.notion-block-wrap[data-block-idx="${prevIdx}"] textarea,.notion-block-wrap[data-block-idx="${prevIdx}"] input`);
        if(prevEl){prevEl.focus();}
      },30);
    }else{
      b.items.splice(itemIdx,1);
      save();render();
      setTimeout(()=>{
        const wrap=document.querySelector(`.notion-block-wrap[data-block-idx="${blockIdx}"]`);
        if(wrap){const ins=wrap.querySelectorAll('input');const target=ins[Math.max(0,itemIdx-1)];if(target){target.focus();target.selectionStart=target.selectionEnd=target.value.length;}}
      },30);
    }
    return;
  }
}

// ─── SLASH COMMAND ───
let _slashState=null; // {pid,idx,el}
let _slashSelIdx=0;
let _slashFiltered=[];

function slashKeyDown(e,el,pid,idx){
  // Detect '/' at start or line start
  if(e.key==='/' && !_slashState){
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    if(before===''||before.endsWith('\n')){
      _slashState={pid,idx,el,pos};
      _slashSelIdx=0;
      _slashFiltered=[...SLASH_COMMANDS];
      showSlashPopup(el);
      return;
    }
  }
  if(!_slashState||_slashState.el!==el)return;

  if(e.key==='Escape'){e.preventDefault();hideSlashPopup();return;}
  if(e.key==='ArrowDown'){e.preventDefault();_slashSelIdx=(_slashSelIdx+1)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='ArrowUp'){e.preventDefault();_slashSelIdx=(_slashSelIdx-1+_slashFiltered.length)%_slashFiltered.length;renderSlashSel();return;}
  if(e.key==='Enter'){
    e.preventDefault();
    const cmd=_slashFiltered[_slashSelIdx];
    if(cmd){confirmSlashCmd(cmd);}
    return;
  }
  if(e.key==='Backspace'){
    // If query becomes empty (just the slash deleted), close
    setTimeout(()=>{
      const val=el.value||'';
      const pos=el.selectionStart;
      const before=val.slice(0,pos);
      const slashPos=before.lastIndexOf('/');
      if(slashPos<0){hideSlashPopup();return;}
      updateSlashFilter(before.slice(slashPos+1));
    },0);
    return;
  }
  // Filter on normal key
  setTimeout(()=>{
    const val=el.value||'';
    const pos=el.selectionStart;
    const before=val.slice(0,pos);
    const slashPos=before.lastIndexOf('/');
    if(slashPos<0){hideSlashPopup();return;}
    updateSlashFilter(before.slice(slashPos+1));
  },0);
}

function updateSlashFilter(query){
  const q=query.toLowerCase();
  _slashFiltered=SLASH_COMMANDS.filter(c=>
    c.label.toLowerCase().includes(q)||c.hint.toLowerCase().includes(q)||c.t.includes(q)
  );
  if(!_slashFiltered.length){hideSlashPopup();return;}
  _slashSelIdx=Math.min(_slashSelIdx,_slashFiltered.length-1);
  renderSlashItems();
}

function showSlashPopup(el){
  let popup=document.getElementById('slash-popup');
  if(!popup){popup=document.createElement('div');popup.id='slash-popup';document.body.appendChild(popup);}
  const rect=el.getBoundingClientRect();
  popup.style.top=`${rect.bottom+4}px`;
  popup.style.left=`${rect.left}px`;
  popup.style.display='block';
  renderSlashItems();
}

function hideSlashPopup(){
  _slashState=null;_slashSelIdx=0;_slashFiltered=[];
  const p=document.getElementById('slash-popup');if(p)p.style.display='none';
}

function renderSlashItems(){
  const popup=document.getElementById('slash-popup');if(!popup)return;
  popup.innerHTML=_slashFiltered.map((c,i)=>`
    <div class="slash-item${i===_slashSelIdx?' sel':''}" onmousedown="slashPickIdx(${i})">
      <span class="slash-item-icon">${c.icon}</span>
      <span class="slash-item-label">${c.label}</span>
      <span class="slash-item-hint">${c.hint}</span>
    </div>`).join('');
}

function renderSlashSel(){
  document.querySelectorAll('.slash-item').forEach((el,i)=>el.classList.toggle('sel',i===_slashSelIdx));
}

function slashPickIdx(i){
  _slashSelIdx=i;
  const cmd=_slashFiltered[i];
  if(cmd)confirmSlashCmd(cmd);
}

function makeBlockDefaults(type,id){
  const o={type,id:id||uid()};
  if(['h1','h2','h3','heading'].includes(type))o.text='';
  else if(['bullet','numbered'].includes(type))o.items=[''];
  else if(type==='divider'){}
  else if(type==='toggle'){o.title='';o.content='';o.open=false;}
  else if(type==='checklist')o.items=[];
  else if(type==='links')o.items=[];
  else o.content='';
  return o;
}

function confirmSlashCmd(cmd){
  if(!_slashState)return;
  const {pid,idx,el}=_slashState;
  hideSlashPopup();
  const page=_findPageById(pid);if(!page)return;
  // Remove slash + query from textarea value
  const pos=el.selectionStart;
  const val=el.value||'';
  const before=val.slice(0,pos);
  const slashPos=before.lastIndexOf('/');
  const remaining=(val.slice(0,slashPos)+val.slice(pos)).trim();
  // If current block is effectively empty after removing slash query → convert it
  if(!remaining&&page.blocks[idx]){
    page.blocks[idx]=makeBlockDefaults(cmd.t,page.blocks[idx].id);
    save();render();
  }else{
    // Otherwise update block content to remove the slash query, then add new block below
    const b=page.blocks[idx];
    if(b){
      const cleanVal=val.slice(0,slashPos)+val.slice(pos);
      if(b.content!==undefined)b.content=cleanVal;else if(b.text!==undefined)b.text=cleanVal;
    }
    save();
    addBlock(pid,cmd.t,idx);
  }
}

// Close slash popup on outside click
document.addEventListener('mousedown',e=>{
  if(_slashState&&!e.target.closest('#slash-popup')&&e.target!==_slashState?.el){
    hideSlashPopup();
  }
});

function checkClientDraftTasks(){
  // 自分が担当の案件でクライアント初稿が明日のものを自動タスク化
  const changed=[];
  if(!S.tasks)S.tasks=[];
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&getJobWorkerIds(j).includes(SELF_WID)&&j.clientDraftDate)
  .forEach(j=>{
    if(daysUntil(j.clientDraftDate)!==1)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='clientDraft'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`📋 クライアント初稿提出: ${j.title}`,dueDate:j.clientDraftDate,
        sourceJobId:j.id,taskType:'clientDraft',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title);
    }
  });
  // サムネイル納品が2日前のものを自動タスク化
  (S.jobs||[]).filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'
    &&getJobWorkerIds(j).includes(SELF_WID)&&j.thumbnailDate)
  .forEach(j=>{
    if(daysUntil(j.thumbnailDate)!==2)return;
    const exists=S.tasks.find(t=>t.sourceJobId===j.id&&t.taskType==='thumbnail'&&!t.deleted);
    if(!exists){
      S.tasks.push({id:uid(),title:`🖼 サムネイル納品: ${j.title}`,dueDate:j.thumbnailDate,
        sourceJobId:j.id,taskType:'thumbnail',done:false,createdAt:new Date().toISOString()});
      changed.push(j.title+'（サムネイル）');
    }
  });
  if(changed.length){save();toast(`📋 ${changed.length}件の案件をタスクに自動追加しました`);}
}

function checkDeadlineReminders(){
  const td=today();
  const d=new Date();d.setDate(d.getDate()+1);
  const tm=d.toLocalYmd();
  const items=[];
  S.tasks.filter(t=>!t.deleted&&!t.done&&(t.dueDate===td||t.dueDate===tm)).forEach(t=>items.push({title:t.title,date:t.dueDate,type:'タスク'}));
  S.jobs.filter(j=>!j.deleted&&j.status!=='完了'&&j.status!=='キャンセル'&&(j.deliveryDate===td||j.deliveryDate===tm)).forEach(j=>items.push({title:j.title,date:j.deliveryDate,type:'案件'}));
  if(!items.length)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  items.forEach(it=>{
    new Notification(`📅 mono.create 納期リマインダー`,{body:`${it.type}「${it.title}」の期限: ${it.date===td?'今日':'明日'}(${it.date})`});
  });
}
function initReminders(){
  if(typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')checkDeadlineReminders();});
  }else{
    checkDeadlineReminders();
  }
}

// 飲食業種(シフトさん営業の対象。HP等の営業リストからは除外)
// 2026-07-13 会長指示「食べ物関連は全てシフトさんへ」: 飲食店だけでなく食品物販(パン/洋菓子/和菓子/鮮魚/精肉/青果/酒屋)も含める
const SL_FOOD_GENRES=new Set(['飲食','ラーメン','居酒屋','焼肉','寿司','カフェ','スナック','バー','焼き鳥','食堂','そば','うどん','洋食','中華','イタリアン','ジンギスカン','海鮮','弁当・惣菜','喫茶','定食','ダイニング','ビストロ','バル','焼き鳥・串','鉄板焼き','パン','洋菓子','和菓子','鮮魚','精肉','青果','酒屋']);
// この店がこの事業タブのプールに属するか。シフトさん=飲食のみ／他事業=非飲食のみ
function slInPool(l,bizKey){
  const bk=bizKey||_slBiz;
  const isFood=SL_FOOD_GENRES.has(l.genre||'');
  if(bk==='shift')return isFood;
  // HP事業(2026-07-15 会長厳命): 自社HPなしが確定した「本命」だけを営業対象にする。
  // HP有無が"不明"・空・未確認、または"あり"の店は営業対象から除外。
  // HPがあるのに"なし"扱いで営業して実店舗を怒らせた事故の再発防止。
  if(bk==='hp'){
    if(isFood)return false;
    const h=(l.hp||'').trim();
    return h!==''&&h!=='あり'&&h!=='不明';
  }
  return !isFood;
}
// 接触系ステータス(この状態へ変わると contacts へ履歴を自動追記し、被り防止の対象になる)
// 「架電予定」は予定であり接触ではないため含めない。
const SL_CONTACT_STATUSES=['電話済','メール済み','DM済み','アポ','商談','成約','失注'];
const SL_OVERLAP_DAYS=30;  // 被り防止の判定日数(定数で変更可)

// 各リードの事業別データ入れ物を取得(なければ生成)。b={s:状態,n:次アクション,m:メモ}
function slBizObj(l,biz){
  if(!l.biz)l.biz={};
  if(!l.biz[biz])l.biz[biz]={s:'未接触',n:'',m:''};
  return l.biz[biz];
}
// 現在ビューの状態/次アクション/メモを読むアクセサ(表示・集計・フィルタは全てこれ経由)
function slStatusOf(l,biz){biz=biz||_slBiz;return (l.biz&&l.biz[biz]&&l.biz[biz].s)||'未接触';}
function slNextOf(l,biz){biz=biz||_slBiz;return (l.biz&&l.biz[biz]&&l.biz[biz].n)||'';}
function slMemoOf(l,biz){biz=biz||_slBiz;return (l.biz&&l.biz[biz]&&l.biz[biz].m)||'';}

// ── 被り防止: 直近SL_OVERLAP_DAYS日に他事業で接触履歴がある店を検出 ──
// 戻り値: 最も新しい他事業接触(なければnull)。{b:事業,c:チャネル,d:日付}
function slRecentOtherContact(l,biz){
  biz=biz||_slBiz;
  if(!Array.isArray(l.contacts)||!l.contacts.length)return null;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-SL_OVERLAP_DAYS);
  let best=null;
  l.contacts.forEach(c=>{
    if(!c||c.b===biz)return;             // 自事業は被りではない
    const d=c.d?new Date(c.d):null;
    if(!d||isNaN(d)||d<cutoff)return;    // 期間外
    if(!best||(c.d||'')>(best.d||''))best={b:c.b,c:c.c||'',d:c.d};
  });
  return best;
}
// 接触履歴を1件追記(接触系ステータスへ変化した時に呼ぶ・同日同事業の重複は付けない)
function slPushContact(l,biz,channel){
  if(!Array.isArray(l.contacts))l.contacts=[];
  const today=new Date().toISOString().slice(0,10);
  if(l.contacts.some(c=>c&&c.d===today&&c.b===biz))return;
  l.contacts.push({d:today,b:biz,c:channel||''});
}
function slIgHandle(v){
  // Instagram値からハンドルを抽出。フルURL/@付き/素ハンドルいずれにも対応。
  // 抽出できなければnullを返す(呼び出し側でプレーン表示にフォールバック)。
  v=(v||'').trim();
  if(!v)return null;
  let h=v;
  if(/^https?:\/\//i.test(v)){
    try{
      const u=new URL(v);
      if(!/(^|\.)instagram\.com$/i.test(u.hostname))return null;
      h=u.pathname.replace(/^\/+/,'').split('/')[0]||'';
    }catch(e){return null;}
  }
  h=h.replace(/^@/,'').split('?')[0].split('/')[0].trim();
  if(!h||!/^[A-Za-z0-9._]{1,30}$/.test(h))return null;
  return h;
}
function slIgUrl(v){
  const h=slIgHandle(v);
  return h?('https://www.instagram.com/'+h+'/'):'#';
}
function slIgLink(v){
  // 一覧/カード共通: リンク化できれば📷 @handleのタップ可能リンク、できなければ元値のプレーン表示。
  const h=slIgHandle(v);
  if(h)return `<a href="https://www.instagram.com/${h}/" target="_blank" rel="noopener" style="color:#c13584;font-size:11px">📷 @${esc(h)}</a>`;
  return `<span style="color:var(--t3);font-size:11px">📷 ${esc((v||'').trim())}</span>`;
}
function slIgOpenBtn(v){
  // input欄の隣に置く「開く」ボタン。リンク化できる値の時だけ表示。
  const h=slIgHandle(v);
  if(!h)return '';
  return `<a href="https://www.instagram.com/${h}/" target="_blank" rel="noopener" class="tact" style="text-decoration:none;font-size:11px;color:#c13584" title="Instagramプロフィールを開く">📷 開く</a>`;
}

function slRegion(address){
  if(!address)return '全国';
  if(address.includes('旭川市'))return '旭川';
  if(address.includes('札幌市'))return '札幌';
  if(address.includes('北海道'))return '全道';  // 旭川・札幌以外の道内
  return '全国';                                 // 道外
}
// 地域を返す。格納済みregionが現行4区分なら優先、旧値(その他等)は住所から再判定
function slRegionOf(l){
  const r=l.region;
  if(r==='旭川'||r==='札幌'||r==='全道'||r==='全国')return r;
  return slRegion(l.address||'');
}

function slStatusClass(s){return 'sl-'+(s||'未接触');}
function slChip(s){return`<span class="sl-chip ${slStatusClass(s)}">${esc(s||'未接触')}</span>`;}

function slFilteredLeads(){
  const q=_slSearch.toLowerCase();
  return (S.salesLeads||[]).filter(l=>{
    if(l.deleted)return false;
    if(!slInPool(l,_slBiz))return false;  // 事業プール(シフトさん=飲食のみ/他=非飲食)
    if(_slFilterStatus!=='all'&&slStatusOf(l)!==_slFilterStatus)return false;
    if(_slFilterGenre!=='all'&&l.genre!==_slFilterGenre)return false;
    if(_slFilterRegion!=='all'&&slRegionOf(l)!==_slFilterRegion)return false;
    const hasIG=!!(l.instagram&&l.instagram.trim());
    const hasEmail=!!(l.email&&l.email.trim());
    if(_slFilterContact==='ig'&&!hasIG)return false;
    if(_slFilterContact==='email'&&!hasEmail)return false;
    if(_slFilterContact==='both'&&!(hasIG&&hasEmail))return false;
    if(_slFilterAssignee!=='all'){
      if(_slFilterAssignee==='未割当'){if(l.assignee)return false;}
      else if(l.assignee!==_slFilterAssignee)return false;
    }
    if(_slFilterOverlap&&slRecentOtherContact(l))return false;  // 被りなしのみ
    if(q&&!(l.name||'').toLowerCase().includes(q)&&!(l.address||'').toLowerCase().includes(q))return false;
    return true;
  });
}

// ═══ HP維持費管理(年間¥10,000の徴収システム) ═══
const HP_FEE=10000;               // 年間維持費(円)
const HP_FEE_STATUSES=['未請求','請求済','入金済'];
function hpFeeNext(l){             // 次回請求日=契約日の次の記念日(>=今日)
  if(!l.contractDate)return '';
  const c=new Date(l.contractDate); if(isNaN(c))return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const next=new Date(c);
  next.setFullYear(now.getFullYear());
  if(next<now)next.setFullYear(now.getFullYear()+1);
  return next.toISOString().slice(0,10);
}
function hpFeeDue(l){             // 請求すべきか(次回請求日30日以内 or 過ぎ、かつ入金済でない)
  const n=hpFeeNext(l); if(!n)return false;
  if(l.status==='入金済')return false;
  const days=(new Date(n)-new Date())/86400000;
  return days<=30;
}

function slUpdate(id,key,val){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  l[key]=val;
  save();
}

function slSetBiz(biz){
  if(!SL_BIZ_KEYS.includes(biz))return;
  _slBiz=biz;_slPage=0;
  render();
}

function slSetBizField(id,field,val){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  slBizObj(l,_slBiz)[field]=val;  // field: 'n'(次アクション) or 'm'(メモ)
  save();
}

function slSetStatus(id,status){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  const biz=_slBiz;
  // 被り防止: 接触系へ変えようとした時、他事業で直近接触があれば確認
  if(SL_CONTACT_STATUSES.includes(status)){
    const oc=slRecentOtherContact(l,biz);
    if(oc&&!confirm(`「${l.name}」は${slBizLabel(oc.b)}で${oc.d}に接触済みです(直近${SL_OVERLAP_DAYS}日)。\n別事業「${slBizLabel(biz)}」で接触記録を付けますか？`))return;
  }
  const b=slBizObj(l,biz);
  b.s=status;
  // 接触系ステータスなら接触履歴を自動追記(被り防止の元データ)
  if(SL_CONTACT_STATUSES.includes(status))slPushContact(l,biz,l.approach||'');
  // HP事業の成約は従来どおり lead.status/wonAt にも反映(既存の集計・クライアント化と互換)
  if(biz==='hp')l.status=status;
  if(status==='成約'&&!l.wonAt)l.wonAt=new Date().toISOString().slice(0,10);
  save();
  render();
}

function slSetApproach(id,approach){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  l.approach=(l.approach===approach)?'':approach;  // 同じボタン再クリックで解除
  save();
  render();
}

function slSetAssignee(id,name){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  l.assignee=(l.assignee===name)?'':name;  // 同じボタン再クリックで未割当に戻す
  save();
  render();
}

function slDelete(id){
  const l=(S.salesLeads||[]).find(x=>x.id===id);
  if(!l)return;
  if(!confirm(`「${l.name}」を削除しますか？`))return;
  l.deleted=true;
  save();render();
}

function slAddManual(){
  if(!S.salesLeads)S.salesLeads=[];
  const name=prompt('店名を入力:');
  if(!name)return;
  S.salesLeads.push({id:uid(),name:name.trim(),status:'未接触',biz:{hp:{s:'未接触',n:'',m:''}},contacts:[],createdAt:new Date().toISOString()});
  save();render();
}

function slClearAll(){
  if(!confirm('営業リストを全件削除しますか？この操作は元に戻せません。'))return;
  S.salesLeads=[];
  save();render();
  toast('🗑 全件削除しました');
}

function _slParseCSV(text){
  // ヘッダー行スキップ(店名で始まる行 or 1行目)
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  let start=0;
  if(/^店名[,\t]/.test(lines[0]))start=1;
  const results=[];
  for(let i=start;i<lines.length;i++){
    // CSVパース(ダブルクォート対応)
    const cols=[];
    let cur='',inQ=false;
    for(let c=0;c<lines[i].length;c++){
      const ch=lines[i][c];
      if(ch==='"'){if(inQ&&lines[i][c+1]==='"'){cur+='"';c++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur);cur='';}
      else cur+=ch;
    }
    cols.push(cur);
    const[name,genre,phone,address,rating,reviewCount,hp,instagram,approach,status,nextAction,memo,email]=cols.map(s=>s.trim());
    if(!name)continue;
    const st=SL_STATUSES.includes(status)?status:'未接触';
    results.push({
      id:uid(),
      name,genre:genre||'',phone:phone||'',address:address||'',
      region:slRegion(address||''),
      rating:rating?parseFloat(rating):null,
      reviewCount:reviewCount?parseInt(reviewCount):null,
      hp:hp||'',instagram:instagram||'',approach:approach||'',
      email:email||'',
      status:st,
      nextAction:nextAction||'',memo:memo||'',
      biz:{hp:{s:st,n:nextAction||'',m:memo||''}},  // CSVの状態列はHP事業に入れる
      contacts:[],
      createdAt:new Date().toISOString()
    });
  }
  return results;
}

async function _slSaveChunked(leads){
  if(!S.salesLeads)S.salesLeads=[];
  // 既存レコードを店名+電話でインデックス化(重複は新規追加せず既存へマージ)
  const existBy={};
  (S.salesLeads||[]).filter(l=>!l.deleted).forEach(l=>{existBy[(l.name||'')+(l.phone||'')]=l;});
  const newLeads=[];
  let merged=0;
  leads.forEach(x=>{
    const ex=existBy[(x.name||'')+(x.phone||'')];
    if(ex){
      // 既存へマージ: 空欄だけ埋める(既存の営業状態・接触履歴は壊さない)
      ['genre','address','rating','reviewCount','hp','instagram','email','region'].forEach(k=>{
        if((ex[k]==null||ex[k]==='')&&x[k]!=null&&x[k]!=='')ex[k]=x[k];
      });
      merged++;
    }else{
      newLeads.push(x);
      existBy[(x.name||'')+(x.phone||'')]=x;  // 同一バッチ内重複も1件に
    }
  });
  const prog=document.getElementById('sl-import-progress');
  const CHUNK=200;
  let added=0;
  for(let i=0;i<newLeads.length;i+=CHUNK){
    S.salesLeads.push(...newLeads.slice(i,i+CHUNK));
    added=Math.min(i+CHUNK,newLeads.length);
    if(prog)prog.textContent=`処理中… ${added}/${newLeads.length}件`;
    await new Promise(r=>setTimeout(r,0)); // UIブロック防止
  }
  save();
  if(prog)prog.textContent=`完了: 新規${newLeads.length}件 / 既存マージ${merged}件`;
  render();
  toast(`📥 新規${newLeads.length}件・既存マージ${merged}件`);
}

function slImportCSV(){
  const el=document.getElementById('sl-csv-input');
  if(!el)return;
  const text=el.value.trim();
  if(!text){toast('CSVを貼り付けてください','warn');return;}
  const leads=_slParseCSV(text);
  if(!leads.length){toast('有効なデータがありません','warn');return;}
  _slSaveChunked(leads);
}

function slImportFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const leads=_slParseCSV(e.target.result);
    if(!leads.length){toast('有効なデータがありません','warn');return;}
    _slSaveChunked(leads);
  };
  reader.readAsText(file,'UTF-8');
}

// ===MIGRATION: 既存leadへ地域を後付け===
function slMigrateRegions(){
  if(!S.salesLeads)return;
  let migrated=0;
  S.salesLeads.forEach(l=>{
    if(!l.region){
      l.region=slRegion(l.address||'');
      migrated++;
    }
  });
  if(migrated>0){save();console.log(`[slMigrateRegions] ${migrated}件に地域を付与しました`);}
}

// ===MIGRATION: 既存の単一「状態/次アクション/メモ」をHP事業(biz.hp)へ移行(後方互換・冪等)===
function slMigrateBiz(){
  if(!S.salesLeads)return;
  let migrated=0;
  S.salesLeads.forEach(l=>{
    if(!l.biz||typeof l.biz!=='object'){
      l.biz={};
      l.biz.hp={s:l.status||'未接触',n:l.nextAction||'',m:l.memo||''};
      // 既存の接触系ステータスは接触履歴として1件起点を残す(被り防止の初期値)
      if(l.status&&SL_CONTACT_STATUSES.includes(l.status)){
        const d=(l.wonAt||l.nextAction||l.createdAt||'').slice(0,10)||new Date().toISOString().slice(0,10);
        l.contacts=[{d,b:'hp',c:l.approach||''}];
      }
      migrated++;
    }
    if(!Array.isArray(l.contacts))l.contacts=[];
  });
  if(migrated>0){save();console.log(`[slMigrateBiz] ${migrated}件を事業別データへ移行(HP事業へ)`);}
}

// ===MIGRATION: 飲食店のHP側営業状態をシフトさん事業へ移す(2026-07-13会長指示・冪等)===
// 飲食はHP営業対象外にした。過去にHPで動かした飲食リードの状態/次アクション/メモを
// biz.hp → biz.shift へ移し、biz.hp は未接触に戻す。HP側が未接触の飲食は対象外。
function slMigrateFoodToShift(){
  if(!S.salesLeads)return;
  let moved=0;
  S.salesLeads.forEach(l=>{
    if(!SL_FOOD_GENRES.has(l.genre||''))return;
    if(!l.biz||typeof l.biz!=='object')l.biz={};
    const hp=l.biz.hp;
    const hpHas=hp&&((hp.s&&hp.s!=='未接触')||hp.n||hp.m);
    if(!hpHas)return;
    const cur=l.biz.shift;
    const shiftEmpty=!cur||((!cur.s||cur.s==='未接触')&&!cur.n&&!cur.m);
    if(shiftEmpty)l.biz.shift={s:hp.s||'未接触',n:hp.n||'',m:hp.m||''};
    else l.biz.shift.m=(cur.m?cur.m+' / ':'')+'旧HP状態: '+(hp.s||'')+(hp.m?('・'+hp.m):'');  // 衝突時は情報を残す
    l.biz.hp={s:'未接触',n:'',m:''};  // 飲食はHP対象外に戻す
    moved++;
  });
  if(moved>0){save();console.log(`[slMigrateFoodToShift] ${moved}件の飲食をHP→シフトさんへ移行`);}
}

// ===MIGRATION: 営業担当「会長」を「中村航汰」へ改名(2026-07-13会長指示・冪等)===
function slMigrateAssignee(){
  if(!S.salesLeads)return;
  let n=0;
  S.salesLeads.forEach(l=>{if(l&&l.assignee==='会長'){l.assignee='中村航汰';n++;}});
  if(n>0){save();console.log(`[slMigrateAssignee] 担当${n}件を会長→中村航汰へ改名`);}
}

const APP_VERSION='20260715-13';

function forceAppUpdate(){
  const bust='?v='+Date.now();
  if('caches' in window){
    caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).then(()=>{
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(regs=>Promise.all(regs.map(r=>r.unregister()))).then(()=>{
          location.href=location.pathname+bust; // キャッシュバスティングURLで再読み込み
        });
      }else{location.href=location.pathname+bust;}
    });
  }else{location.href=location.pathname+bust;}
}
(function(){
  const stored=localStorage.getItem('ef_team_app_ver');
  if(stored!==APP_VERSION){
    localStorage.setItem('ef_team_app_ver',APP_VERSION);
    if(stored){
      // ループ防止: sessionStorageで試行回数を管理
      const attempts=parseInt(sessionStorage.getItem('ef_update_attempts')||'0');
      if(attempts<3){
        sessionStorage.setItem('ef_update_attempts',String(attempts+1));
        forceAppUpdate();
      }else{
        // 3回試みても解決しない場合はループを止める
        sessionStorage.removeItem('ef_update_attempts');
        console.warn('Update loop detected, skipping forceAppUpdate');
      }
    }
  }else{
    sessionStorage.removeItem('ef_update_attempts');
  }
})();

// ===SERVICE WORKER===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.update();
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(sessionStorage.getItem('sw_init')){
        sessionStorage.removeItem('sw_init');
        location.reload();
      }else{
        sessionStorage.setItem('sw_init','1');
      }
    });
  }).catch(e=>console.warn('SW:',e));
}
