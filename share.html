<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src https: data:; font-src https: data:; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<title>共有ドキュメント — mono.create</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--text:#111827;--t2:#4b5563;--t3:#9ca3af;--border:#e5e7eb;--pl:#6d5efc;--pldim:#efeaff;--green:#16a34a;--amber:#d97706;--red:#dc2626;--shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06)}
@media (prefers-color-scheme:dark){:root{--bg:#0d0f14;--card:#171a21;--text:#e5e7eb;--t2:#9aa4b2;--t3:#6b7280;--border:#262b36;--pldim:#241f3d;--shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35)}}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
.wrap{max-width:820px;margin:0 auto;padding:18px 14px 80px}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 2px 16px}
.brand{font-weight:800;color:var(--pl);font-size:15px;letter-spacing:.2px}
.brand small{color:var(--t3);font-weight:600;font-size:11px;margin-left:4px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.pill.view{background:var(--pldim);color:var(--pl)}
.pill.edit{background:#e7f6ed;color:var(--green)}
@media (prefers-color-scheme:dark){.pill.edit{background:#123020}}
.spacer{flex:1}
.doc{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:34px 30px}
@media(max-width:520px){.doc{padding:22px 16px;border-radius:12px}}
.doc-title{font-size:24px;font-weight:800;line-height:1.35;margin:0 0 4px}
.doc-meta{font-size:11px;color:var(--t3);margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:14px}
.content{font-size:15px}
.content h1{font-size:23px;font-weight:800;margin:22px 0 10px}
.content h2{font-size:19px;font-weight:800;margin:20px 0 8px}
.content h3{font-size:16px;font-weight:700;margin:16px 0 6px}
.content p{margin:8px 0}
.content ul,.content ol{padding-left:24px;margin:8px 0}
.content li{margin:3px 0}
.content hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.content table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;display:block;overflow-x:auto}
.content th,.content td{border:1px solid var(--border);padding:7px 9px;text-align:left;vertical-align:top}
.content th{background:var(--bg);font-weight:700}
.content pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;overflow-x:auto;font-size:12px;font-family:Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-word}
.content img{max-width:100%;height:auto;border-radius:8px}
.content a{color:var(--pl);word-break:break-word}
.content blockquote{border-left:3px solid var(--border);margin:10px 0;padding:2px 14px;color:var(--t2)}
[contenteditable]{outline:none}
[contenteditable]:focus{outline:none}
.tb{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;margin-bottom:12px;box-shadow:var(--shadow)}
.tb button{border:1px solid transparent;background:transparent;color:var(--text);border-radius:6px;min-width:32px;height:30px;padding:0 8px;font-size:13px;cursor:pointer}
.tb button:hover{background:var(--bg)}
.tb .sep{width:1px;background:var(--border);margin:2px 3px}
.tb select{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:6px;height:30px;font-size:12px;padding:0 4px}
.editnote{background:var(--pldim);color:var(--pl);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;line-height:1.6}
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.btn{border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer}
.btn-p{background:var(--pl);color:#fff}
.btn-g{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.retbox{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-top:14px}
.retbox textarea{width:100%;height:70px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:11px;padding:8px;font-family:Menlo,Consolas,monospace;resize:vertical}
.err{text-align:center;padding:60px 20px;color:var(--t2)}
.err .ic{font-size:46px;margin-bottom:14px}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2400);}
function fmtDate(ts){if(!ts)return'';var d=new Date(ts);if(isNaN(d))return'';return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);}
function sanitize(html){
  try{
    var d=document.createElement('div');d.innerHTML=String(html||'');
    var kill=d.querySelectorAll('script,iframe,object,embed,link,meta,style,form');
    for(var i=0;i<kill.length;i++)kill[i].parentNode&&kill[i].parentNode.removeChild(kill[i]);
    var all=d.querySelectorAll('*');
    for(var j=0;j<all.length;j++){var el=all[j];var at=[].slice.call(el.attributes);
      for(var k=0;k<at.length;k++){var n=at[k].name.toLowerCase();var v=(at[k].value||'').trim().toLowerCase().replace(/\s/g,'');
        if(n.indexOf('on')===0)el.removeAttribute(at[k].name);
        else if((n==='href'||n==='src'||n==='xlink:href')&&v.indexOf('javascript:')===0)el.removeAttribute(at[k].name);
      }}
    return d.innerHTML;
  }catch(e){return'';}
}
function parseHash(){
  var h=location.hash||'';
  var m=h.match(/^#([ver])=([\s\S]+)$/);
  if(!m)return null;
  var json;try{json=LZString.decompressFromEncodedURIComponent(m[2]);}catch(e){json=null;}
  if(!json)return null;
  var data;try{data=JSON.parse(json);}catch(e2){return null;}
  if(!data||typeof data!=='object')return null;
  return {mode:m[1],data:data};
}
function errorHTML(){
  return '<div class="err"><div class="ic">🔗</div><div style="font-weight:700;color:var(--text);margin-bottom:6px">リンクを開けませんでした</div><div style="font-size:13px">リンクが不完全か、古い可能性があります。<br>送り主にもう一度リンクを送ってもらってください。</div></div>';
}
function makeReturnLink(data,html){
  var ret={t:data.t||'',h:sanitize(html),src:data.src||'tp',id:data.id||'',ts:Date.now(),by:data.by||''};
  var payload=LZString.compressToEncodedURIComponent(JSON.stringify(ret));
  return location.origin+location.pathname+'#r='+payload;
}
function copyText(txt,label){
  var done=function(){toast((label||'リンク')+'をコピーしました');};
  var fb=function(){var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){toast('コピーできませんでした');}document.body.removeChild(ta);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(fb);}else fb();
}
function cmd(c){document.execCommand(c,false,null);document.getElementById('editor').focus();}
function fmtBlock(v){if(v)document.execCommand('formatBlock',false,v);document.getElementById('editor').focus();}
function mkLink(){var u=prompt('リンクURL');if(u)document.execCommand('createLink',false,u);}
var _cur=null;
function genReturn(){
  var ed=document.getElementById('editor');if(!ed)return;
  var ti=document.getElementById('etitle');
  var d=Object.assign({},_cur.data);if(ti)d.t=ti.value||d.t;
  var link=makeReturnLink(d,ed.innerHTML);
  var box=document.getElementById('retbox');
  box.style.display='block';
  document.getElementById('retlink').value=link;
  copyText(link,'反映用リンク');
  box.scrollIntoView({behavior:'smooth',block:'center'});
}
function render(){
  _cur=parseHash();
  var app=document.getElementById('app');
  if(!_cur){app.innerHTML=errorHTML();return;}
  var data=_cur.data;
  var canEdit=(_cur.mode==='e'&&data.perm==='edit');
  var safe=sanitize(data.h||'');
  var isReturn=(_cur.mode==='r');
  var pill=canEdit?'<span class="pill edit">✏️ 編集できます</span>':'<span class="pill view">👁 閲覧のみ</span>';
  if(isReturn)pill='<span class="pill edit">↩ 反映用プレビュー</span>';
  var top='<div class="topbar"><span class="brand">mono.create<small>ドキュメント共有</small></span><span class="spacer"></span>'+pill+'</div>';
  if(canEdit){
    app.innerHTML=top+
      '<div class="editnote">このドキュメントは編集できます。編集し終えたら、下の「反映用リンクをコピー」を押して、そのリンクを送り主に送り返してください。送り主が取り込むと反映されます。</div>'+
      '<div class="tb">'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'undo\')" title="元に戻す">↶</button>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'redo\')" title="やり直し">↷</button>'+
        '<span class="sep"></span>'+
        '<select onchange="fmtBlock(this.value);this.selectedIndex=0"><option value="">段落</option><option value="H1">タイトル</option><option value="H2">見出し1</option><option value="H3">見出し2</option><option value="P">標準</option></select>'+
        '<span class="sep"></span>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'bold\')" title="太字"><b>B</b></button>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'italic\')" title="斜体"><i>I</i></button>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'underline\')" title="下線"><u>U</u></button>'+
        '<span class="sep"></span>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'insertUnorderedList\')" title="箇条書き">•≡</button>'+
        '<button onmousedown="event.preventDefault()" onclick="cmd(\'insertOrderedList\')" title="番号付き">1≡</button>'+
        '<button onmousedown="event.preventDefault()" onclick="mkLink()" title="リンク">🔗</button>'+
      '</div>'+
      '<div class="doc"><input id="etitle" value="'+esc(data.t||'')+'" style="width:100%;border:none;background:transparent;color:var(--text);font-size:24px;font-weight:800;outline:none;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px" placeholder="無題のドキュメント">'+
        '<div class="content" id="editor" contenteditable="true">'+safe+'</div></div>'+
      '<div class="retbox" id="retbox" style="display:none"><div style="font-weight:700;font-size:13px;margin-bottom:6px">↩ このリンクを送り主に送り返してください</div><textarea id="retlink" readonly onclick="this.select()"></textarea><div style="margin-top:8px"><button class="btn btn-g" onclick="copyText(document.getElementById(\'retlink\').value,\'反映用リンク\')">もう一度コピー</button></div></div>'+
      '<div class="bar"><button class="btn btn-p" onclick="genReturn()">↩ 反映用リンクをコピー</button></div>';
  }else{
    app.innerHTML=top+
      '<div class="doc"><h1 class="doc-title">'+esc(data.t||'無題のドキュメント')+'</h1>'+
      '<div class="doc-meta">mono.create 社内ドキュメント'+(data.ts?' ・ 発行 '+fmtDate(data.ts):'')+(data.by?' ・ '+esc(data.by):'')+'</div>'+
      '<div class="content">'+safe+'</div></div>';
  }
}
window.addEventListener('hashchange',render);
render();
</script>
</body>
</html>
